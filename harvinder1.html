<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        .main-container { 
            position: absolute; 
            left: 10px; right: 10px; bottom: 70px; 
            height: 280px; display: flex; gap: 15px; 
        }
        .box { display: none; flex: 1; height: 100%; position: relative; border: 3px solid white; border-radius: 12px 12px 0 0; overflow: hidden; }

        #box-fly { background: #000; }
        #box-out { background: #660000; } 
        #box-time { background: #001a66; }

        .header-wrapper { position: absolute; top: 0; right: 0; width: 45%; z-index: 10; }
        .box-header, .sum-card { display: flex; align-items: center; width: 100%; border-left: 3px solid white; border-bottom: 3px solid white; background: #000; }
        .box-header { height: 75px; border-radius: 0 12px 0 12px; }
        .sum-card { height: 60px; border-radius: 0 0 0 12px; }

        .header-title { flex: 1; padding-left: 12px; font-weight: 950; font-size: 18px; }
        .count-tag { background: #fff; color: #000; width: 40%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 40px; }
        .sum-val-area { background: #ffcc00; color: #000; width: 40%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 36px; }

        /* Scroll Window */
        .scroll-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        
        /* List Area - Initial Position Fix */
        .list-area { 
            position: absolute; 
            width: 100%; 
            top: 0;
            will-change: transform; 
        }
        
        .item { 
            padding: 15px 15px; 
            font-size: 38px; 
            font-weight: 950; 
            color: #ffcc00; 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }

        .loop-spacer { height: 280px; width: 100%; } /* ਬਾਕਸ ਜਿੰਨੀ ਖਾਲੀ ਜਗ੍ਹਾ */

        .footer { position: absolute; bottom: 0; width: 100%; height: 70px; background: #fff; display: flex; align-items: center; border-top: 5px solid #ff0000; }
        .ticker-move { display: inline-block; font-size: 32px; font-weight: 950; color: #000; }
    </style>
</head>
<body>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title">🕊️ FLYING</span><span id="count-fly" class="count-tag">0</span></div>
            <div class="sum-card"><div class="sum-label-area" style="flex:1; padding-left:12px; font-weight:950;">TOTAL</div><div id="m-total" class="sum-val-area">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title">❌ OUT</span><span id="count-out" class="count-tag">0</span></div>
            <div class="sum-card"><div class="sum-label-area" style="flex:1; padding-left:12px; font-weight:950;">REM.</div><div id="m-rem" class="sum-val-area">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title">⏰ TIME</span><span id="count-time" class="count-tag">0</span></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div style="background:#ff0000; color:#fff; padding:0 25px; height:100%; display:flex; align-items:center; font-size:32px; font-weight:950;">LIVE</div>
    <div style="flex:1; overflow:hidden; white-space:nowrap;"><div id="ticker-text" class="ticker-move"></div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    const LIST_SPEED = 1.0;
    // ਸਟਾਰਟਿੰਗ ਪੁਜੀਸ਼ਨ ਬਾਕਸ ਦੇ ਹੇਠਾਂ (280px) ਰੱਖੀ ਹੈ
    let listPositions = { fly: 280, time: 280, out: 280 }; 
    let tickerPos = window.innerWidth;

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('scoreboard-div').style.display = (conf.showScore !== false) ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "";
            
            let counts = { fly:0, out:0, time:0 }; 
            let htmlContent = { fly:'', out:'', time:'' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}. ${p.name}</div>`;
                if (p.status === 'fly') { counts.fly++; htmlContent.fly += row; }
                else if (p.status === 'time') { counts.time++; htmlContent.time += row; }
                else if (p.status === 'out') { counts.out++; htmlContent.out += row; }
            });

            ['fly','time','out'].forEach(id => {
                const area = document.getElementById(`list-${id}`);
                if(counts[id] > 0) {
                    document.getElementById(`box-${id}`).style.display = "block";
                    document.getElementById(`count-${id}`).innerText = counts[id];
                    // ਟੀਮਾਂ + ਖਾਲੀ ਸਪੇਸ (ਬਾਕਸ ਦੇ ਹੇਠਾਂ ਤੋਂ ਆਉਣ ਲਈ)
                    area.innerHTML = htmlContent[id] + '<div class="loop-spacer"></div>';
                } else {
                    document.getElementById(`box-${id}`).style.display = "none";
                }
            });
            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
        });
    }

    function animate() {
        ['fly', 'time', 'out'].forEach(id => {
            const listArea = document.getElementById(`list-${id}`);
            if (listArea && document.getElementById(`box-${id}`).style.display !== "none") {
                listPositions[id] -= LIST_SPEED;
                
                // ਜਦੋਂ ਪੂਰੀ ਲਿਸਟ (ਟੀਮਾਂ + ਖਾਲੀ ਗੈਪ) ਉੱਪਰ ਨਿਕਲ ਜਾਵੇ
                if (Math.abs(listPositions[id]) >= listArea.offsetHeight) {
                    listPositions[id] = 280; // ਵਾਪਸ ਬਾਕਸ ਦੇ ਬਿਲਕੁਲ ਹੇਠਾਂ ਭੇਜ ਦਿਓ
                }
                listArea.style.transform = `translateY(${listPositions[id]}px)`;
            }
        });

        tickerPos -= 2.2;
        const tText = document.getElementById('ticker-text');
        if(tickerPos < -tText.offsetWidth) tickerPos = window.innerWidth;
        tText.style.transform = `translateX(${tickerPos}px)`;

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
