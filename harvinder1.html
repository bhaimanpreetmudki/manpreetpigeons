<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }

        @keyframes borderGlow {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            25% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            50% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
            75% { border-color: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
        }

        /* ਬਾਕਸ ਨੂੰ ਟਿੱਕਰ ਦੇ ਨਾਲ ਜੋੜਨ ਲਈ bottom ਘਟਾਇਆ ਹੈ ਅਤੇ height ਛੋਟੀ ਕੀਤੀ ਹੈ */
        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 75px; height: 210px; 
            display: flex; gap: 15px; justify-content: flex-start; 
        }
        
        .box { 
            display: none; 
            width: 32.5%; 
            height: 100%; 
            position: relative; 
            border: 4px solid white; 
            border-radius: 12px 12px 0 0; 
            overflow: hidden; 
            animation: borderGlow 6s linear infinite; 
            background: rgba(0, 0, 0, 0.9);
        }

        .header-wrapper { position: absolute; top: 0; right: 0; width: 58%; z-index: 10; background: #000; border-bottom: 4px solid white; border-left: 4px solid white; border-radius: 0 10px 0 10px; }
        .box-header { height: 50px; display: flex; align-items: center; border-bottom: 2px solid white; }
        .sum-card { height: 45px; display: flex; align-items: center; }

        .header-title { flex: 1; padding-left: 8px; font-weight: 900; font-size: 16px; border-right: 2px solid white; height: 100%; display: flex; align-items: center; }
        .count-tag { width: 35%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 28px; background: #fff; color: #000; }
        .sum-val-area { background: #ffcc00; color: #000; width: 35%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 26px; }

        .scroll-window { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        
        /* ਪੈਡਿੰਗ ਵਧਾਈ ਹੈ ਤਾਂ ਜੋ ਨਾਮ ਹੇਠਾਂ ਤੋਂ ਆਉਣ */
        .list-area { position: absolute; width: 100%; will-change: transform; padding-top: 100px; }
        .item { padding: 10px 15px; font-size: 34px; font-weight: 950; color: #ffcc00; border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 2px 2px 3px #000; }

        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 75px; background: #fff; 
            display: flex; align-items: center; border-top: 6px solid red; overflow: hidden;
            animation: borderGlow 6s linear infinite;
        }
        .live-tag { background: #ff0000; color: #fff; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 30px; font-weight: 1000; z-index: 10; border-right: 5px solid #000; }
        
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; font-size: 35px; font-weight: 1000; color: #000; will-change: transform; padding-right: 100px; }

        .dt-box { background: #ff0000; color: #fff; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center; min-width: 240px; border-left: 5px solid #000; z-index: 10; font-size: 28px; font-weight: 1000; }
    </style>
</head>
<body>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box" style="order:1;">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title">🕊️ FLYING</span><span id="count-fly" class="count-tag">0</span></div>
            <div class="sum-card"><div class="header-title" style="border-right:2px solid white;">TOTAL</div><div id="m-total" class="sum-val-area">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box" style="order:2;">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title">❌ OUT</span><span id="count-out" class="count-tag">0</span></div>
            <div class="sum-card"><div class="header-title" style="border-right:2px solid white;">REM.</div><div id="m-rem" class="sum-val-area">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box" style="order:3;">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title">⏰ TIME</span><span id="count-time" class="count-tag">0</span></div>
            <div class="sum-card"><div id="m-time-val" class="sum-val-area" style="width: 100%; font-size: 26px;">--</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box" id="clock-box">--:--:--</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    let listPos = { fly: 0, time: 0, out: 0 };
    let tickerPos = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-box').innerText = now.toLocaleTimeString('en-US', {hour12:true});
    }
    setInterval(updateClock, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {}; 
            const pigeons = data.pigeons || [];
            
            document.getElementById('scoreboard-div').style.display = (conf.showScoreboard !== false) ? "flex" : "none";
            document.getElementById('ticker-div').style.display = (conf.showTicker !== false) ? "flex" : "none";
            
            // Ticker: Double text for seamless loop
            const msg = (conf.ticker || "") + "          ";
            const tickerElem = document.getElementById('ticker-text');
            tickerElem.innerText = msg + msg; 
            
            document.getElementById('m-time-val').innerText = conf.boxTime || "--";
            
            let html = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}. ${p.name}</div>`;
                if (p.status === 'fly') { counts.fly++; html.fly += row; }
                else if (p.status === 'time') { counts.time++; html.time += row; }
                else if (p.status === 'out') { counts.out++; html.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;

            // Loop Gap: 4 teams (approx 200px spacer)
            const spacer = '<div style="height:200px"></div>';

            ['fly','time','out'].forEach(id => {
                const el = document.getElementById(`box-${id}`);
                const listArea = document.getElementById(`list-${id}`);
                if(counts[id] > 0) {
                    el.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = counts[id];
                    listArea.innerHTML = html[id] + spacer + html[id] + spacer;
                } else { el.style.display = "none"; }
            });
        });
    }

    function animate() {
        // Vertical List
        ['fly', 'time', 'out'].forEach(id => {
            const listArea = document.getElementById(`list-${id}`);
            if (listArea && getComputedStyle(document.getElementById(`box-${id}`)).display !== "none") {
                listPos[id] -= 1.2; // ਥੋੜੀ ਸਲੋਅ ਸਪੀਡ
                let halfHeight = listArea.scrollHeight / 2;
                if (Math.abs(listPos[id]) >= halfHeight) listPos[id] = 0;
                listArea.style.transform = `translateY(${listPos[id]}px)`;
            }
        });

        // Horizontal Ticker - Smooth Loop fix
        const tickerArea = document.getElementById('ticker-text');
        if (getComputedStyle(document.getElementById('ticker-div')).display !== "none") {
            tickerPos -= 2.0;
            // ਅੱਧੀ ਚੌੜਾਈ ਤੋਂ ਬਾਅਦ ਤੁਰੰਤ ਰੀਸੈੱਟ
            let halfWidth = tickerArea.scrollWidth / 2;
            if (Math.abs(tickerPos) >= halfWidth) tickerPos = 0;
            tickerArea.style.transform = `translateX(${tickerPos}px)`;
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
