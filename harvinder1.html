<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --header-h: 65px; 
            --header-w: 40%; 
        }
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', 'Raavi', sans-serif; overflow: hidden; height: 100vh; }

        /* --- Weather Box Style --- */
        #weather-box {
            position: absolute;
            bottom: 395px; /* ਬਾਕਸਾਂ ਦੇ ਉੱਪਰ */
            left: 10px;
            width: 350px;
            height: 105px;
            display: none;
            overflow: hidden;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            background: rgba(0, 0, 0, 0.85);
            z-index: 1001;
        }
        #weather-frame { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* ਤੇਜ਼ ਝਮਾਕਾ ਜਦੋਂ ਟਾਈਮ/ਡੇਟ ਬਦਲੇ */
        @keyframes sharpFlash {
            0% { filter: brightness(1); transform: scale(1) skewX(25deg); }
            50% { filter: brightness(12); transform: scale(1.05) skewX(25deg); }
            100% { filter: brightness(1); transform: scale(1) skewX(25deg); }
        }

        /* ਸਲੋ ਘੈਂਟ ਲਾਈਟ ਐਨੀਮੇਸ਼ਨ */
        @keyframes slowGhaintLight {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; } 
        }

        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 105px; 
            height: 280px; display: flex; gap: 15px; justify-content: flex-start; 
        }
        
        .box { 
            display: none; width: 32.5%; height: 100%; position: relative; 
            border-radius: 25px; overflow: hidden; border: 4px solid #fff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .box::after {
            content: ""; position: absolute; top: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3) 50%, transparent);
            animation: slowGhaintLight 15s infinite ease-in-out;
            z-index: 5; pointer-events: none;
        }

        #box-fly { background: rgba(0, 191, 255, 0.85) !important; }
        #box-out { background: rgba(255, 0, 0, 0.85) !important; }
        #box-time { background: rgba(255, 255, 0, 0.85) !important; }

        .box-inner { width: 100%; height: 100%; border-radius: 20px; position: relative; overflow: hidden; z-index: 1; }

        .header-wrapper { 
            position: absolute; top: 0; right: 0; width: var(--header-w); z-index: 10; 
            background: #000; border-bottom: 3px solid white; border-left: 3px solid white; 
            border-radius: 0 20px 0 20px; color: white;
        }
        .box-header, .sum-card { height: var(--header-h); display: flex; align-items: center; }
        .box-header { border-bottom: 2px solid white; }
        
        .header-title { flex: 1; padding-left: 12px; font-weight: 900; font-size: 30px; border-right: 2px solid white; height: 100%; display: flex; align-items: center; }
        .count-tag, .sum-val-area { width: 35%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 38px; }
        .count-tag { background: #fff; color: #000; }
        .sum-val-area { background: #ffcc00; color: #000; }

        .scroll-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; will-change: transform; display: flex; flex-direction: column; padding-top: calc(var(--header-h) * 2.3); }
        
        .item { padding: 5px 20px; font-size: 42px; font-weight: 1000; line-height: 1.1; color: #000; z-index: 3; position: relative; }
        #box-out .item { color: #fff; }

        .footer { 
            position: absolute; bottom: 10px; left: 10px; width: calc(100% - 20px); height: 85px; 
            background: #fff; display: flex; align-items: center; 
            border: 4px solid #000; border-radius: 15px; z-index: 20; overflow: hidden;
        }

        .footer::before {
            content: ""; position: absolute; top: 0; width: 500px; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.7) 50%, transparent);
            animation: slowGhaintLight 20s infinite ease-in-out;
            z-index: 35; pointer-events: none;
        }

        .live-tag { 
            background: #ff0000; color: #fff; padding: 0 45px; height: 100%; 
            display: flex; align-items: center; font-size: 40px; font-weight: 1000; 
            transform: skewX(-25deg); margin-left: -25px; border-right: 5px solid #fff; z-index: 25;
        }
        .live-tag span { transform: skewX(25deg); } 

        .ticker-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; }
        .ticker-move { display: flex; white-space: nowrap; font-size: 38px; font-weight: 1000; color: #000; }
        .ticker-content { display: inline-block; padding-right: 800px; } 

        .dt-box-wrap { 
            height: 100%; min-width: 400px; display: flex; align-items: center; justify-content: center; 
            background: #ff0000; color: #fff; transform: skewX(-25deg); margin-right: -25px;
            border-left: 6px solid #fff; z-index: 25;
        }
        
        #clock-box { font-size: 34px; font-weight: 1000; transform: skewX(25deg); }

        .jhmaka-effect { animation: sharpFlash 0.5s ease-out; }
    </style>
</head>
<body>

<div id="weather-box">
    <iframe id="weather-frame" src=""></iframe>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box"><div class="box-inner">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title" id="title-fly">FLYING</span><span id="count-fly" class="count-tag">0</span></div>
            <div class="sum-card"><span class="header-title" id="total-fly">TOTAL</span><span id="m-total" class="sum-val-area">0</span></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div></div>

    <div id="box-out" class="box"><div class="box-inner">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title" id="title-out">OUT</span><span id="count-out" class="count-tag">0</span></div>
            <div class="sum-card"><span class="header-title" id="rem-out">REM.</span><span id="m-rem" class="sum-val-area">0</span></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div></div>

    <div id="box-time" class="box"><div class="box-inner">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title" id="title-time">TIME</span><span id="count-time" class="count-tag">0</span></div>
            <div class="sum-card"><div id="m-time-val" class="sum-val-area" style="width: 100%;">--</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div></div>
</div>

<div class="footer">
    <div class="live-tag"><span>LIVE</span></div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box-wrap">
        <div id="clock-box">--:--:--</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userID = new URLSearchParams(window.location.search).get('id');

    let langFlash = false;
    let showDate = false;
    let listPos = { fly: 0, time: 0, out: 0 };
    let tickerPos = 0;

    setInterval(() => {
        langFlash = !langFlash;
        document.getElementById('title-fly').innerText = langFlash ? "ਉੱਡ ਰਹੇ" : "FLYING";
        document.getElementById('total-fly').innerText = langFlash ? "ਕੁੱਲ" : "TOTAL";
        document.getElementById('title-out').innerText = langFlash ? "ਕੱਟੇ ਗਏ" : "OUT";
        document.getElementById('rem-out').innerText = langFlash ? "ਬਾਕੀ" : "REM.";
        document.getElementById('title-time').innerText = langFlash ? "ਸਮੇਂ ਚ" : "TIME";
    }, 3000);

    setInterval(() => {
        const clockElem = document.getElementById('clock-box');
        clockElem.classList.add('jhmaka-effect');
        setTimeout(() => { showDate = !showDate; }, 250);
        setTimeout(() => { clockElem.classList.remove('jhmaka-effect'); }, 600);
    }, 15000);

    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()}`;
        document.getElementById('clock-box').innerText = showDate ? dateStr : timeStr;
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            // --- UI Setup ---
            document.getElementById('m-time-val').innerText = conf.boxTime || "--";
            const tickerElem = document.getElementById('ticker-text');
            if(tickerElem) tickerElem.innerHTML = `<div class="ticker-content">${conf.ticker || ""}</div><div class="ticker-content">${conf.ticker || ""}</div>`;

            // --- Weather Sync ---
            const wBox = document.getElementById('weather-box');
            const wFrame = document.getElementById('weather-frame');
            if(conf.showWeather === true) {
                wBox.style.display = "block";
                let lat = conf.lat || "30.5980";
                let lon = conf.lon || "74.7380";
                let p_name = conf.pindName || "";
                const wUrl = `https://maxpunjab.com/weather/overlay.php?lat=${lat}&lon=${lon}&name=${encodeURIComponent(p_name)}`;
                if(wFrame.src !== wUrl) wFrame.src = wUrl;
            } else {
                wBox.style.display = "none";
            }

            let htmlArr = { fly:[], out:[], time:[] };
            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}. ${p.name}</div>`;
                if (p.status === 'fly') htmlArr.fly.push(row);
                else if (p.status === 'time') htmlArr.time.push(row);
                else if (p.status === 'out') htmlArr.out.push(row);
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - htmlArr.out.length;

            ['fly','time','out'].forEach(id => {
                const area = document.getElementById(`list-${id}`);
                const box = document.getElementById(`box-${id}`);
                if(htmlArr[id].length > 0) {
                    box.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = htmlArr[id].length;
                    const content = htmlArr[id].join('');
                    area.innerHTML = `<div class="content-block">${content}</div><div style="height:350px"></div><div class="content-block">${content}</div><div style="height:350px"></div>`;
                } else { box.style.display = "none"; }
            });
        });
    }

    function animate() {
        ['fly', 'time', 'out'].forEach(id => {
            const area = document.getElementById(`list-${id}`);
            const box = document.getElementById(`box-${id}`);
            if (area && box && box.style.display !== "none" && area.children.length > 0) {
                listPos[id] -= 1.2; 
                let firstBlock = area.querySelector('.content-block');
                if(firstBlock) {
                    let resetPoint = firstBlock.offsetHeight + 350;
                    if (Math.abs(listPos[id]) >= resetPoint) listPos[id] = 0;
                    area.style.transform = `translateY(${listPos[id]}px)`;
                }
            }
        });
        const tMove = document.getElementById('ticker-text');
        if (tMove && tMove.scrollWidth > 0) {
            tickerPos -= 2.0;
            if (Math.abs(tickerPos) >= tMove.scrollWidth / 2) tickerPos = 0;
            tMove.style.transform = `translateX(${tickerPos}px)`;
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
