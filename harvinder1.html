<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* ਚਾਰੇ ਪਾਸੇ ਘੁੰਮਣ ਵਾਲੀ ਬਾਰਡਰ ਐਨੀਮੇਸ਼ਨ */
        @keyframes snakeBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 75px; height: 260px; 
            display: flex; gap: 15px; justify-content: flex-start; 
        }
        
        .box { 
            display: none; width: 32.5%; height: 100%; position: relative; 
            background: rgba(0, 0, 0, 0.95);
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            /* ਘੈਂਟ ਬਾਰਡਰ ਇਫੈਕਟ */
            padding: 4px; 
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 300% 300%;
            animation: snakeBorder 4s linear infinite;
        }

        /* ਬਾਕਸ ਦੇ ਅੰਦਰਲਾ ਕਾਲਾ ਹਿੱਸਾ */
        .box-inner {
            background: black;
            width: 100%;
            height: 100%;
            border-radius: 8px 8px 0 0;
            position: relative;
            overflow: hidden;
        }

        .header-wrapper { 
            position: absolute; top: 0; right: 0; width: 50%; z-index: 10; 
            background: #000; border-bottom: 3px solid white; border-left: 3px solid white; 
            border-radius: 0 10px 0 10px; 
        }
        .box-header, .sum-card { height: 70px; display: flex; align-items: center; }
        .box-header { border-bottom: 2px solid white; }
        
        .header-title { 
            flex: 1; padding-left: 15px; font-weight: 900; font-size: 30px; 
            border-right: 2px solid white; height: 100%; display: flex; align-items: center; 
        }
        .count-tag, .sum-val-area { 
            width: 35%; height: 100%; display: flex; align-items: center; 
            justify-content: center; font-weight: 1000; font-size: 38px; 
        }
        .count-tag { background: #fff; color: #000; }
        .sum-val-area { background: #ffcc00; color: #000; }

        .scroll-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        
        /* ਝਟਕਾ ਰੋਕਣ ਲਈ list-area ਸੈਟਿੰਗ */
        .list-area { 
            position: absolute; width: 100%; will-change: transform; 
            display: flex; flex-direction: column; padding-top: 150px; 
        }
        .item { 
            padding: 6px 15px; font-size: 32px; font-weight: 950; color: #ffcc00; 
            border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 2px 2px 3px #000;
        }

        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 75px; 
            background: #fff; display: flex; align-items: center; 
            border-top: 6px solid red; overflow: hidden;
        }
        .live-tag { 
            background: #ff0000; color: #fff; padding: 0 25px; height: 100%; 
            display: flex; align-items: center; font-size: 30px; font-weight: 1000; 
            z-index: 10; border-right: 5px solid #000; 
        }
        .ticker-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; margin-right: 10px; }
        .ticker-move { display: flex; white-space: nowrap; font-size: 35px; font-weight: 1000; color: #000; }
        .ticker-content { display: inline-block; padding-right: 700px; } 

        .dt-box { 
            background: #ff0000; color: #fff; height: 100%; padding: 0 20px; 
            display: flex; align-items: center; justify-content: center; min-width: 250px; 
            border-left: 5px solid #000; z-index: 10; font-size: 28px; font-weight: 1000;
        }
    </style>
</head>
<body>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-inner">
            <div class="header-wrapper">
                <div class="box-header"><span class="header-title">FLYING</span><span id="count-fly" class="count-tag">0</span></div>
                <div class="sum-card"><span class="header-title">TOTAL</span><span id="m-total" class="sum-val-area">0</span></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
        </div>
    </div>

    <div id="box-out" class="box">
        <div class="box-inner">
            <div class="header-wrapper">
                <div class="box-header"><span class="header-title">OUT</span><span id="count-out" class="count-tag">0</span></div>
                <div class="sum-card"><span class="header-title">REM.</span><span id="m-rem" class="sum-val-area">0</span></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
        </div>
    </div>

    <div id="box-time" class="box">
        <div class="box-inner">
            <div class="header-wrapper">
                <div class="box-header"><span class="header-title">TIME</span><span id="count-time" class="count-tag">0</span></div>
                <div class="sum-card"><div id="m-time-val" class="sum-val-area" style="width: 100%;">--</div></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
        </div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box" id="clock-box">--:--:--</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userID = new URLSearchParams(window.location.search).get('id');

    let listPos = { fly: 0, time: 0, out: 0 };
    let tickerPos = 0;

    function updateClock() {
        document.getElementById('clock-box').innerText = new Date().toLocaleTimeString('en-US', {hour12:true});
    }
    setInterval(updateClock, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};

            document.getElementById('m-time-val').innerText = conf.boxTime || "--";
            const tickerElem = document.getElementById('ticker-text');
            tickerElem.innerHTML = `<div class="ticker-content">${conf.ticker || ""}</div><div class="ticker-content">${conf.ticker || ""}</div>`;

            let htmlArr = { fly:[], out:[], time:[] };
            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}. ${p.name}</div>`;
                if (p.status === 'fly') htmlArr.fly.push(row);
                else if (p.status === 'time') htmlArr.time.push(row);
                else if (p.status === 'out') htmlArr.out.push(row);
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - htmlArr.out.length;

            ['fly','time','out'].forEach(id => {
                const area = document.getElementById(`list-${id}`);
                const count = htmlArr[id].length;
                if(count > 0) {
                    document.getElementById(`box-${id}`).style.display = "block";
                    document.getElementById(`count-${id}`).innerText = count;
                    const content = htmlArr[id].join('');
                    // Seamless Loop Content
                    area.innerHTML = `<div>${content}</div><div style="height:350px"></div><div>${content}</div><div style="height:350px"></div>`;
                } else { document.getElementById(`box-${id}`).style.display = "none"; }
            });
        });
    }

    function animate() {
        ['fly', 'time', 'out'].forEach(id => {
            const area = document.getElementById(`list-${id}`);
            if (area && document.getElementById(`box-${id}`).style.display !== "none") {
                listPos[id] -= 1.1; 
                // ਝਟਕਾ ਰੋਕਣ ਲਈ: ਜਦੋਂ ਪਹਿਲਾ ਅੱਧਾ ਹਿੱਸਾ ਖਤਮ ਹੁੰਦਾ ਹੈ ਤਾਂ ਹੀ ਰੀਸੈੱਟ ਕਰੋ
                let halfHeight = area.scrollHeight / 2;
                if (Math.abs(listPos[id]) >= halfHeight) {
                    listPos[id] = 0;
                }
                area.style.transform = `translateY(${listPos[id]}px)`;
            }
        });

        const tMove = document.getElementById('ticker-text');
        if (tMove) {
            tickerPos -= 2.0;
            if (Math.abs(tickerPos) >= tMove.scrollWidth / 2) tickerPos = 0;
            tMove.style.transform = `translateX(${tickerPos}px)`;
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
