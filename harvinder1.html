<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --header-h: 70px; }
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        @keyframes snakeBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-container { 
            position: absolute; left: 15px; right: 15px; bottom: 95px; height: 260px; 
            display: flex; gap: 20px; justify-content: flex-start; 
        }
        
        .box { display: none; width: 32.5%; height: 100%; position: relative; padding: 4px; border-radius: 20px; overflow: hidden; }

        /* --- 1. FLYING: Sky Blue Background --- */
        #box-fly { background: #fff; animation: snakeBorder 4s linear infinite; } /* ਬਾਰਡਰ ਚਿੱਟਾ */
        #box-fly .box-inner { background: #00BFFF !important; } /* ਅੰਦਰਲਾ ਰੰਗ Sky Blue */
        #box-fly .item { color: #000 !important; border-bottom: 1px solid rgba(0,0,0,0.1); text-shadow: none; }

        /* --- 2. OUT: Red Background --- */
        #box-out { background: #fff; animation: snakeBorder 3s linear infinite; }
        #box-out .box-inner { background: #FF0000 !important; } /* ਅੰਦਰਲਾ ਰੰਗ Red */
        #box-out .item { color: #fff !important; border-bottom: 1px solid rgba(255,255,255,0.2); }

        /* --- 3. TIME: Yellow Background --- */
        #box-time { background: #000; animation: snakeBorder 5s linear infinite; }
        #box-time .box-inner { background: #FFFF00 !important; } /* ਅੰਦਰਲਾ ਰੰਗ Yellow */
        #box-time .item { color: #000 !important; border-bottom: 1px solid rgba(0,0,0,0.1); text-shadow: none; }

        .box-inner { width: 100%; height: 100%; border-radius: 16px; position: relative; overflow: hidden; }

        .header-wrapper { 
            position: absolute; top: 0; right: 0; width: 55%; z-index: 10; 
            background: #000; border-bottom: 3px solid white; border-left: 3px solid white; 
            border-radius: 0 15px 0 15px; color: white;
        }
        .box-header, .sum-card { height: var(--header-h); display: flex; align-items: center; }
        .box-header { border-bottom: 2px solid white; }
        .header-title { flex: 1; padding-left: 15px; font-weight: 900; font-size: 25px; border-right: 2px solid white; height: 100%; display: flex; align-items: center; }
        .count-tag, .sum-val-area { width: 35%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 32px; }
        .count-tag { background: #fff; color: #000; }
        .sum-val-area { background: #ffcc00; color: #000; }

        .scroll-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; will-change: transform; display: flex; flex-direction: column; padding-top: calc(var(--header-h) * 2.3); }
        .item { padding: 3px 20px; font-size: 32px; font-weight: 950; line-height: 1.0; }

        .footer { position: absolute; bottom: 0; width: 100%; height: 75px; background: #fff; display: flex; align-items: center; border-top: 6px solid red; overflow: hidden; }
        .live-tag { background: #ff0000; color: #fff; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 30px; font-weight: 1000; z-index: 10; border-right: 5px solid #000; }
        .ticker-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; margin-right: 15px; }
        .ticker-move { display: flex; white-space: nowrap; font-size: 35px; font-weight: 1000; color: #000; }
        .ticker-content { display: inline-block; padding-right: 800px; } 

        .dt-box-wrap { height: 100%; min-width: 260px; display: flex; align-items: center; justify-content: center; border-left: 5px solid #000; }
        .dt-box-snake { height: 85%; width: 92%; border-radius: 12px; padding: 3px; background: #000; }
        .dt-box-snake .box-inner { background: #000; color: white; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-inner">
            <div class="header-wrapper">
                <div class="box-header"><span class="header-title">FLYING</span><span id="count-fly" class="count-tag">0</span></div>
                <div class="sum-card"><span class="header-title">TOTAL</span><span id="m-total" class="sum-val-area">0</span></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
        </div>
    </div>

    <div id="box-out" class="box">
        <div class="box-inner">
            <div class="header-wrapper">
                <div class="box-header"><span class="header-title">OUT</span><span id="count-out" class="count-tag">0</span></div>
                <div class="sum-card"><span class="header-title">REM.</span><span id="m-rem" class="sum-val-area">0</span></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
        </div>
    </div>

    <div id="box-time" class="box">
        <div class="box-inner">
            <div class="header-wrapper">
                <div class="box-header"><span class="header-title">TIME</span><span id="count-time" class="count-tag">0</span></div>
                <div class="sum-card"><div id="m-time-val" class="sum-val-area" style="width: 100%;">--</div></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
        </div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box-wrap"><div class="dt-box-snake"><div class="box-inner"><div id="clock-box" style="font-size:26px; font-weight:1000;">--:--:--</div></div></div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userID = new URLSearchParams(window.location.search).get('id');

    let listPos = { fly: 0, time: 0, out: 0 };
    let tickerPos = 0;
    let showDate = false;
    let toggleCounter = 0;

    function updateClock() {
        const now = new Date();
        const clockBox = document.getElementById('clock-box');
        toggleCounter++;
        if (toggleCounter >= 10) { showDate = !showDate; toggleCounter = 0; }
        if (showDate) {
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            clockBox.innerText = `${d}/${m}/${now.getFullYear()}`;
        } else { clockBox.innerText = now.toLocaleTimeString('en-US', { hour12: true }); }
    }
    setInterval(updateClock, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            document.getElementById('m-time-val').innerText = conf.boxTime || "--";
            const tickerElem = document.getElementById('ticker-text');
            if(tickerElem) tickerElem.innerHTML = `<div class="ticker-content">${conf.ticker || ""}</div><div class="ticker-content">${conf.ticker || ""}</div>`;

            let htmlArr = { fly:[], out:[], time:[] };
            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}. ${p.name}</div>`;
                if (p.status === 'fly') htmlArr.fly.push(row);
                else if (p.status === 'time') htmlArr.time.push(row);
                else if (p.status === 'out') htmlArr.out.push(row);
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - htmlArr.out.length;

            ['fly','time','out'].forEach(id => {
                const area = document.getElementById(`list-${id}`);
                const box = document.getElementById(`box-${id}`);
                if(htmlArr[id].length > 0) {
                    box.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = htmlArr[id].length;
                    const content = htmlArr[id].join('');
                    area.innerHTML = `<div class="content-block">${content}</div><div style="height:350px"></div><div class="content-block">${content}</div><div style="height:350px"></div>`;
                } else { box.style.display = "none"; }
            });
        });
    }

    function animate() {
        ['fly', 'time', 'out'].forEach(id => {
            const area = document.getElementById(`list-${id}`);
            const box = document.getElementById(`box-${id}`);
            if (area && box && box.style.display !== "none" && area.children.length > 0) {
                listPos[id] -= 1.1; 
                let firstBlock = area.querySelector('.content-block');
                if(firstBlock) {
                    let resetPoint = firstBlock.offsetHeight + 350;
                    if (Math.abs(listPos[id]) >= resetPoint) listPos[id] = 0;
                    area.style.transform = `translateY(${listPos[id]}px)`;
                }
            }
        });
        const tMove = document.getElementById('ticker-text');
        if (tMove && tMove.scrollWidth > 0) {
            tickerPos -= 2.0;
            if (Math.abs(tickerPos) >= tMove.scrollWidth / 2) tickerPos = 0;
            tMove.style.transform = `translateX(${tickerPos}px)`;
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
