<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --header-h: 65px; 
            --header-w: 40%; 
        }
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', 'Raavi', sans-serif; overflow: hidden; height: 100vh; }

        /* ਘੈਂਟ ਝਮਾਕਾ (Sharp Flash for Date/Time) */
        @keyframes sharpFlash {
            0% { filter: brightness(1) contrast(1); transform: scale(1) skewX(25deg); }
            50% { filter: brightness(15) contrast(2); transform: scale(1.1) skewX(25deg); }
            100% { filter: brightness(1) contrast(1); transform: scale(1) skewX(25deg); }
        }

        /* Premium Sweep Light (20 Sec) */
        @keyframes ghaintLight {
            0% { left: -150%; opacity: 0; }
            5% { opacity: 1; }
            15% { left: 150%; opacity: 0; }
            100% { left: 150%; opacity: 0; }
        }

        .main-container { 
            position: absolute; left: 15px; right: 15px; bottom: 85px; 
            height: 280px; display: flex; gap: 15px; justify-content: flex-start; 
        }
        
        .box { 
            display: none; width: 32.5%; height: 100%; position: relative; 
            border-radius: 25px; overflow: hidden; border: 4px solid #fff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #box-fly { background: rgba(0, 191, 255, 0.85) !important; }
        #box-out { background: rgba(255, 0, 0, 0.85) !important; }
        #box-time { background: rgba(255, 255, 0, 0.85) !important; }

        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 80px; 
            background: #fff; display: flex; align-items: center; 
            border-top: 4px solid #000; z-index: 20; overflow: hidden;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
        }

        /* ਏਥੇ ਹੈ ਘੈਂਟ ਲਾਈਟ (Glass Shine Effect) */
        .footer::before {
            content: ""; position: absolute; top: 0; width: 400px; height: 100%;
            background: linear-gradient(120deg, 
                transparent, 
                rgba(255, 255, 255, 0) 20%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(255, 255, 255, 0) 80%, 
                transparent);
            animation: ghaintLight 20s infinite ease-in-out;
            z-index: 35;
            pointer-events: none;
        }

        .live-tag { 
            background: #ff0000; color: #fff; padding: 0 45px; height: 100%; 
            display: flex; align-items: center; font-size: 40px; font-weight: 1000; 
            transform: skewX(-25deg); margin-left: -25px; border-right: 5px solid #fff; z-index: 25;
            position: relative;
        }
        .live-tag span { transform: skewX(25deg); text-shadow: 2px 2px 5px rgba(0,0,0,0.5); } 

        .ticker-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; position: relative; }
        .ticker-move { display: flex; white-space: nowrap; font-size: 38px; font-weight: 1000; color: #000; }

        .dt-box-wrap { 
            height: 100%; min-width: 380px; display: flex; align-items: center; justify-content: center; 
            background: #ff0000; color: #fff; transform: skewX(-25deg); margin-right: -25px;
            border-left: 6px solid #fff; z-index: 25; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }
        
        #clock-box { font-size: 32px; font-weight: 1000; transform: skewX(25deg); text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        /* ਝਮਾਕੇ ਵਾਲੀ ਕਲਾਸ */
        .jhmaka-effect { animation: sharpFlash 0.5s ease-out; }
    </style>
</head>
<body>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box"><div class="box-inner">
        <div class="header-wrapper"><div class="box-header"><span class="header-title" id="title-fly">FLYING</span><span id="count-fly" class="count-tag">0</span></div></div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div></div>
    </div>

<div class="footer">
    <div class="live-tag"><span>LIVE</span></div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box-wrap">
        <div id="clock-box">--:--:--</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userID = new URLSearchParams(window.location.search).get('id');

    let showDate = false;

    // 15 Sec Toggle with Sharp Jhmaka
    setInterval(() => {
        const clockElem = document.getElementById('clock-box');
        clockElem.classList.add('jhmaka-effect');
        
        setTimeout(() => { showDate = !showDate; }, 250);
        setTimeout(() => { clockElem.classList.remove('jhmaka-effect'); }, 600);
    }, 15000);

    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()}`;
        document.getElementById('clock-box').innerText = showDate ? dateStr : timeStr;
    }, 1000);

    // [Baki Same Animation logic for Firebase and Ticker]
    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            const tickerElem = document.getElementById('ticker-text');
            if(tickerElem) tickerElem.innerHTML = `<div class="ticker-content">${conf.ticker || ""}</div><div class="ticker-content">${conf.ticker || ""}</div>`;
            // List update logic here...
        });
    }

    function animate() {
        // Ticker and list scroll logic here...
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
