<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }

        @keyframes borderGlow {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            25% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            50% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
            75% { border-color: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
        }

        @keyframes langFlash {
            0%, 45% { content: attr(data-pa); }
            50%, 95% { content: attr(data-en); }
        }
        .flash-text::after { content: attr(data-pa); animation: langFlash 8s infinite; }

        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 75px; height: 260px; 
            display: flex; gap: 15px; justify-content: flex-start; 
        }
        
        .box { 
            display: none; width: 32.5%; height: 100%; position: relative; 
            border: 4px solid white; border-radius: 12px 12px 0 0; 
            overflow: hidden; animation: borderGlow 6s linear infinite; background: rgba(0, 0, 0, 0.95);
        }

        .header-wrapper { position: absolute; top: 0; right: 0; width: 58%; z-index: 10; background: #000; border-bottom: 4px solid white; border-left: 4px solid white; border-radius: 0 10px 0 10px; }
        .box-header { height: 50px; display: flex; align-items: center; border-bottom: 2px solid white; }
        .sum-card { height: 45px; display: flex; align-items: center; }
        
        .header-title { flex: 1; padding-left: 8px; font-weight: 900; font-size: 26px; border-right: 2px solid white; height: 100%; display: flex; align-items: center; }
        .count-tag { width: 35%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 38px; background: #fff; color: #000; }
        .sum-val-area { background: #ffcc00; color: #000; width: 35%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 1000; font-size: 26px; }

        .scroll-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        
        .list-area { position: absolute; width: 100%; will-change: transform; display: flex; flex-direction: column; padding-top: 100px; }
        .item { padding: 2px 15px; font-size: 34px; font-weight: 950; color: #ffcc00; border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 2px 2px 3px #000; min-height: 45px; }

        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 75px; background: #fff; 
            display: flex; align-items: center; border-top: 6px solid red; overflow: hidden;
            animation: borderGlow 6s linear infinite;
        }
        .live-tag { background: #ff0000; color: #fff; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 30px; font-weight: 1000; z-index: 10; border-right: 5px solid #000; }
        .ticker-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; }
        .ticker-move { display: flex; white-space: nowrap; font-size: 35px; font-weight: 1000; color: #000; will-change: transform; }
        
        /* ਟਿੱਕਰ ਦਾ ਗੈਪ ਵਧਾ ਕੇ 650px ਕਰ ਦਿੱਤਾ ਹੈ */
        .ticker-content { display: inline-block; padding-right: 650px; } 

        .dt-box { background: #ff0000; color: #fff; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center; min-width: 240px; border-left: 5px solid #000; z-index: 10; font-size: 28px; font-weight: 1000; }
    </style>
</head>
<body>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box" style="order:1;">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title flash-text" data-pa="🕊️ ਉੱਡ ਰਹੇ" data-en="🕊️ FLYING"></span><span id="count-fly" class="count-tag">0</span></div>
            <div class="sum-card"><div class="header-title flash-text" style="border-right:2px solid white;" data-pa="ਕੁੱਲ" data-en="TOTAL"></div><div id="m-total" class="sum-val-area">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box" style="order:2;">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title flash-text" data-pa="❌ ਕੱਟੇ" data-en="❌ OUT"></span><span id="count-out" class="count-tag">0</span></div>
            <div class="sum-card"><div class="header-title flash-text" style="border-right:2px solid white;" data-pa="ਬਾਕੀ" data-en="REM."></div><div id="m-rem" class="sum-val-area">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box" style="order:3;">
        <div class="header-wrapper">
            <div class="box-header"><span class="header-title flash-text" data-pa="⏰ ਸਮਾਂ" data-en="⏰ TIME"></span><span id="count-time" class="count-tag">0</span></div>
            <div class="sum-card"><div id="m-time-val" class="sum-val-area" style="width: 100%; font-size: 26px;">--</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box" id="clock-box">--:--:--</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    let listPos = { fly: 0, time: 0, out: 0 };
    let tickerPos = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-box').innerText = now.toLocaleTimeString('en-US', {hour12:true});
    }
    setInterval(updateClock, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {}; 
            const pigeons = data.pigeons || [];
            
            document.getElementById('scoreboard-div').style.display = (conf.showScoreboard !== false) ? "flex" : "none";
            document.getElementById('ticker-div').style.display = (conf.showTicker !== false) ? "flex" : "none";
            document.getElementById('m-time-val').innerText = conf.boxTime || "--";
            
            const tickerMsg = conf.ticker || "";
            const tickerElem = document.getElementById('ticker-text');
            // Only update innerHTML if message changed to prevent flicker
            const newTickerHtml = `<div class="ticker-content">${tickerMsg}</div><div class="ticker-content">${tickerMsg}</div>`;
            if(tickerElem.innerHTML !== newTickerHtml) tickerElem.innerHTML = newTickerHtml;

            let htmlArr = { fly:[], out:[], time:[] };
            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}. ${p.name}</div>`;
                if (p.status === 'fly') htmlArr.fly.push(row);
                else if (p.status === 'time') htmlArr.time.push(row);
                else if (p.status === 'out') htmlArr.out.push(row);
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - htmlArr.out.length;

            const loopGap = '<div style="height:350px"></div>'; // Increased gap to 350px

            ['fly','time','out'].forEach(id => {
                const el = document.getElementById(`box-${id}`);
                const listArea = document.getElementById(`list-${id}`);
                const count = htmlArr[id].length;
                if(count > 0) {
                    el.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = count;
                    const combined = htmlArr[id].join('');
                    const newHtml = `<div>${combined}</div>${loopGap}<div>${combined}</div>${loopGap}`;
                    if(listArea.innerHTML !== newHtml) listArea.innerHTML = newHtml;
                } else { el.style.display = "none"; }
            });
        });
    }

    function animate() {
        ['fly', 'time', 'out'].forEach(id => {
            const listArea = document.getElementById(`list-${id}`);
            const box = document.getElementById(`box-${id}`);
            if (listArea && box.style.display !== "none") {
                listPos[id] -= 1.15; // Speed
                let limit = listArea.scrollHeight / 2;
                if (Math.abs(listPos[id]) >= limit) listPos[id] = 0;
                listArea.style.transform = `translateY(${listPos[id]}px)`;
            }
        });

        const tickerMove = document.getElementById('ticker-text');
        if (tickerMove && document.getElementById('ticker-div').style.display !== "none") {
            tickerPos -= 2.1;
            let limitT = tickerMove.scrollWidth / 2;
            if (Math.abs(tickerPos) >= limitT) tickerPos = 0;
            tickerMove.style.transform = `translateX(${tickerPos}px)`;
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
