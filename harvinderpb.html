<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* ======================================================
           ਸਾਰੀ ਸੈਟਿੰਗ (SETTINGS)
           ====================================================== */
        :root {
            /* ਸਮਰੀ ਬਾਕਸਾਂ ਦੀ ਲੋਕੇਸ਼ਨ (ਤੁਹਾਡੀ ਪੁਰਾਣੀ ਸੈਟਿੰਗ) */
            --total-bottom: 220px;  --total-left: 410px; 
            --rem-bottom: 220px;    --rem-left: 1050px; 
            --sum-w: 220px;         --sum-h: 60px;

            /* ਲਿਸਟ ਬਾਕਸਾਂ ਦੀ ਸੈਟਿੰਗ (ਟਿੱਕਰ ਦੇ ਉੱਪਰ ਪੂਰੀ ਚੌੜਾਈ) */
            --list-bottom: 70px;    /* ਟਿੱਕਰ ਦੇ ਬਿਲਕੁਲ ਉੱਪਰ */
            --list-h: 250px;        /* ਲਿਸਟ ਦੀ ਉਚਾਈ */
            --hdr-h: 60px;          /* ਹੈਡਰ ਦੀ ਉਚਾਈ */
            
            --hdr-bg: #ff9933;      /* ਹੈਡਰ ਰੰਗ */
            --name-size: 35px;      
            --label-size: 18px; 
            --count-size: 40px;
        }

        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; color: white; }

        @keyframes langFlash { 0%, 45% { content: attr(data-pa); } 50%, 95% { content: attr(data-en); } }
        .flash-text::after { content: attr(data-pa); animation: langFlash 10s infinite; }

        /* Summary Boxes (Fixed Positions) */
        .summary-card { 
            position: absolute; border: 3px solid white; border-radius: 8px; 
            overflow: hidden; display: flex; background: #000; 
            width: var(--sum-w); height: var(--sum-h); z-index: 20;
        }

        #total-box { bottom: var(--total-bottom); left: var(--total-left); }
        #rem-box { bottom: var(--rem-bottom); left: var(--rem-left); }

        /* Main Container for 3 Equal List Boxes */
        .list-wrapper {
            position: absolute;
            bottom: var(--list-bottom);
            left: 0;
            width: 100%;
            height: var(--list-h);
            display: flex;
            padding: 0 10px;
            gap: 15px;
            pointer-events: none;
        }

        .list-column {
            flex: 1; /* ਤਿੰਨੋਂ ਬਰਾਬਰ ਸਾਈਜ਼ ਦੇ ਹੋਣਗੇ */
            display: flex;
            flex-direction: column-reverse;
            visibility: hidden;
        }
        .has-data { visibility: visible !important; }

        .header-row { 
            display: flex; width: 100%; height: var(--hdr-h); 
            border: 3px solid white; border-radius: 8px; 
            background: #000; flex-shrink: 0;
        }
        
        .label-area { 
            background: #000; color: #fff; width: 65%; 
            font-size: var(--label-size); font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            border-right: 3px solid white; 
        }
        .val-area { 
            background: #fff; color: #000; width: 35%; 
            font-size: var(--count-size); font-weight: 1000; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* Status Header Colors */
        .status-hdr .label-area { background: var(--hdr-bg); color: #000; }

        /* Scrolling Window */
        .scroll-window { 
            flex-grow: 1; position: relative; overflow: hidden; 
            background: rgba(0,0,0,0.8); border: 3px solid white; 
            border-bottom: none; border-radius: 8px 8px 0 0; margin-bottom: -3px;
        }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; } 
        .item { padding: 5px 15px; font-size: var(--name-size); font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* Footer */
        .footer { position: absolute; bottom: 0; width: 100%; height: 70px; background: #fff; display: flex; align-items: center; border-top: 5px solid #ff0000; }
        .live-tag { background: #ff0000; color: #fff; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 32px; font-weight: 950; font-style: italic; border-right: 4px solid #000; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; font-size: 32px; font-weight: 950; color: #000; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .dt-box { background: #ff0000; color: #fff; height: 100%; padding: 0 20px; display: flex; justify-content: center; align-items: center; min-width: 250px; border-left: 4px solid #000; font-size: 32px; font-weight: 950; }
    </style>
</head>
<body>

<div id="total-box" class="summary-card">
    <div class="label-area flash-text" data-pa="ਕੁੱਲ" data-en="TOTAL"></div>
    <div id="m-total" class="val-area">0</div>
</div>

<div id="rem-box" class="summary-card">
    <div class="label-area flash-text" style="color:#ffcc00" data-pa="ਬਾਕੀ" data-en="REM"></div>
    <div id="m-rem" class="val-area">0</div>
</div>

<div class="list-wrapper">
    <div id="box-fly" class="list-column">
        <div class="header-row status-hdr">
            <div class="label-area flash-text" data-pa="ਉੱਡ ਰਹੇ" data-en="FLYING"></div>
            <div id="count-fly" class="val-area">0</div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="list-column">
        <div class="header-row status-hdr">
            <div class="label-area flash-text" data-pa="ਕੱਟੇ ਗਏ" data-en="OUT"></div>
            <div id="count-out" class="val-area">0</div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="list-column">
        <div class="header-row status-hdr">
            <div class="label-area flash-text" data-pa="ਸਮਾਂ" data-en="TIME"></div>
            <div id="count-time" class="val-area">0</div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div class="dt-box" id="cur-time">00:00:00 AM</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    setInterval(() => {
        const now = new Date();
        document.getElementById('cur-time').innerText = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true}).toUpperCase();
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {}; 
            const pigeons = data.pigeons || [];
            
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "";

            let counts = { fly:0, out:0, time:0 }; 
            let htmls = { fly:'', out:'', time:'' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; } 
                else if (p.status === 'time') { counts.time++; htmls.time += row; } 
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });
            
            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;

            ['fly','out','time'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                const count = document.getElementById(`count-${id}`);
                
                if(counts[id] > 0 || (id === 'fly' && pigeons.length > 0)) {
                    box.classList.add('has-data');
                    count.innerText = counts[id];
                    list.innerHTML = htmls[id] + htmls[id]; 
                    list.style.animationDuration = Math.max(counts[id] * 3, 8) + "s";
                } else {
                    box.classList.remove('has-data');
                }
            });
        });
    }
</script>
</body>
</html>
