<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* ======================================================
           ਸਾਰੀ ਸੈਟਿੰਗ ਇੱਥੋਂ ਅੱਡ-ਅੱਡ ਬਦਲੋ (INDIVIDUAL SETTINGS)
           ====================================================== */
        :root {
            /* 1. ਪਹਿਲਾ ਸਮਰੀ ਬਾਕਸ (TOTAL PIGEONS) */
            --total-bottom: 450px;    /* ਉੱਪਰ-ਥੱਲੇ */
            --total-left: 10px;      /* ਖੱਬੇ-ਸੱਜੇ */
            --total-w: 280px;        /* ਚੌੜਾਈ */
            --total-h: 75px;         /* ਉਚਾਈ */

            /* 2. ਦੂਜਾ ਸਮਰੀ ਬਾਕਸ (REMAIN PIGEONS) */
            --rem-bottom: 365px;     /* ਉੱਪਰ-ਥੱਲੇ */
            --rem-left: 10px;       /* ਖੱਬੇ-ਸੱਜੇ */
            --rem-w: 280px;         /* ਚੌੜਾਈ */
            --rem-h: 75px;          /* ਉਚਾਈ */

            /* 3. ਲਿਸਟ ਬਾਕਸਾਂ ਦਾ ਕੰਟੇਨਰ (FLY/OUT/TIME) */
            --board-bottom: 70px;
            --board-left: 10px;
            --board-right: 10px;
            --board-height: 280px;

            /* 4. ਟੈਕਸਟ ਸਾਈਜ਼ */
            --name-size: 40px;
            --label-size: 20px;
            --count-size: 45px;
        }

        /* ======================================================
           ਡਿਜ਼ਾਈਨ ਕੋਡ
           ====================================================== */
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        @keyframes langFlash {
            0%, 45% { content: attr(data-pa); }
            50%, 95% { content: attr(data-en); }
        }
        .flash-text::after { content: attr(data-pa); animation: langFlash 10s infinite; }

        /* TOTAL Box */
        #total-wrapper {
            position: absolute;
            bottom: var(--total-bottom);
            left: var(--total-left);
            z-index: 1000;
        }

        /* REMAIN Box */
        #rem-wrapper {
            position: absolute;
            bottom: var(--rem-bottom);
            left: var(--rem-left);
            z-index: 1000;
        }

        .styled-card { 
            display: flex; border: 3px solid white; border-radius: 8px; 
            overflow: hidden; background: #000;
        }

        .label-area { 
            background: #000; color: #fff; width: 65%; 
            font-size: var(--label-size); font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 3px solid white; 
        }
        .val-area { 
            background: #fff; color: #000; width: 35%; 
            font-size: var(--count-size); font-weight: 1000; display: flex; 
            align-items: center; justify-content: center; 
        }

        /* Main Boards */
        .main-container { 
            position: absolute; left: var(--board-left); right: var(--board-right); 
            bottom: var(--board-bottom); height: var(--board-height); 
            display: flex; flex-direction: row; gap: 15px; 
        }
        .box { 
            flex: 1; height: 100%; position: relative; border: 3px solid white; 
            border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; visibility: hidden;
        }
        .has-data { visibility: visible; }
        
        .box-header-new { 
            display: flex; border-bottom: 3px solid white; height: 75px; background: #000; flex-shrink: 0;
        }
        .box-header-new .label-area { background: #ff9933; color: #000; }

        /* Colors */
        #box-fly { background: #000; }
        #box-out { background: #001a66; }
        #box-time { background: #660000; }

        /* Scroll */
        .scroll-window { flex-grow: 1; position: relative; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; padding-top: 10px; } 
        .item { padding: 6px 15px; font-size: var(--name-size); font-weight: 950; color: #ffcc00; text-shadow: 3px 3px 5px black; }
        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* Footer */
        .footer { position: absolute; bottom: 0; width: 100%; height: 70px; background: #ffffff; display: flex; align-items: center; border-top: 5px solid #ff0000; }
        .live-tag { background: #ff0000; color: white; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 32px; font-weight: 950; font-style: italic; border-right: 4px solid #000; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; font-size: 32px; font-weight: 950; color: #000; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .dt-box { background: #ff0000; color: white; height: 100%; padding: 0 20px; display: flex; justify-content: center; align-items: center; min-width: 250px; border-left: 4px solid #000; }
        #cur-time { font-size: 32px; font-weight: 950; }
    </style>
</head>
<body>

<div id="total-wrapper" style="display: none;">
    <div class="styled-card" style="width: var(--total-w); height: var(--total-h);">
        <div class="label-area flash-text" data-pa="ਕੁੱਲ" data-en="TOTAL"></div>
        <div id="m-total" class="val-area">0</div>
    </div>
</div>

<div id="rem-wrapper" style="display: none;">
    <div class="styled-card" style="width: var(--rem-w); height: var(--rem-h);">
        <div class="label-area flash-text" style="color:#ffcc00" data-pa="ਬਾਕੀ" data-en="REM"></div>
        <div id="m-rem" class="val-area">0</div>
    </div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-header-new"><div class="label-area flash-text" data-pa="ਉੱਡ ਰਹੇ" data-en="FLYING"></div><div id="count-fly" class="val-area">0</div></div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>
    <div id="box-out" class="box">
        <div class="box-header-new"><div class="label-area flash-text" data-pa="ਕੱਟੇ ਗਏ" data-en="OUT"></div><div id="count-out" class="val-area">0</div></div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>
    <div id="box-time" class="box">
        <div class="box-header-new"><div class="label-area flash-text" data-pa="ਸਮਾਂ" data-en="TIME"></div><div id="count-time" class="val-area">0</div></div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div class="dt-box"><div id="cur-time">00:00:00 AM</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    setInterval(() => {
        const now = new Date();
        document.getElementById('cur-time').innerText = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true}).toUpperCase();
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {}; 
            const pigeons = data.pigeons || [];
            
            const isVisible = (pigeons.length > 0 && conf.showScoreboard);
            document.getElementById('total-wrapper').style.display = isVisible ? "block" : "none";
            document.getElementById('rem-wrapper').style.display = isVisible ? "block" : "none";
            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "";

            let counts = { fly:0, out:0, time:0 }; 
            let htmls = { fly:'', out:'', time:'' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; } 
                else if (p.status === 'time') { counts.time++; htmls.time += row; } 
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });
            
            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;

            ['fly','out','time'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                const count = document.getElementById(`count-${id}`);
                
                if(counts[id] > 0 || (id === 'fly' && pigeons.length > 0)) {
                    box.classList.add('has-data');
                    count.innerText = counts[id];
                    list.innerHTML = htmls[id] + htmls[id]; 
                    list.style.animationDuration = Math.max(counts[id] * 3, 8) + "s";
                } else {
                    box.classList.remove('has-data');
                }
            });
        });
    }
</script>
</body>
</html>
