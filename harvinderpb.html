<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Diamond Glow Animation --- */
        @keyframes diamondGlow {
            0% { border-color: #fff; box-shadow: 0 0 5px #fff; }
            50% { border-color: #00d2ff; box-shadow: 0 0 15px #00d2ff; }
            100% { border-color: #fff; box-shadow: 0 0 5px #fff; }
        }

        /* --- Main Container --- */
        .main-wrapper {
            position: absolute; left: 10px; right: 10px; bottom: 55px;
            display: flex; flex-direction: row; gap: 10px; align-items: flex-end;
        }

        /* --- Column Setup --- */
        .column-container { flex: 1; display: flex; flex-direction: column; gap: 5px; }

        /* --- Title Header (Top) --- */
        .header-box { 
            display: flex; border: 2px solid white; border-radius: 4px; 
            overflow: hidden; height: 35px; background: #000;
        }
        .header-label { 
            background: #000; color: #fff; flex: 1.5; font-size: 14px; 
            font-weight: 900; display: flex; align-items: center; justify-content: center; 
            border-right: 2px solid white;
        }
        .header-val { 
            background: #fff; color: #000; flex: 1; font-size: 22px; 
            font-weight: 1000; display: flex; align-items: center; justify-content: center;
        }

        /* --- List Box (Middle) --- */
        .list-box { 
            width: 100%; height: 200px; position: relative; 
            border: 3px solid white; border-radius: 6px; overflow: hidden;
            animation: diamondGlow 2s infinite ease-in-out;
        }
        #box-fly { background: rgba(0, 0, 0, 0.9); }
        #box-out { background: rgba(0, 26, 102, 0.9); }
        #box-time { background: rgba(204, 0, 0, 0.9); }

        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: seamless linear infinite; } 
        .item { padding: 5px 12px; font-size: 28px; font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; }

        @keyframes seamless { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Summary Card (Bottom) --- */
        .summary-box { 
            display: flex; border: 2px solid white; border-radius: 4px; 
            overflow: hidden; height: 38px; background: #000;
        }
        .summary-label { 
            background: #000; color: #fff; flex: 1.5; font-size: 13px; 
            font-weight: 900; display: flex; align-items: center; justify-content: center; 
            border-right: 2px solid white;
        }
        .summary-val { 
            background: #fff; color: #000; flex: 1; font-size: 24px; 
            font-weight: 1000; display: flex; align-items: center; justify-content: center;
        }

        /* --- Footer --- */
        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 50px; 
            background: white; display: flex; align-items: center; border-top: 4px solid #ff0000; 
        }
        .live-tag { background: #ff0000; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 24px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; font-size: 22px; font-weight: 900; color: black; white-space: nowrap; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .time-flash {
            background: #000; color: #fff; height: 100%; padding: 0 10px;
            display: flex; flex-direction: column; justify-content: center;
            font-size: 12px; font-weight: 900; min-width: 150px; text-align: center;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="column-container">
        <div class="header-box"><div class="header-label">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="header-val">0</div></div>
        <div id="box-fly" class="list-box"><div class="scroll-window"><div id="list-fly" class="list-area"></div></div></div>
        <div class="summary-box"><div class="summary-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="summary-val">0</div></div>
    </div>

    <div class="column-container">
        <div class="header-box"><div class="header-label">ਕੱਟੇ ਗਏ</div><div id="count-out" class="header-val">0</div></div>
        <div id="box-out" class="list-box"><div class="scroll-window"><div id="list-out" class="list-area"></div></div></div>
        <div class="summary-box"><div class="summary-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="summary-val">0</div></div>
    </div>

    <div class="column-container">
        <div class="header-box"><div class="header-label">ਸਮੇਂ ਚ</div><div id="count-time" class="header-count header-val">0</div></div>
        <div id="box-time" class="list-box"><div class="scroll-window"><div id="list-time" class="list-area"></div></div></div>
        <div class="summary-box">
            <div class="summary-label" style="background:#ffcc00; color:#000;">ਸਮਾਂ</div>
            <div id="admin-time" class="summary-val" style="font-size:14px; flex:2;">--:--</div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME TO THE TOURNAMENT</div></div>
    <div class="time-flash"><div id="live-date" style="color:#ffcc00">---</div><div id="live-clock">00:00:00</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    function updateDT() {
        const n = new Date();
        document.getElementById('live-date').innerText = n.toLocaleDateString('en-GB');
        document.getElementById('live-clock').innerText = n.toLocaleTimeString();
    }
    setInterval(updateDT, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time').innerText = conf.tournamentTime || "10:00 AM - 11:35 AM";

            let html = { fly:'', out:'', time:'' };
            let cnt = { fly:0, out:0, time:0 };

            pigeons.forEach((p, i) => {
                let r = `<div class="item">${i+1}-${p.name || '--'}</div>`;
                if(p.status==='fly'){ html.fly+=r; cnt.fly++; }
                else if(p.status==='out'){ html.out+=r; cnt.out++; }
                else if(p.status==='time'){ html.time+=r; cnt.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - cnt.out;
            document.getElementById('count-fly').innerText = cnt.fly;
            document.getElementById('count-out').innerText = cnt.out;
            document.getElementById('count-time').innerText = cnt.time;

            ['fly','out','time'].forEach(id => {
                const el = document.getElementById(`list-${id}`);
                el.innerHTML = html[id] + html[id]; 
                el.style.animationDuration = Math.max(cnt[id]*2, 8) + "s";
            });
        });
    }
</script>
</body>
</html>
