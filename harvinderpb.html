<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* ======================================================
           ਕੰਟਰੋਲ ਪੈਨਲ (ਇੱਥੋਂ ਸਾਈਜ਼ ਵਧਾਓ ਜਾਂ ਘਟਾਓ)
           ====================================================== */
        :root {
            /* 1. ਲਿਸਟਾਂ ਦੀ ਚੌੜਾਈ (WIDTH) */
            --fly-list-w: 600px;   /* FLYING ਲਿਸਟ ਦੀ ਚੌੜਾਈ */
            --out-list-w: 1200px;   /* OUT ਲਿਸਟ ਦੀ ਚੌੜਾਈ */
            --time-list-w: 1800px;  /* TIME ਲਿਸਟ ਦੀ ਚੌੜਾਈ */

            /* 2. ਹੈਡਰ ਅਤੇ ਸਮਰੀ ਬਾਕਸ ਦੀ ਚੌੜਾਈ */
            --header-w: 220px;      /* ਛੋਟੇ ਹੈਡਰ ਦੀ ਚੌੜਾਈ */

            /* 3. ਉਚਾਈ (HEIGHT) - ਹੈਡਰ ਕਿੰਨਾ ਉੱਚਾ ਹੋਵੇ */
            --common-h: 60px;       

            /* 4. ਟਿੱਕਰ ਦੀ ਉਚਾਈ */
            --ticker-h: 70px;

            /* 5. ਹੈਡਰਾਂ ਦੀ ਲੋਕੇਸ਼ਨ (ਤੁਹਾਡੀ ਸੈਟਿੰਗ ਮੁਤਾਬਕ) */
            --fly-h-bottom: 270px;   --fly-h-left: 400px;    
            --out-h-bottom: 270px;   --out-h-left: 1040px;    
            --time-h-bottom: 270px;  --time-h-left: 1580px;  

            /* 6. ਸਮਰੀ ਬਾਕਸ ਲੋਕੇਸ਼ਨ */
            --total-bottom: 210px;   --total-left: 400px;
            --rem-bottom: 210px;     --rem-left: 1040px;

            /* ਫੌਂਟ ਸਾਈਜ਼ */
            --name-size: 35px;      
            --label-size: 18px; 
            --count-size: 40px;
            --hdr-bg: #ff9933;      
        }

        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; color: white; }

        @keyframes langFlash { 0%, 45% { content: attr(data-pa); } 50%, 95% { content: attr(data-en); } }
        .flash-text::after { content: attr(data-pa); animation: langFlash 10s infinite; }

        /* Summary Boxes */
        .summary-card { 
            position: absolute; border: 3px solid white; border-radius: 8px; 
            overflow: hidden; display: flex; background: #000; 
            width: var(--header-w); height: var(--common-h); z-index: 10;
        }
        #total-box { bottom: var(--total-bottom); left: var(--total-left); }
        #rem-box { bottom: var(--rem-bottom); left: var(--rem-left); }

        /* List Containers */
        .list-container { 
            position: absolute; display: flex; flex-direction: column; 
            align-items: center; visibility: hidden; 
            bottom: var(--ticker-h); 
        }
        .has-data { visibility: visible !important; }

        /* Specific Width and Height Logic */
        #box-fly { 
            width: var(--fly-list-w);
            left: calc(var(--fly-h-left) - (var(--fly-list-w) - var(--header-w))/2); 
            height: calc(var(--fly-h-bottom) + var(--common-h) - var(--ticker-h)); 
        }
        #box-out { 
            width: var(--out-list-w);
            left: calc(var(--out-h-left) - (var(--out-list-w) - var(--header-w))/2); 
            height: calc(var(--out-h-bottom) + var(--common-h) - var(--ticker-h));
        }
        #box-time { 
            width: var(--time-list-w);
            left: calc(var(--time-h-left) - (var(--time-list-w) - var(--header-w))/2); 
            height: calc(var(--time-h-bottom) + var(--common-h) - var(--ticker-h));
        }

        /* Header UI */
        .header-row { 
            display: flex; width: var(--header-w); height: var(--common-h); 
            border: 3px solid white; border-radius: 8px; flex-shrink: 0; z-index: 5; background: #000;
            position: absolute; top: 0;
        }
        .label-area { background: #000; color: #fff; width: 65%; font-size: var(--label-size); font-weight: 900; display: flex; align-items: center; justify-content: center; border-right: 3px solid white; }
        .val-area { background: #fff; color: #000; width: 35%; font-size: var(--count-size); font-weight: 1000; display: flex; align-items: center; justify-content: center; }
        .status-hdr .label-area { background: var(--hdr-bg); color: #000; }

        /* Scroll Box (Width linked to variables) */
        .scroll-window { 
            width: 100%; 
            background: rgba(0,0,0,0.85); 
            border: 3px solid white; border-top: none; 
            border-radius: 0 0 12px 12px; 
            position: absolute; 
            top: var(--common-h); 
            bottom: 0; 
            overflow: hidden;
        }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; } 
        .item { padding: 5px 10px; font-size: var(--name-size); font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* Footer */
        .footer { position: absolute; bottom: 0; width: 100%; height: var(--ticker-h); background: #fff; display: flex; align-items: center; border-top: 5px solid #ff0000; z-index: 100; }
        .live-tag { background: #ff0000; color: #fff; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 32px; font-weight: 950; font-style: italic; border-right: 4px solid #000; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; font-size: 32px; font-weight: 950; color: #000; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .dt-box { background: #ff0000; color: #fff; height: 100%; padding: 0 20px; display: flex; justify-content: center; align-items: center; min-width: 250px; border-left: 4px solid #000; font-size: 32px; font-weight: 950; }
    </style>
</head>
<body>

<div id="total-box" class="summary-card">
    <div class="label-area flash-text" data-pa="ਕੁੱਲ" data-en="TOTAL"></div>
    <div id="m-total" class="val-area">0</div>
</div>

<div id="rem-box" class="summary-card">
    <div class="label-area flash-text" style="color:#ffcc00" data-pa="ਬਾਕੀ" data-en="REM"></div>
    <div id="m-rem" class="val-area">0</div>
</div>

<div id="box-fly" class="list-container">
    <div class="header-row status-hdr">
        <div class="label-area flash-text" data-pa="ਉੱਡ ਰਹੇ" data-en="FLYING">
