<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* Summary Box - Top */
        .summary-wrapper { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 1000; }
        .sum-card { padding: 12px 30px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; min-width: 220px; border: 3px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        .total-bg { background: rgba(15, 15, 15, 0.98); }
        .rem-bg { background: rgba(0, 60, 220, 0.98); }
        .time-bg { background: rgba(10, 140, 50, 0.98); }
        .sum-label { font-size: 18px; font-weight: 900; color: #f39c12; }
        .sum-val { font-size: 36px; font-weight: 950; text-shadow: 2px 2px 4px black; }

        /* Main Container */
        .main-container { position: absolute; top: 120px; right: 30px; bottom: 120px; width: 850px; display: flex; flex-direction: column; gap: 15px; }
        .box { display: none; flex: 1; border-radius: 25px; overflow: hidden; border: 4px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); position: relative; }
        #box-fly { background: rgba(0, 70, 0, 0.92); }
        #box-time { background: rgba(255, 200, 0, 1); color: black !important; }
        #box-out { background: rgba(150, 0, 0, 0.92); }

        .box-header { padding: 12px 25px; font-size: 30px; font-weight: 950; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); border-bottom: 3px solid rgba(255,255,255,0.3); }
        .count-tag { background: white; color: black; padding: 4px 25px; border-radius: 10px; font-size: 30px; font-weight: 950; }

        /* Scroll Area */
        .scroll-window { position: absolute; top: 85px; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: moveUp 15s linear infinite; }
        .item { padding: 12px 35px; display: flex; align-items: center; gap: 25px; font-size: 32px; font-weight: 900; border-bottom: 2px solid rgba(255,255,255,0.1); }
        
        @keyframes moveUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-120%); } }

        /* Footer Ticker */
        .footer { position: absolute; bottom: 0; width: 100%; height: 85px; background: #f39c12; display: flex; align-items: center; border-top: 6px solid black; }
        .live-tag { background: #ff0000; color: white; padding: 0 50px; height: 100%; display: flex; align-items: center; font-size: 36px; font-weight: 950; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; color: black; font-weight: 900; font-size: 32px; }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="summary-wrapper" id="summary-div">
    <div class="sum-card total-bg"><span class="sum-label">ਕੁੱਲ ਕਬੂਤਰ</span><span id="m-total" class="sum-val">0</span></div>
    <div class="sum-card rem-bg"><span class="sum-label">ਬਾਕੀ ਕਬੂਤਰ</span><span id="m-rem" class="sum-val">0</span></div>
    <div class="sum-card time-bg"><span class="sum-label">ਟਾਈਮ ਵਾਲੇ</span><span id="m-time" class="sum-val">0</span></div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box"><div class="box-header"><span>🕊️ ਉੱਡ ਰਹੇ</span><span id="count-fly" class="count-tag">0</span></div><div class="scroll-window"><div class="list-area" id="list-fly"></div></div></div>
    <div id="box-time" class="box"><div class="box-header"><div><span>⏰ ਟਾਈਮ ਵਾਲੇ</span><br><small id="box-time-val" style="font-size:18px;"></small></div><span id="count-time" class="count-tag">0</span></div><div class="scroll-window"><div class="list-area" id="list-time"></div></div></div>
    <div id="box-out" class="box"><div class="box-header"><span>❌ ਕੱਟੇ ਗਏ</span><span id="count-out" class="count-tag">0</span></div><div class="scroll-window"><div class="list-area" id="list-out"></div></div></div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        db.ref('users/' + userID).on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            const conf = data.config || {};
            const pigeons = data.pigeons || [];

            // Display Logic
            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "";
            document.getElementById('box-time-val').innerText = conf.boxTime || "";

            let counts = { fly: 0, out: 0, time: 0 };
            let htmls = { fly: '', out: '', time: '' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span>${idx + 1}. ${p.name}</span></div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if (p.status === 'time') { counts.time++; htmls.time += row; }
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('m-time').innerText = counts.time;

            const boxes = [
                {id: 'fly', show: conf.showFly},
                {id: 'time', show: conf.showTime},
                {id: 'out', show: true}
            ];

            boxes.forEach(b => {
                const el = document.getElementById(`box-${b.id}`);
                if(b.show && counts[b.id] > 0) {
                    el.style.display = "block";
                    document.getElementById(`count-${b.id}`).innerText = counts[b.id];
                    document.getElementById(`list-${b.id}`).innerHTML = htmls[b.id] + htmls[b.id];
                } else { el.style.display = "none"; }
            });
        });
    }
</script>
</body>
</html>
