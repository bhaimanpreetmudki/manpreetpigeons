<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* 1. Summary Box - Larger Size & Positioned Above LIVE tag */
        .summary-wrapper { 
            position: absolute; 
            bottom: 90px; /* Adjusted to sit perfectly above footer */
            left: 15px; 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            z-index: 1000; 
        }
        .sum-card { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 3px solid rgba(255,255,255,0.6); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.9);
            min-width: 260px; /* Increased Width */
            height: 70px;   /* Increased Height */
        }
        .sum-label-area { 
            background: #111; 
            padding: 10px; 
            width: 65%; 
            font-size: 18px; /* Bigger Label Font */
            font-weight: 950; 
            color: #f39c12; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .sum-val-area { 
            background: #fff; 
            color: #000; 
            padding: 10px; 
            width: 35%; 
            font-size: 38px; /* Bigger Value Font */
            font-weight: 950; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .rem-label { background: #0044cc; color: white; }
        .time-label { background: #117722; color: white; }

        /* 2. Main Container - List Box */
        .main-container { 
            position: absolute; 
            top: 10px; 
            right: 20px; 
            bottom: 85px; 
            width: 680px; 
            display: flex; 
            flex-direction: column; 
            gap: 0; 
        }
        
        .box { 
            display: none; 
            flex: 1; 
            overflow: hidden; 
            position: relative; 
            border: 4px solid rgba(255,255,255,0.3); 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(10px); 
        }

        .box-header { 
            padding: 12px 20px; 
            font-size: 26px; 
            font-weight: 950; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white;
            border-bottom: 3px solid rgba(255,255,255,0.2);
        }
        #box-fly .box-header { background: #006400; }
        #box-time .box-header { background: #ffcc00; color: black; }
        #box-out .box-header { background: #cc0000; }

        .time-header-text { display: flex; align-items: center; gap: 10px; }
        .count-tag { background: white; color: black; padding: 2px 15px; border-radius: 5px; font-size: 26px; font-weight: 950; }

        .scroll-window { position: absolute; top: 75px; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: moveUp 15s linear infinite; }
        .item { 
            padding: 10px 30px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 32px; 
            font-weight: 950; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            text-shadow: 2px 2px 4px black; 
        }
        .item-num { color: #f39c12; min-width: 50px; }

        @keyframes moveUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-120%); } }

        /* 5. Footer Ticker */
        .footer { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            height: 75px; 
            background: #000; 
            display: flex; 
            align-items: center; 
            border-top: 5px solid #f39c12; 
        }
        .live-tag { background: #ff0000; color: white; padding: 0 40px; height: 100%; display: flex; align-items: center; font-size: 32px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; color: #fff; font-weight: 900; font-size: 28px; }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .dt-box { 
            background: #111; 
            height: 100%; 
            padding: 0 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-left: 4px solid #333; 
            min-width: 300px; 
        }
        #dt-flash { font-size: 30px; font-weight: 950; color: #f39c12; animation: fadeInOut 4s infinite; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; } 20%, 80% { opacity: 1; } }

        .flash-txt::after { content: attr(data-pa); animation: flashLang 5s infinite; }
        @keyframes flashLang {
            0%, 45% { content: attr(data-pa); }
            50%, 95% { content: attr(data-en); }
        }
    </style>
</head>
<body>

<div class="summary-wrapper" id="summary-div">
    <div class="sum-card">
        <div class="sum-label-area flash-txt" data-pa="ਕੁੱਲ ਕਬੂਤਰ" data-en="TOTAL"></div>
        <div id="m-total" class="sum-val-area">0</div>
    </div>
    <div class="sum-card">
        <div class="sum-label-area rem-label flash-txt" data-pa="ਬਾਕੀ" data-en="REMAINING"></div>
        <div id="m-rem" class="sum-val-area">0</div>
    </div>
    <div class="sum-card">
        <div class="sum-label-area time-label flash-txt" data-pa="ਟਾਈਮ" data-en="TIME"></div>
        <div id="m-time" class="sum-val-area">0</div>
    </div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-header"><span class="flash-txt" data-pa="🕊️ ਉੱਡ ਰਹੇ ਕਬੂਤਰ" data-en="🕊️ FLYING"></span><span id="count-fly" class="count-tag">0</span></div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>
    
    <div id="box-time" class="box">
        <div class="box-header">
            <div class="time-header-text">
                <span class="flash-txt" data-pa="⏰ ਟਾਈਮ" data-en="⏰ TIME"></span>
                <span id="box-time-val"></span>
                <span class="flash-txt" data-pa="ਕਬੂਤਰ" data-en="PIGEONS"></span>
            </div>
            <span id="count-time" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>

    <div id="box-out" class="box">
        <div class="box-header"><span class="flash-txt" data-pa="❌ ਕੱਟੇ ਗਏ" data-en="❌ OUT"></span><span id="count-out" class="count-tag">0</span></div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div class="dt-box"><div id="dt-flash">00:00 AM</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    let showTime = true;
    setInterval(() => {
        const now = new Date();
        const el = document.getElementById('dt-flash');
        if(showTime) {
            el.innerText = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true}).toUpperCase();
        } else {
            el.innerText = now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
        }
        showTime = !showTime;
    }, 4000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const conf = data.config || {};
            const pigeons = data.pigeons || [];

            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('box-time-val').innerText = conf.boxTime || "";

            let counts = { fly: 0, out: 0, time: 0 };
            let htmls = { fly: '', out: '', time: '' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span class="item-num">${idx + 1}.</span><span>${p.name}</span></div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if (p.status === 'time') { counts.time++; htmls.time += row; }
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('m-time').innerText = counts.time;

            const boxes = [{id:'fly',sh:conf.showFly},{id:'time',sh:conf.showTime},{id:'out',sh:true}];
            boxes.forEach(b => {
                const el = document.getElementById(`box-${b.id}`);
                if(b.sh && counts[b.id] > 0) {
                    el.style.display = "block";
                    document.getElementById(`count-${b.id}`).innerText = counts[b.id];
                    document.getElementById(`list-${b.id}`).innerHTML = htmls[b.id] + htmls[b.id];
                } else { el.style.display = "none"; }
            });
        });
    }
</script>
</body>
</html>
