<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --header-h: 50px; 
        }
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* Weather Box */
        #weather-box {
            position: absolute; top: 20px; left: 10px; width: 550px; height: 120px; 
            display: none; overflow: hidden; z-index: 1001;
        }
        #weather-frame { 
            width: 550px; height: 120px; border: none; pointer-events: none;
            transform: scale(1.5); transform-origin: top left; margin-top: -10px; margin-left: 5px;
        }

        /* Summary Section (Bottom Left) */
        .summary-wrapper { position: absolute; bottom: 105px; left: 15px; display: flex; gap: 10px; z-index: 1000; }
        .sum-card { display: flex; border-radius: 8px; overflow: hidden; border: 2px solid #fff; height: 65px; min-width: 220px; }
        .sum-label-area { background: rgba(0, 0, 0, 0.9); width: 65%; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; text-align: center; }
        .sum-val-area { background: #fff; color: #000; width: 35%; font-size: 35px; font-weight: 950; display: flex; align-items: center; justify-content: center; }

        /* Main Scroll Boxes (Right Side) */
        .main-container { 
            position: absolute; top: 10px; right: 20px; bottom: 105px; 
            width: 550px; display: flex; flex-direction: column; gap: 15px; 
        }
        .box { 
            display: none; flex: 1; overflow: hidden; position: relative; 
            border: 3px solid #fff; border-radius: 15px; backdrop-filter: blur(5px);
        }

        .box-header { 
            height: var(--header-h); padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 3px solid #fff; z-index: 10; position: relative;
        }
        #box-fly .box-header { background: #0000FF; } 
        #box-fly { background: rgba(0, 0, 150, 0.8); }
        #box-time .box-header { background: #FFD700; color: black; } 
        #box-time { background: rgba(180, 150, 0, 0.8); color: black; }
        #box-out .box-header { background: #000000; } 
        #box-out { background: rgba(0, 0, 0, 0.8); }

        .header-title { font-size: 24px; font-weight: 950; }
        .count-tag { background: white; color: black; padding: 2px 10px; border-radius: 5px; font-size: 28px; font-weight: 950; }

        /* Scrolling Logic */
        .scroll-window { position: absolute; top: var(--header-h); bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; will-change: transform; }
        .item { 
            padding: 8px 20px; font-size: 38px; font-weight: 950; 
            border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 15px;
        }
        .item-num { color: #f39c12; }
        #box-time .item { color: black; border-bottom: 1px solid rgba(0,0,0,0.1); }

        @keyframes constantScroll { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-50%); } 
        }

        /* Footer Ticker */
        .footer { position: absolute; bottom: 10px; left: 10px; right: 10px; height: 85px; background: #fff; display: flex; align-items: center; border: 4px solid #000; border-radius: 15px; overflow: hidden; }
        .live-tag { background: #ff0000; color: #fff; padding: 0 40px; height: 100%; display: flex; align-items: center; font-size: 40px; font-weight: 1000; transform: skewX(-20deg); margin-left: -20px; z-index: 2; }
        .live-tag span { transform: skewX(20deg); }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; white-space: nowrap; font-size: 35px; font-weight: 1000; color: #000; padding-left: 100%; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .dt-box { background: #ff0000; height: 100%; padding: 0 30px; display: flex; align-items: center; transform: skewX(-20deg); margin-right: -20px; border-left: 5px solid #fff; }
        #dt-flash { transform: skewX(20deg); font-size: 30px; font-weight: 1000; color: #fff; min-width: 200px; text-align: center; }

        /* Multi-language Flash Animation */
        .flash-text::after { content: attr(data-en); animation: langFlash 4s infinite; }
        @keyframes langFlash { 0%, 45% { content: attr(data-en); } 50%, 95% { content: attr(data-pa); } }
    </style>
</head>
<body>

<div id="weather-box"><iframe id="weather-frame" src=""></iframe></div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-en="FLYING PIGEONS" data-pa="ਉੱਡ ਰਹੇ ਕਬੂਤਰ"></span>
            <span id="count-fly" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>
    <div id="box-time" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-en="TIME PIGEONS" data-pa="ਸਮੇਂ ਚ ਕਬੂਤਰ"></span>
            <span id="count-time" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
    <div id="box-out" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-en="OUT PIGEONS" data-pa="ਕੱਟੇ ਗਏ ਕਬੂਤਰ"></span>
            <span id="count-out" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>
</div>

<div class="summary-wrapper" id="summary-div">
    <div class="sum-card">
        <div class="sum-label-area flash-text" data-en="TOTAL" data-pa="ਕੁੱਲ"></div>
        <div id="m-total" class="sum-val-area">0</div>
    </div>
    <div class="sum-card">
        <div class="sum-label-area flash-text" data-en="REMAINING" data-pa="ਬਾਕੀ"></div>
        <div id="m-rem" class="sum-val-area">0</div>
    </div>
</div>

<div class="footer">
    <div class="live-tag"><span>LIVE</span></div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box"><div id="dt-flash">--:--:--</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userID = new URLSearchParams(window.location.search).get('id');

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('dt-flash').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};

            // Weather
            const wBox = document.getElementById('weather-box');
            if(conf.showWeather) {
                wBox.style.display = "block";
                const wUrl = `https://maxpunjab.com/weather/overlay.php?lat=${conf.lat || "30.5980"}&lon=${conf.lon || "74.7380"}&name=${encodeURIComponent(conf.pindName || "")}`;
                if(document.getElementById('weather-frame').src !== wUrl) document.getElementById('weather-frame').src = wUrl;
            } else { wBox.style.display = "none"; }

            // Ticker
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME TO LIVE TOURNAMENT";

            // Process Lists
            let htmls = { fly: '', time: '', out: '' };
            let counts = { fly: 0, time: 0, out: 0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span class="item-num">${idx + 1}.</span><span>${p.name}</span></div>`;
                if(p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if(p.status === 'time') { counts.time++; htmls.time += row; }
                else if(p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;

            ['fly', 'time', 'out'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const area = document.getElementById(`list-${id}`);
                if(counts[id] > 0) {
                    box.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = counts[id];
                    area.innerHTML = htmls[id] + htmls[id]; // Double for seamless scroll
                    area.style.animation = `constantScroll ${counts[id] * 2 + 5}s linear infinite`;
                } else {
                    box.style.display = "none";
                }
            });
        });
    }
</script>
</body>
</html>
