<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* 1. Summary Box - Flashing Animation */
        .summary-wrapper { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
        .sum-card { padding: 15px 25px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; min-width: 180px; border: 3px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        .total-bg { background: rgba(0, 0, 0, 0.85); }
        .rem-bg { background: rgba(0, 80, 255, 0.85); }
        .time-bg { background: rgba(0, 150, 50, 0.85); }

        .flash-text::after { content: attr(data-pa); animation: flashLang 6s infinite; }
        @keyframes flashLang {
            0%, 45% { content: attr(data-pa); opacity: 1; }
            50%, 95% { content: attr(data-en); opacity: 1; }
        }

        .sum-label { font-size: 24px; font-weight: 950; color: #f39c12; margin-bottom: 5px; text-shadow: 2px 2px 4px black; }
        .sum-val { font-size: 42px; font-weight: 950; text-shadow: 3px 3px 6px black; }

        /* 2. Main Containers - Touching Each Other */
        .main-container { position: absolute; top: 135px; right: 20px; bottom: 70px; width: 500px; display: flex; flex-direction: column; gap: 0; }
        .box { display: none; flex: 1; overflow: hidden; position: relative; border: 2px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); }
        #box-fly { background: rgba(0, 40, 0, 0.6); }   
        #box-time { background: rgba(255, 180, 0, 0.8); color: black !important; } 
        #box-out { background: rgba(130, 0, 0, 0.6); }

        .box-header { padding: 12px 20px; font-size: 26px; font-weight: 950; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); border-bottom: 2px solid rgba(255,255,255,0.2); }
        .count-tag { background: white; color: black; padding: 4px 15px; border-radius: 8px; font-size: 26px; font-weight: 950; }

        /* 3. List Items - Dark & Bold */
        .scroll-window { position: absolute; top: 65px; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: moveUp 15s linear infinite; }
        .item { padding: 12px 25px; display: flex; align-items: center; gap: 15px; font-size: 30px; font-weight: 950; border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 3px 3px 5px rgba(0,0,0,0.9); }
        .item-num { color: #f39c12; min-width: 45px; }
        #box-time .item { color: black; text-shadow: none; }

        @keyframes moveUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-115%); } }

        /* 4. Footer Ticker & Flashing Date-Time */
        .footer { position: absolute; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; align-items: center; border-top: 4px solid #f39c12; }
        .live-tag { background: #ff0000; color: white; padding: 0 40px; height: 100%; display: flex; align-items: center; font-size: 30px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; color: #fff; font-weight: 900; font-size: 28px; }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Date & Time Flash Box */
        .dt-box { background: #111; height: 100%; padding: 0 25px; display: flex; justify-content: center; align-items: center; border-left: 2px solid #333; min-width: 250px; }
        #dt-flash { font-size: 28px; font-weight: 950; color: #f39c12; text-align: center; }
        .fade-in-out { animation: fadeInOut 4s infinite; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; } 20%, 80% { opacity: 1; } }
    </style>
</head>
<body>

<div class="summary-wrapper" id="summary-div">
    <div class="sum-card total-bg">
        <span class="sum-label flash-text" data-pa="ਕੁੱਲ ਕਬੂਤਰ" data-en="TOTAL PIGEONS"></span>
        <span id="m-total" class="sum-val">0</span>
    </div>
    <div class="sum-card rem-bg">
        <span class="sum-label flash-text" data-pa="ਬਾਕੀ ਕਬੂਤਰ" data-en="REMAINING"></span>
        <span id="m-rem" class="sum-val">0</span>
    </div>
    <div class="sum-card time-bg">
        <span class="sum-label flash-text" data-pa="ਟਾਈਮ ਵਾਲੇ" data-en="ON TIME"></span>
        <span id="m-time" class="sum-val">0</span>
    </div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-header"><span class="flash-text" data-pa="🕊️ ਉੱਡ ਰਹੇ" data-en="FLYING"></span><span id="count-fly" class="count-tag">0</span></div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>
    <div id="box-time" class="box">
        <div class="box-header"><div><span class="flash-text" data-pa="⏰ ਟਾਈਮ" data-en="TIME"></span><br><small id="box-time-val" style="font-size:12px; font-weight:900;"></small></div><span id="count-time" class="count-tag">0</span></div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
    <div id="box-out" class="box">
        <div class="box-header"><span class="flash-text" data-pa="❌ ਕੱਟੇ ਗਏ" data-en="OUT"></span><span id="count-out" class="count-tag">0</span></div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME TO THE TOURNAMENT</div></div>
    <div class="dt-box">
        <div id="dt-flash" class="fade-in-out">00:00 AM</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    // Date & Time Flash Logic
    let showTime = true;
    function updateDateTime() {
        const dtElement = document.getElementById('dt-flash');
        const now = new Date();
        
        if (showTime) {
            // AM/PM Time Format
            let options = { hour: '2-digit', minute: '2-digit', hour12: true };
            dtElement.innerText = now.toLocaleTimeString('en-US', options).toUpperCase();
        } else {
            // Date Format
            let options = { day: '2-digit', month: 'short' };
            dtElement.innerText = now.toLocaleDateString('en-GB', options).toUpperCase();
        }
        showTime = !showTime;
    }
    // Update every 4 seconds to match the animation
    setInterval(updateDateTime, 4000);
    updateDateTime();

    if(userID) {
        db.ref('users/' + userID).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            const conf = data.config || {};
            const pigeons = data.pigeons || [];

            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "";
            document.getElementById('box-time-val').innerText = conf.boxTime || "";

            let counts = { fly: 0, out: 0, time: 0 };
            let htmls = { fly: '', out: '', time: '' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span class="item-num">${idx + 1}.</span><span>${p.name}</span></div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if (p.status === 'time') { counts.time++; htmls.time += row; }
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('m-time').innerText = counts.time;

            const boxes = [{id:'fly',sh:conf.showFly},{id:'time',sh:conf.showTime},{id:'out',sh:true}];
            boxes.forEach(b => {
                const el = document.getElementById(`box-${b.id}`);
                if(b.sh && counts[b.id] > 0) {
                    el.style.display = "block";
                    document.getElementById(`count-${b.id}`).innerText = counts[b.id];
                    document.getElementById(`list-${b.id}`).innerHTML = htmls[b.id] + htmls[b.id];
                } else { el.style.display = "none"; }
            });
        });
    }
</script>
</body>
</html>
