<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    </head>
<body>
    <script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    db.ref('users/' + userID).on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        
        // Validity Check
        if(new Date().getTime() > new Date(data.expiry).getTime()) {
            document.body.innerHTML = ""; return;
        }

        // ਇੱਥੇ ਤੁਹਾਡਾ ਪੁਰਾਣਾ updateOverlay() ਵਾਲਾ ਲੋਜਿਕ ਆਵੇਗਾ
        // ਬੱਸ ਡਾਟਾ 'data.pigeons' ਅਤੇ 'data.config' ਤੋਂ ਚੁੱਕੋ
        refreshUI(data.pigeons, data.config);
    });

    function refreshUI(pigeons, config) {
        // UI ਅਪਡੇਟ ਕਰਨ ਦਾ ਕੋਡ...
    }
</script>
</body>
</html>
