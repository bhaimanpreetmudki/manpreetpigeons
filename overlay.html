<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* Expiry Lock Screen */
        #expiry-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .lock-msg { background: #f39c12; color: #000; padding: 20px 40px; border-radius: 15px; border: 4px solid white; box-shadow: 0 0 30px rgba(243, 156, 18, 0.5); }
        .lock-msg h1 { font-size: 45px; font-weight: 950; margin-bottom: 10px; }
        .lock-msg h2 { font-size: 30px; font-weight: 800; }
        .lock-msg p { font-size: 22px; margin-top: 15px; font-weight: bold; border-top: 2px solid rgba(0,0,0,0.2); padding-top: 10px; }

        /* Summary Section */
        .summary-wrapper { position: absolute; bottom: 95px; left: 15px; display: flex; gap: 15px; z-index: 1000; }
        .sum-card { display: flex; border-radius: 8px; overflow: hidden; border: 2px solid rgba(255,255,255,0.4); box-shadow: 0 10px 25px rgba(0,0,0,0.8); min-width: 260px; height: 75px; }
        .sum-label-area { background: rgba(0, 0, 0, 0.95); width: 65%; font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; text-align: center; }
        .sum-val-area { background: #fff; color: #000; width: 35%; font-size: 40px; font-weight: 950; display: flex; align-items: center; justify-content: center; }

        .flash-text::after { content: attr(data-pa); animation: langFlash 4s infinite; }
        @keyframes langFlash { 0%, 45% { content: attr(data-pa); } 50%, 95% { content: attr(data-en); } }

        /* Main Containers */
        .main-container { position: absolute; top: 10px; right: 20px; bottom: 85px; width: 720px; display: flex; flex-direction: column; gap: 10px; }
        .box { display: none; flex: 1; overflow: hidden; position: relative; border: 3px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }

        .box-header { height: 45px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.2); }
        #box-fly .box-header { background: #0000FF; } 
        #box-fly { background: rgba(0, 0, 100, 0.8); }
        #box-time .box-header { background: #FFD700; color: black; } 
        #box-time { background: rgba(180, 150, 0, 0.8); color: black !important; }
        #box-out .box-header { background: #000000; } 
        #box-out { background: rgba(0, 0, 0, 0.8); }

        .header-title { font-size: 24px; font-weight: 950; }
        .count-tag { background: white; color: black; padding: 0 12px; border-radius: 4px; font-size: 24px; font-weight: 950; height: 32px; display: flex; align-items: center; }

        .scroll-window { position: absolute; top: 45px; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; will-change: transform; }
        .item { padding: 3px 25px; display: flex; align-items: center; gap: 15px; font-size: 40px; font-weight: 950; border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 2px 2px 4px rgba(0,0,0,1); }
        .item-num { color: #f39c12; min-width: 50px; }
        #box-time .item, #box-time .item-num { color: black; text-shadow: none; }

        @keyframes constantScroll { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-50%); } 
        }

        /* Footer */
        .footer { position: absolute; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; align-items: center; border-top: 6px solid #f39c12; }
        .live-tag { background: #ff0000; color: white; padding: 0 40px; height: 100%; display: flex; align-items: center; font-size: 55px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; color: #fff; font-weight: 950; font-size: 35px; display: flex; align-items: center; }
        .ticker-move { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 25s linear infinite; }

        @keyframes ticker { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); } 
        }

        /* Time & Date Box (LIVE Style) */
        .dt-box { 
    background: #ff0000; 
    height: 100%; 
    padding: 0 40px; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    border-left: 4px solid rgba(255,255,255,0.3); 
    
    /* 1. ਬਾਕਸ ਦੀ ਚੌੜਾਈ ਫਿਕਸ ਕਰ ਦਿਓ (ਇਹ ਹਿੱਲਣ ਤੋਂ ਰੋਕੇਗਾ) */
    width: 450px; 
    min-width: 450px; 
}

#dt-flash { 
    font-size: 45px; 
    font-weight: 950; 
    color: white; 
    font-style: italic; 
    text-align: center;
    width: 100%;
    
    /* 2. ਅੱਖਰਾਂ ਦੇ ਵਿਚਕਾਰ ਜਗ੍ਹਾ ਫਿਕਸ ਕਰ ਦਿਓ (Monospace Font ਵਰਗਾ ਪ੍ਰਭਾਵ) */
    font-variant-numeric: tabular-nums; 
    display: inline-block;
}
    </style>
</head>
<body>

<div id="expiry-lock">
    <div class="lock-msg">
        <h1>PLAN EXPIRED</h1>
        <h2>ਤੁਹਾਡਾ ਪਲਾਨ ਖ਼ਤਮ ਹੋ ਗਿਆ ਹੈ</h2>
        <p>RECHARGE ਲਈ ਸੰਪਰਕ ਕਰੋ:<br>MANPREET SINGH MUDKI<br>📞 86996-40061</p>
    </div>
</div>

<div class="summary-wrapper" id="summary-div">
    <div class="sum-card">
        <div class="sum-label-area flash-text" data-pa="ਕੁੱਲ ਕਬੂਤਰ" data-en="TOTAL PIGEONS"></div>
        <div id="m-total" class="sum-val-area">0</div>
    </div>
    <div class="sum-card">
        <div class="sum-label-area flash-text" style="border-left: 6px solid #0000FF;" data-pa="ਬਾਕੀ ਕਬੂਤਰ" data-en="REMAINING"></div>
        <div id="m-rem" class="sum-val-area">0</div>
    </div>
    <div class="sum-card">
        <div class="sum-label-area flash-text" style="border-left: 6px solid #FFD700;" data-pa="ਸਮੇਂ ਚ ਕਬੂਤਰ" data-en="TIME PIGEONS"></div>
        <div id="m-time" class="sum-val-area">0</div>
    </div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-pa="🕊️ ਉੱਡ ਰਹੇ ਕਬੂਤਰ" data-en="🕊️ FLYING PIGEONS"></span>
            <span id="count-fly" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>
    <div id="box-time" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-pa="⏰ ਸਮੇਂ ਚ ਕਬੂਤਰ" data-en="⏰ TIME PIGEONS"></span>
            <span id="box-time-val" style="font-size: 22px; font-weight: 950;"></span>
            <span id="count-time" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
    <div id="box-out" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-pa="❌ ਕੱਟੇ ਗਏ ਕਬੂਤਰ" data-en="❌ OUT PIGEONS"></span>
            <span id="count-out" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div class="dt-box">
        <div id="dt-flash">00:00:00 AM</div>
    </div>
</div>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    // --- CLOCK FLASH LOGIC ---
    let showTime = true;
    function updateClock() {
        const now = new Date();
        const el = document.getElementById('dt-flash');
        if(!el) return;

        if(showTime) {
            el.innerText = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            }).toUpperCase();
        } else {
            el.innerText = now.toLocaleDateString('en-GB', {
                day: '2-digit', month: 'short', year: 'numeric'
            }).toUpperCase();
        }
    }

    setInterval(() => { if(showTime) updateClock(); }, 1000);
    setInterval(() => { showTime = !showTime; updateClock(); }, 10000);
    updateClock();

    // --- DATA FETCHING ---
    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); 
            if(!data) return;

            // EXPIRY CHECK
            const expiryTime = new Date(data.expiry).getTime();
            const currentTime = new Date().getTime();
            if (currentTime > expiryTime) {
                document.getElementById('expiry-lock').style.display = 'flex';
                return;
            } else {
                document.getElementById('expiry-lock').style.display = 'none';
            }

            const conf = data.config || {}; 
            const pigeons = data.pigeons || [];

            // VISIBILITY
            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "";
            document.getElementById('box-time-val').innerText = conf.boxTime || "";

            // LOGIC FOR LISTS
            let counts = { fly:0, out:0, time:0 }; 
            let htmls = { fly:'', out:'', time:'' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span class="item-num">${idx + 1}.</span><span>${p.name}</span></div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if (p.status === 'time') { counts.time++; htmls.time += row; }
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('m-time').innerText = counts.time;

            ['fly','time','out'].forEach(id => {
                const el = document.getElementById(`box-${id}`);
                const listArea = document.getElementById(`list-${id}`);
                if(counts[id] > 0) {
                    el.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = counts[id];
                    let gap = '<div style="height:120px;"></div>';
                    listArea.innerHTML = htmls[id] + gap + htmls[id] + gap;
                    listArea.style.animationDuration = (counts[id] * 1.2) + "s";
                } else { 
                    el.style.display = "none"; 
                }
            });
        });
    }
</script>
</body>
</html>
