<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* Summary - Top Centered */
        .summary-wrapper { position: absolute; top: 15px; left: 55%; transform: translateX(-50%); display: flex; gap: 15px; }
        .sum-card { width: 180px; height: 110px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid rgba(255,255,255,0.4); background: rgba(0,0,0,0.8); }
        
        .flash-txt::after { content: attr(data-pa); animation: flash 5s infinite; }
        @keyframes flash { 0%, 45% { content: attr(data-pa); } 50%, 95% { content: attr(data-en); } }

        .sum-label { font-size: 18px; font-weight: 900; color: #f39c12; margin-bottom: 5px; }
        .sum-val { font-size: 42px; font-weight: 950; text-shadow: 2px 2px 4px black; }

        /* Boxes - 50% Transparency, Dark Text */
        .main-container { position: absolute; top: 10px; right: 20px; bottom: 60px; width: 650px; display: flex; flex-direction: column; gap: 0; }
        .box { display: none; flex: 1; border: 4px solid rgba(255,255,255,0.3); backdrop-filter: blur(8px); }
        #box-fly { background: rgba(0, 50, 0, 0.45); } #box-time { background: rgba(255, 190, 0, 0.6); color: black !important; } #box-out { background: rgba(150, 0, 0, 0.45); }

        .box-header { padding: 15px; font-size: 26px; font-weight: 950; display: flex; justify-content: space-between; background: rgba(0,0,0,0.7); }
        .item { padding: 12px 30px; font-size: 34px; font-weight: 950; display: flex; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 2px 2px 5px black; }
        #box-time .item { color: black; text-shadow: none; }

        /* Footer Ticker */
        .footer { position: absolute; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; border-top: 4px solid #f39c12; }
        .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; color: #fff; font-weight: 900; font-size: 26px; }
        .ticker-move { display: inline-block; animation: ticker 18s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes moveUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-120%); } }
        .list-area { position: absolute; width: 100%; animation: moveUp 15s linear infinite; }
        .scroll-window { position: absolute; top: 70px; bottom: 0; width: 100%; overflow: hidden; }
    </style>
</head>
<body>
<div class="summary-wrapper" id="summary-div">
    <div class="sum-card"><span class="sum-label flash-txt" data-pa="ਕੁੱਲ ਕਬੂਤਰ" data-en="TOTAL PIGEONS"></span><span id="m-total" class="sum-val">0</span></div>
    <div class="sum-card" style="background:rgba(0,85,255,0.8)"><span class="sum-label flash-txt" data-pa="ਬਾਕੀ ਕਬੂਤਰ" data-en="REMAINING"></span><span id="m-rem" class="sum-val">0</span></div>
    <div class="sum-card" style="background:rgba(34,136,51,0.8)"><span class="sum-label flash-txt" data-pa="ਟਾਈਮ ਵਾਲੇ" data-en="TIME PIGEONS"></span><span id="m-time" class="sum-val">0</span></div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box"><div class="box-header"><span class="flash-txt" data-pa="🕊️ ਉੱਡ ਰਹੇ" data-en="FLYING"></span><span id="count-fly">0</span></div><div class="scroll-window"><div class="list-area" id="list-fly"></div></div></div>
    <div id="box-time" class="box"><div class="box-header"><span class="flash-txt" data-pa="⏰ ਟਾਈਮ" data-en="TIME"></span><span id="count-time">0</span></div><div class="scroll-window"><div class="list-area" id="list-time"></div></div></div>
    <div id="box-out" class="box"><div class="box-header"><span class="flash-txt" data-pa="❌ ਕੱਟੇ ਗਏ" data-en="OUT"></span><span id="count-out">0</span></div><div class="scroll-window"><div class="list-area" id="list-out"></div></div></div>
</div>

<div class="footer" id="ticker-div">
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div style="padding:0 20px; font-weight:900; color:#f39c12; font-size:24px;" id="clock">00:00 AM</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true}).toUpperCase();
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {}; const pigeons = data.pigeons || [];
            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";

            let counts = { fly:0, out:0, time:0 }; let htmls = { fly:'', out:'', time:'' };
            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span>${idx + 1}. ${p.name}</span></div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if (p.status === 'time') { counts.time++; htmls.time += row; }
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });
            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('m-time').innerText = counts.time;

            ['fly','time','out'].forEach(id => {
                const el = document.getElementById('box-'+id);
                if(counts[id] > 0) { el.style.display = "block"; document.getElementById('count-'+id).innerText = counts[id]; document.getElementById('list-'+id).innerHTML = htmls[id] + htmls[id]; }
                else { el.style.display = "none"; }
            });
        });
    }
</script>
</body>
</html>
