<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* Weather Box */
        #weather-box {
            position: absolute; top: 20px; left: 10px; width: 550px; height: 120px; 
            display: none; overflow: hidden; z-index: 1001;
        }
        #weather-frame { 
            width: 550px; height: 120px; border: none; pointer-events: none;
            transform: scale(1.5); transform-origin: top left; margin-top: -10px; margin-left: 5px;
        }

        /* Expiry Lock */
        #expiry-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .lock-msg { background: #f39c12; color: #000; padding: 20px 40px; border-radius: 15px; border: 4px solid white; }

        /* Summary (Bottom Left) */
        .summary-wrapper { position: absolute; bottom: 95px; left: 15px; display: flex; gap: 15px; z-index: 1000; }
        .sum-card { display: flex; border-radius: 8px; overflow: hidden; border: 2px solid rgba(255,255,255,0.4); min-width: 240px; height: 70px; }
        .sum-label-area { background: rgba(0, 0, 0, 0.9); width: 65%; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; text-align: center; }
        .sum-val-area { background: #fff; color: #000; width: 35%; font-size: 35px; font-weight: 950; display: flex; align-items: center; justify-content: center; }

        /* Right Side Main Containers */
        .main-container { 
            position: absolute; top: 10px; right: 20px; bottom: 90px; 
            width: 580px; /* ਸੱਜੇ ਪਾਸੇ ਵਾਲੇ ਡੱਬੇ ਦੀ ਚੌੜਾਈ */
            display: flex; flex-direction: column; gap: 12px; 
        }
        .box { 
            display: none; flex: 1; overflow: hidden; position: relative; 
            border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 10px; backdrop-filter: blur(5px);
        }

        .box-header { height: 55px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.2); }
        #box-fly .box-header { background: #0000FF; } 
        #box-fly { background: rgba(0, 0, 100, 0.8); }
        #box-time .box-header { background: #FFD700; color: black; } 
        #box-time { background: rgba(180, 150, 0, 0.8); color: black !important; }
        #box-out .box-header { background: #000000; } 
        #box-out { background: rgba(0, 0, 0, 0.8); }

        .header-title { font-size: 26px; font-weight: 950; }
        .count-tag { background: white; color: black; padding: 0 15px; border-radius: 5px; font-size: 30px; font-weight: 950; height: 35px; display: flex; align-items: center; }

        /* Scrolling Logic */
        .scroll-window { position: absolute; top: 55px; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; will-change: transform; }
        .item { padding: 8px 25px; display: flex; align-items: center; gap: 15px; font-size: 38px; font-weight: 950; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .item-num { color: #f39c12; min-width: 55px; }
        #box-time .item, #box-time .item-num { color: black; }

        @keyframes constantScroll { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-50%); } 
        }

        /* Footer */
        .footer { position: absolute; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; align-items: center; border-top: 6px solid #f39c12; }
        .live-tag { background: #ff0000; color: white; padding: 0 40px; height: 100%; display: flex; align-items: center; font-size: 50px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 25s linear infinite; font-size: 35px; font-weight: 950; color: #fff; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .dt-box { background: #ff0000; height: 100%; width: 320px; display: flex; justify-content: center; align-items: center; border-left: 4px solid white; }
        #dt-flash { font-size: 32px; font-weight: 950; color: white; }

        /* Language Switching Effect */
        .flash-text::after { content: attr(data-pa); animation: langFlash 4s infinite; }
        @keyframes langFlash { 0%, 45% { content: attr(data-pa); } 50%, 95% { content: attr(data-en); } }
    </style>
</head>
<body>

<div id="weather-box"><iframe id="weather-frame" src=""></iframe></div>

<div id="expiry-lock">
    <div class="lock-msg">
        <h1>PLAN EXPIRED</h1>
        <p>RECHARGE: MANPREET MUDKI 86996-40061</p>
    </div>
</div>

<div class="summary-wrapper" id="summary-div">
    <div class="sum-card">
        <div class="sum-label-area flash-text" data-pa="ਕੁੱਲ ਕਬੂਤਰ" data-en="TOTAL"></div>
        <div id="m-total" class="sum-val-area">0</div>
    </div>
    <div class="sum-card">
        <div class="sum-label-area flash-text" data-pa="ਬਾਕੀ ਕਬੂਤਰ" data-en="REMAINING"></div>
        <div id="m-rem" class="sum-val-area">0</div>
    </div>
</div>

<div class="main-container" id="scoreboard-div">
    <div id="box-fly" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-pa="🕊️ ਉੱਡ ਰਹੇ" data-en="🕊️ FLYING"></span>
            <span id="count-fly" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>
    <div id="box-time" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-pa="⏰ ਸਮੇਂ ਚ" data-en="⏰ TIME"></span>
            <span id="count-time" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
    <div id="box-out" class="box">
        <div class="box-header">
            <span class="header-title flash-text" data-pa="❌ ਕੱਟੇ ਗਏ" data-en="❌ OUT"></span>
            <span id="count-out" class="count-tag">0</span>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>
</div>

<div class="footer" id="ticker-div">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move"></div></div>
    <div class="dt-box"><div id="dt-flash">--:--:--</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userID = new URLSearchParams(window.location.search).get('id');

    // Clock
    let showTime = true;
    setInterval(() => {
        const now = new Date();
        const el = document.getElementById('dt-flash');
        if(showTime) {
            el.innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        } else {
            el.innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
        }
    }, 1000);
    setInterval(() => { showTime = !showTime; }, 10000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {};
            const pigeons = data.pigeons || [];

            // Expiry
            if (new Date().getTime() > new Date(data.expiry).getTime()) {
                document.getElementById('expiry-lock').style.display = 'flex';
                return;
            } else { document.getElementById('expiry-lock').style.display = 'none'; }

            // Visibility
            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";

            // Weather
            const wBox = document.getElementById('weather-box');
            if(conf.showWeather) {
                wBox.style.display = "block";
                const wUrl = `https://maxpunjab.com/weather/overlay.php?lat=${conf.lat || "30.5980"}&lon=${conf.lon || "74.7380"}&name=${encodeURIComponent(conf.pindName || "")}`;
                document.getElementById('weather-frame').src = wUrl;
            } else { wBox.style.display = "none"; }

            // Data Processing
            let counts = { fly:0, time:0, out:0 };
            let htmls = { fly:'', time:'', out:'' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span class="item-num">${idx + 1}.</span><span>${p.name}</span></div>`;
                if(p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if(p.status === 'time') { counts.time++; htmls.time += row; }
                else if(p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;

            ['fly','time','out'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                if(counts[id] > 0) {
                    box.style.display = "block";
                    document.getElementById(`count-${id}`).innerText = counts[id];
                    list.innerHTML = htmls[id] + htmls[id]; // Seamless Loop
                    list.style.animationDuration = (counts[id] * 2 + 5) + "s";
                } else { box.style.display = "none"; }
            });
        });
    }
</script>
</body>
</html>
