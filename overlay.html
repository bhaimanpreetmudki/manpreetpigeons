<script>
    db.ref('users/' + userID).on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        // --- ਵੈਲਡਿਟੀ ਚੈੱਕ ---
        const now = new Date().getTime();
        const expiry = new Date(data.expiry).getTime();

        if (now > expiry) {
            document.body.innerHTML = `
                <div style="background:rgba(0,0,0,0.9); color:white; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <h1>Velditi Expired!</h1>
                    <p>ਕਿਰਪਾ ਕਰਕੇ ਪੇਮੈਂਟ ਕਰੋ ਅਤੇ ਸੇਵਾ ਚਾਲੂ ਕਰਵਾਓ।</p>
                    <a href="${data.config.paymentLink}" style="background:green; color:white; padding:20px; border-radius:10px; font-size:30px;">Pay Now / Contact Admin</a>
                </div>`;
            return;
        }

        // --- ਡਾਟਾ ਦਿਖਾਉਣਾ ---
        updateOverlay(data.pigeons, data.config);
    });

    function updateOverlay(pigeons, config) {
        // ਇਹ ਤੁਹਾਡਾ ਪੁਰਾਣਾ ਓਵਰਲੇਅ ਲੋਜਿਕ ਹੈ
        document.getElementById('ticker-text').innerText = config.ticker;
        // ... ਸਾਰੇ ਬਾਕਸ ਭਰੋ ...
    }
</script>
