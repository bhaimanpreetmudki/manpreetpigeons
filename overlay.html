<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        // ਇਹ ਫੰਕਸ਼ਨ ਡਾਟਾ ਬਦਲਦੇ ਹੀ ਆਪਣੇ ਆਪ ਚੱਲੇਗਾ (No Refresh Needed)
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); 
            if(!data) return;
            
            // 1. Expiry Check (Auto-Hide if expired)
            const now = new Date().getTime();
            const exp = new Date(data.expiry).getTime();
            if (now > exp) {
                document.getElementById('expiry-msg').style.display = "block";
                document.getElementById('main-overlay').style.display = "none";
                return;
            } else {
                document.getElementById('expiry-msg').style.display = "none";
                document.getElementById('main-overlay').style.display = "block";
            }

            const conf = data.config || {}; 
            const pigeons = data.pigeons || [];

            // 2. Auto Update Overlay Elements
            document.getElementById('scoreboard-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('summary-div').style.display = conf.showScoreboard ? "flex" : "none";
            document.getElementById('ticker-div').style.display = conf.showTicker ? "flex" : "none";
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('box-time-val').innerText = conf.boxTime || "";

            let counts = { fly:0, out:0, time:0 }; 
            let htmls = { fly:'', out:'', time:'' };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item"><span class="item-num">${idx + 1}.</span><span>${p.name}</span></div>`;
                if (p.status === 'fly') { counts.fly++; htmls.fly += row; }
                else if (p.status === 'time') { counts.time++; htmls.time += row; }
                else if (p.status === 'out') { counts.out++; htmls.out += row; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('m-time').innerText = counts.time;

            // 3. Dynamic Lists Refresh (Without Reloading Page)
            ['fly','time','out'].forEach(id => {
                const el = document.getElementById(`box-${id}`); 
                const listArea = document.getElementById(`list-${id}`);
                if((conf.showFly || id !== 'fly') && counts[id] > 0) {
                    el.style.display = "block"; 
                    document.getElementById(`count-${id}`).innerText = counts[id];
                    
                    // ਸਿਰਫ ਲਿਸਟ ਦਾ ਅੰਦਰੂਨੀ ਹਿੱਸਾ ਬਦਲੋ
                    listArea.innerHTML = htmls[id] + htmls[id]; 
                    listArea.style.animationDuration = (counts[id] * 3) + "s";
                } else { 
                    el.style.display = "none"; 
                }
            });
        }, error => {
            console.log("Firebase Error: ", error);
            // ਜੇਕਰ ਕੁਨੈਕਸ਼ਨ ਟੁੱਟ ਜਾਵੇ ਤਾਂ ਆਪਣੇ ਆਪ ਰੀ-ਕੁਨੈਕਟ ਕਰੇਗਾ
        });
    }
</script>
