<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* --- Header Labels (Yellow) --- */
        .box-header { 
            height: 45px; 
            width: 130px; 
            background: #ff9933; 
            color: black; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: absolute; 
            right: 0; 
            top: 0; 
            border-left: 3px solid white; 
            border-bottom: 3px solid white; 
            z-index: 10; 
            font-size: 22px; 
            font-weight: 900;
        }

        /* --- Main Box Layout --- */
        .main-container { 
            position: absolute; 
            left: 10px; 
            right: 10px; 
            bottom: 80px; 
            height: 280px; 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
        }

        .box { 
            flex: 1; 
            height: 100%; 
            position: relative; 
            border: 3px solid white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
        }

        #box-fly { background: #000000; } /* Black */
        #box-out { background: #001a66; } /* Dark Blue */
        #box-time { background: #cc0000; } /* Red */

        /* --- List & Items --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; padding-top: 10px; } 
        .item { 
            padding: 5px 20px; 
            font-size: 38px; 
            font-weight: 950; 
            color: #ffcc00; 
            text-shadow: 3px 3px 5px black; 
            white-space: nowrap;
        }

        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Summary Section (Total/Remain) --- */
        .summary-wrapper { position: absolute; bottom: 370px; left: 10px; display: flex; gap: 15px; }
        .sum-card { display: flex; border: 3px solid white; border-radius: 8px; overflow: hidden; height: 60px; min-width: 220px; }
        .sum-label { background: #000; color: white; padding: 0 15px; font-size: 22px; font-weight: 900; display: flex; align-items: center; border-right: 2px solid white; }
        .sum-val { background: #fff; color: #000; flex: 1; font-size: 40px; font-weight: 1000; display: flex; align-items: center; justify-content: center; }

        /* --- Footer Ticker --- */
        .footer { position: absolute; bottom: 0; width: 100%; height: 70px; background: white; display: flex; align-items: center; border-top: 5px solid #ff0000; }
        .live-tag { background: #ff0000; color: white; padding: 0 30px; height: 100%; display: flex; align-items: center; font-size: 35px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; font-size: 32px; font-weight: 900; color: black; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="summary-wrapper">
    <div class="sum-card"><div class="sum-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="sum-val">0</div></div>
    <div class="sum-card"><div class="sum-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="sum-val">0</div></div>
</div>

<div class="main-container">
    <div id="box-fly" class="box">
        <div class="box-header">ਉੱਡ ਰਹੇ</div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box">
        <div class="box-header">ਕੱਟੇ ਗਏ</div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box">
        <div class="box-header">ਸਮਾਂ</div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME TO THE TOURNAMENT 2026 LIVE</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";

            let htmls = { fly: '', out: '', time: '' };
            let counts = { fly: 0, out: 0, time: 0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;

            // Update Lists & Animations
            ['fly', 'out', 'time'].forEach(id => {
                const list = document.getElementById(`list-${id}`);
                list.innerHTML = htmls[id] + htmls[id]; // Loop fix
                list.style.animationDuration = Math.max(counts[id] * 3, 10) + "s";
            });
        });
    }
</script>
</body>
</html>
