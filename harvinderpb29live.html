<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Diamond Glow Animation --- */
        @keyframes diamondGlow {
            0% { border-color: #fff; box-shadow: 0 0 5px #fff, inset 0 0 5px #fff; }
            50% { border-color: #00d2ff; box-shadow: 0 0 20px #00d2ff, inset 0 0 10px #00d2ff; }
            100% { border-color: #fff; box-shadow: 0 0 5px #fff, inset 0 0 5px #fff; }
        }

        .main-wrapper {
            position: absolute; left: 15px; right: 15px; bottom: 80px;
            display: flex; flex-direction: row; gap: 15px; align-items: flex-end;
        }

        .column-container { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        /* --- List Boxes --- */
        .list-box { 
            width: 100%; height: 220px; position: relative; 
            border: 3px solid white; border-radius: 8px; overflow: hidden;
            animation: diamondGlow 2s infinite ease-in-out;
        }
        #box-fly { background: rgba(0, 0, 0, 0.9); }
        #box-out { background: rgba(0, 26, 102, 0.9); }
        #box-time { background: rgba(204, 0, 0, 0.9); }

        /* --- Seamless Scroll --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { 
            position: absolute; width: 100%; 
            display: flex; flex-direction: column;
            animation: seamlessScroll linear infinite; 
            padding-top: 55px; 
        } 
        .item { padding: 5px 15px; font-size: 30px; font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; }

        @keyframes seamlessScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* --- Headers & Summary Cards --- */
        .header-pos { position: absolute; right: 5px; top: 5px; z-index: 10; width: 130px; }
        .styled-card { 
            display: flex; border: 2px solid white; border-radius: 5px; 
            overflow: hidden; height: 42px; width: 100%;
            background: #000;
        }
        .card-label { 
            background: #000; color: #fff; padding: 0 10px; 
            font-size: 15px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 2px solid white;
            flex: 1.5;
        }
        .card-val { 
            background: #fff; color: #000; flex: 1; 
            font-size: 26px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center;
        }

        /* --- Footer --- */
        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 60px; 
            background: white; display: flex; align-items: center; 
            border-top: 4px solid #ff0000; 
        }
        .live-tag { 
            background: #ff0000; color: white; padding: 0 25px; height: 100%; 
            display: flex; align-items: center; font-size: 28px; font-weight: 950; font-style: italic; 
        }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { 
            display: inline-block; animation: ticker 20s linear infinite; 
            font-size: 26px; font-weight: 900; color: black; white-space: nowrap;
        }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .flash-info {
            background: #000; color: #fff; height: 100%; padding: 0 20px;
            display: flex; flex-direction: column; justify-content: center;
            font-size: 16px; font-weight: 900; min-width: 180px; text-align: center;
            border-left: 4px solid #ff0000;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="column-container">
        <div id="box-fly" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:35px;"><div class="card-label" style="font-size:12px;">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="card-val" style="font-size:20px;">0</div></div>
            </div>
            <div class="scroll-window"><div id="list-fly" class="list-area"></div></div>
        </div>
        <div class="styled-card"><div class="card-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="card-val">0</div></div>
    </div>

    <div class="column-container">
        <div id="box-out" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:35px;"><div class="card-label" style="font-size:12px;">ਕੱਟੇ ਗਏ</div><div id="count-out" class="card-val" style="font-size:20px;">0</div></div>
            </div>
            <div class="scroll-window"><div id="list-out" class="list-area"></div></div>
        </div>
        <div class="styled-card"><div class="card-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="card-val">0</div></div>
    </div>

    <div class="column-container">
        <div id="box-time" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:35px;"><div class="card-label" style="font-size:12px;">ਸਮੇਂ ਚ</div><div id="count-time" class="card-val" style="font-size:20px;">0</div></div>
            </div>
            <div class="scroll-window"><div id="list-time" class="list-area"></div></div>
        </div>
        <div class="styled-card">
            <div class="card-label" style="font-size:14px; background:#ffcc00; color:#000;">ਸਮਾਂ</div>
            <div id="admin-time" class="card-val" style="font-size:16px; flex:2;">--:--</div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div class="flash-info">
        <div id="live-date" style="color:#ffcc00">---</div>
        <div id="live-clock">00:00:00</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    function updateDateTime() {
        const now = new Date();
        document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }
    setInterval(updateDateTime, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time').innerText = conf.tournamentTime || "10:00 AM - 11:35 AM";

            let lists = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { lists.fly += row; counts.fly++; }
                else if(p.status === 'out') { lists.out += row; counts.out++; }
                else if(p.status === 'time') { lists.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const el = document.getElementById(`list-${id}`);
                // Double the list for seamless looping
                el.innerHTML = lists[id] + lists[id]; 
                el.style.animationDuration = Math.max(counts[id] * 2, 8) + "s";
            });
        });
    }
</script>
</body>
</html>
