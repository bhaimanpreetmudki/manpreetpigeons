<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Compact Styled Card --- */
        .styled-card { 
            display: flex; border: 2px solid white; border-radius: 6px; 
            overflow: hidden; height: 45px; /* ਹੋਰ ਛੋਟਾ ਸਾਈਜ਼ */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        .card-label { 
            background: #000; color: white; padding: 0 10px; 
            font-size: 16px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 2px solid white;
            min-width: 100px;
        }
        .card-val { 
            background: #fff; color: #000; flex: 1; 
            font-size: 28px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center; min-width: 50px;
        }

        /* --- Layout --- */
        .summary-wrapper { position: absolute; bottom: 300px; left: 10px; display: flex; gap: 10px; }
        
        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 80px; 
            height: 200px; /* ਲਿਸਟ ਬਾਕਸ ਛੋਟਾ ਕੀਤਾ */
            display: flex; flex-direction: row; gap: 12px; 
        }

        .box { 
            flex: 1; height: 100%; position: relative; 
            border: 2px solid white; border-radius: 10px; overflow: hidden;
            display: none; /* ਸਿਰਫ ਡਾਟਾ ਹੋਣ ਤੇ ਦਿਖੇਗਾ */
        }
        #box-fly { background: #000000; }
        #box-out { background: #001a66; }
        #box-time { background: #cc0000; }

        .box-header-wrap { position: absolute; right: 4px; top: 4px; z-index: 10; }

        /* --- Admin Time Label (ਸਮਾਂ ਬਾਕਸ ਦੇ ਹੇਠਾਂ) --- */
        .admin-time-slot {
            position: absolute; width: 100%; bottom: 0;
            background: #ffcc00; color: #000; text-align: center;
            font-size: 24px; font-weight: 1000; padding: 4px 0;
            border-top: 2px solid white; z-index: 11;
        }

        /* --- Fast & Smooth Scroll --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; padding-top: 55px; } 
        .item { padding: 4px 15px; font-size: 32px; font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; }

        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Footer --- */
        .footer { position: absolute; bottom: 0; width: 100%; height: 60px; background: white; display: flex; align-items: center; border-top: 4px solid #ff0000; }
        .live-tag { background: #ff0000; color: white; padding: 0 20px; height: 100%; display: flex; align-items: center; font-size: 30px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; animation: ticker 15s linear infinite; font-size: 28px; font-weight: 900; color: black; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="summary-wrapper">
    <div class="styled-card"><div class="card-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="card-val">0</div></div>
    <div class="styled-card"><div class="card-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="card-val">0</div></div>
</div>

<div class="main-container">
    <div id="box-fly" class="box">
        <div class="box-header-wrap"><div class="styled-card" style="height:40px;"><div class="card-label" style="min-width:80px; font-size:14px;">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="card-val" style="font-size:24px;">0</div></div></div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box">
        <div class="box-header-wrap"><div class="styled-card" style="height:40px;"><div class="card-label" style="min-width:80px; font-size:14px;">ਕੱਟੇ ਗਏ</div><div id="count-out" class="card-val" style="font-size:24px;">0</div></div></div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box">
        <div class="box-header-wrap"><div class="styled-card" style="height:40px;"><div class="card-label" style="min-width:80px; font-size:14px;">ਸਮਾਂ</div><div id="count-time" class="card-val" style="font-size:24px;">0</div></div></div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
        <div id="admin-time-val" class="admin-time-slot">--:--</div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time-val').innerText = conf.tournamentTime || "10:00 AM TO 11:35 AM";

            let htmls = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                
                // ਜੇਕਰ ਲਿਸਟ ਖਾਲੀ ਹੈ ਤਾਂ ਬਾਕਸ ਨਹੀਂ ਦਿਖੇਗਾ
                if (counts[id] > 0 || (id === 'fly' && pigeons.length > 0)) {
                    box.style.display = "block";
                    list.innerHTML = htmls[id] + htmls[id];
                    list.style.animationDuration = Math.max(counts[id] * 2, 6) + "s"; // ਤੇਜ਼ ਸਪੀਡ
                } else {
                    box.style.display = "none";
                }
            });
        });
    }
</script>
</body>
</html>
