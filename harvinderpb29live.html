<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        @keyframes langFlash {
            0%, 45% { content: attr(data-pa); }
            50%, 95% { content: attr(data-en); }
        }
        .flash::after { content: attr(data-pa); animation: langFlash 6s infinite; }

        /* --- Main Container --- */
        .main-container { 
            position: absolute; left: 15px; right: 15px; bottom: 90px; 
            height: 280px; display: flex; flex-direction: row; gap: 20px; 
        }

        .box { 
            flex: 1; height: 100%; position: relative; 
            border: 3px solid white; border-radius: 20px; 
            overflow: hidden; display: none; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        #box-fly { background: #000000; }
        #box-out { background: #001a66; border-color: #00ccff; box-shadow: 0 0 20px rgba(0, 204, 255, 0.5); }
        #box-time { background: #660000; border-color: #ff3300; box-shadow: 0 0 20px rgba(255, 51, 0, 0.5); }

        /* --- Side Panel (Header & Summary - Labels made Wider) --- */
        .side-panel {
            position: absolute; right: 10px; top: 10px; 
            display: flex; flex-direction: column; gap: 8px; z-index: 20;
            width: 240px; /* ਚੌੜਾਈ ਹੋਰ ਵਧਾਈ ਹੈ */
        }

        .mini-card { 
            display: flex; border: 3px solid white; border-radius: 10px; 
            overflow: hidden; height: 65px; background: white;
            box-shadow: 0px 5px 10px rgba(0,0,0,0.5);
        }
        .mini-label { 
            background: #000; color: white; 
            flex: 2.2; /* ਨਾਮ ਵਾਲੀ ਸਾਈਡ ਹੋਰ ਚੌੜੀ ਕੀਤੀ */
            font-size: 19px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 3px solid white;
            text-align: center; padding: 0 5px;
        }
        .mini-val { 
            background: #fff; color: #000; 
            flex: 0.8; /* ਕਾਊਂਟ ਵਾਲੀ ਸਾਈਡ ਪਤਲੀ ਰੱਖੀ */
            font-size: 38px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center;
        }

        /* --- Time Slot Style (Single Line & Bold) --- */
        .time-row-card {
            flex-direction: row !important; /* ਇਕੋ ਲਾਈਨ ਲਈ */
            height: 65px !important;
        }
        .time-label-small {
            background: #ff9933 !important; color: black !important;
            flex: 1 !important; font-size: 18px !important; font-weight: 950 !important;
            border-right: 3px solid white !important;
        }
        .time-val-text {
            background: white !important; color: black !important;
            flex: 2 !important; font-size: 20px !important; 
            font-weight: 1000 !important; /* ਬੋਲਡ ਅੱਖਰ */
            display: flex; align-items: center; justify-content: center;
        }

        /* --- Scrolling List --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; padding-top: 150px; } 
        .item { padding: 6px 25px; font-size: 42px; font-weight: 950; color: #ffcc00; text-shadow: 3px 3px 6px black; }

        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Footer --- */
        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 80px; 
            background: white; display: flex; align-items: center; border-top: 6px solid #ff0000; 
        }
        .live-tag { 
            background: #ff0000; color: white; padding: 0 35px; height: 100%; 
            display: flex; align-items: center; font-size: 40px; font-weight: 950; font-style: italic; 
        }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { 
            display: inline-block; animation: ticker 25s linear infinite; 
            font-size: 34px; font-weight: 900; color: black; padding-left: 100%; white-space: nowrap;
        }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .dt-flash-box {
            background: #ff0000; color: white; height: 100%; padding: 0 25px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-width: 280px; border-left: 6px solid black; font-weight: 1000;
        }
        #cur-date { font-size: 22px; border-bottom: 2px solid white; margin-bottom: 3px; }
        #cur-time { font-size: 30px; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="box-fly" class="box">
        <div class="side-panel">
            <div class="mini-card"><div class="mini-label flash" data-pa="ਉੱਡ ਰਹੇ" data-en="FLYING"></div><div id="count-fly" class="mini-val">0</div></div>
            <div class="mini-card"><div class="mini-label flash" data-pa="ਕੁੱਲ ਕਬੂਤਰ" data-en="TOTAL"></div><div id="m-total" class="mini-val">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box">
        <div class="side-panel">
            <div class="mini-card"><div class="mini-label flash" data-pa="ਕੱਟੇ ਗਏ" data-en="OUT"></div><div id="count-out" class="mini-val">0</div></div>
            <div class="mini-card"><div class="mini-label flash" data-pa="ਬਾਕੀ" data-en="REMAIN" style="color:#ffcc00"></div><div id="m-rem" class="mini-val">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box">
        <div class="side-panel">
            <div class="mini-card"><div class="mini-label flash" data-pa="ਸਮੇਂ ਚ" data-en="TIME IN"></div><div id="count-time" class="mini-val">0</div></div>
            <div class="mini-card time-row-card">
                <div class="mini-label time-label-small flash" data-pa="ਸਮਾਂ" data-en="TIME"></div>
                <div id="admin-time-val" class="time-val-text">--:--</div>
            </div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
    <div class="dt-flash-box">
        <div id="cur-date">-- --- ----</div>
        <div id="cur-time">00:00:00 AM</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    setInterval(() => {
        const now = new Date();
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        document.getElementById('cur-date').innerText = now.toLocaleDateString('en-GB', options).toUpperCase();
        document.getElementById('cur-time').innerText = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true}).toUpperCase();
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time-val').innerText = conf.tournamentTime || "10:00 - 11:35";

            let htmls = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                if (counts[id] > 0 || (id === 'fly' && pigeons.length > 0)) {
                    box.style.display = "block";
                    list.innerHTML = htmls[id] + htmls[id];
                    list.style.animationDuration = Math.max(counts[id] * 2, 6) + "s";
                } else {
                    box.style.display = "none";
                }
            });
        });
    }
</script>
</body>
</html>
