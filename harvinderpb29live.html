<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Golden Animated Border --- */
        .box-wrapper {
            position: relative; flex: 1; height: 100%; padding: 4px; 
            border-radius: 12px; overflow: hidden; display: none;
        }
        .box-wrapper::before {
            content: ''; position: absolute; width: 150%; height: 150%; 
            top: -25%; left: -25%; 
            background: conic-gradient(transparent, #ffd700, #fffb00, transparent 40%);
            animation: goldRotate 6s linear infinite;
        }
        @keyframes goldRotate { 100% { transform: rotate(360deg); } }

        .box { 
            position: relative; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); border-radius: 9px; 
            overflow: hidden; z-index: 2; 
        }
        #box-fly .box { background: #000; }
        #box-out .box { background: #001a66; }
        #box-time .box { background: #660000; }

        /* --- Styled Labels (Summary & Headers) --- */
        .styled-card { 
            display: flex; border: 3px solid #ffd700; border-radius: 8px; 
            overflow: hidden; height: 60px; background: #000;
        }
        .card-label { 
            background: #000; color: #ffd700; padding: 0 15px; 
            font-size: 22px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 3px solid #ffd700;
            min-width: 140px;
        }
        .card-val { 
            background: #fff; color: #000; flex: 1; 
            font-size: 45px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center; min-width: 70px;
        }

        /* --- Layout Positioning --- */
        .summary-wrapper { 
            position: absolute; bottom: 335px; left: 10px; display: flex; gap: 15px; 
            z-index: 20;
        }
        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 70px; 
            height: 255px; display: flex; flex-direction: row; gap: 15px; 
        }
        .box-header-wrap { position: absolute; right: 8px; top: 8px; z-index: 10; }

        /* --- Admin Time Slot --- */
        .admin-time-slot {
            position: absolute; width: 100%; bottom: 0;
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: #000; text-align: center; font-size: 24px; 
            font-weight: 1000; padding: 6px 0; border-top: 2px solid white; z-index: 11;
        }

        /* --- Scrolling List --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; padding-top: 75px; } 
        .item { padding: 5px 20px; font-size: 42px; font-weight: 950; color: #ffcc00; text-shadow: 3px 3px 6px black; }
        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Footer with Date/Time --- */
        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 70px; 
            background: white; display: flex; align-items: center; border-top: 5px solid #ff0000; 
        }
        .live-tag { 
            background: #ff0000; color: white; padding: 0 30px; height: 100%; 
            display: flex; align-items: center; font-size: 32px; font-weight: 950; 
        }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { 
            display: inline-block; animation: ticker 20s linear infinite; 
            font-size: 30px; font-weight: 900; color: black; padding-left: 100%; white-space: nowrap;
        }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .date-time-box {
            background: #000; color: #fff; height: 100%; padding: 0 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; border-left: 4px solid #ff0000; min-width: 250px;
        }
        #cur-date { font-size: 16px; font-weight: 800; color: #ffd700; }
        #cur-time { font-size: 28px; font-weight: 900; }
    </style>
</head>
<body>

<div class="summary-wrapper" id="summary-area">
    <div class="styled-card"><div class="card-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="card-val">0</div></div>
    <div class="styled-card"><div class="card-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="card-val">0</div></div>
</div>

<div class="main-container">
    <div id="box-fly" class="box-wrapper">
        <div class="box">
            <div class="box-header-wrap"><div class="styled-card"><div class="card-label">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="card-val">0</div></div></div>
            <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
        </div>
    </div>

    <div id="box-out" class="box-wrapper">
        <div class="box">
            <div class="box-header-wrap"><div class="styled-card"><div class="card-label">ਕੱਟੇ ਗਏ</div><div id="count-out" class="card-val">0</div></div></div>
            <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
        </div>
    </div>

    <div id="box-time" class="box-wrapper">
        <div class="box">
            <div class="box-header-wrap"><div class="styled-card"><div class="card-label">ਸਮਾਂ</div><div id="count-time" class="card-val">0</div></div></div>
            <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
            <div id="admin-time-val" class="admin-time-slot">--:--</div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME TO THE TOURNAMENT</div></div>
    <div class="date-time-box">
        <div id="cur-date">--/--/----</div>
        <div id="cur-time">00:00:00</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    // Live Date and Time
    setInterval(() => {
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB').toUpperCase();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' }).toUpperCase();
        document.getElementById('cur-date').innerText = dateStr;
        document.getElementById('cur-time').innerText = timeStr;
    }, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time-val').innerText = conf.tournamentTime || "10:00 AM - 11:35 AM";

            let htmls = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const wrap = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                if (counts[id] > 0 || (id === 'fly' && pigeons.length > 0)) {
                    wrap.style.display = "block";
                    list.innerHTML = htmls[id] + htmls[id];
                    list.style.animationDuration = Math.max(counts[id] * 2, 7) + "s";
                } else {
                    wrap.style.display = "none";
                }
            });
        });
    }
</script>
</body>
</html>
