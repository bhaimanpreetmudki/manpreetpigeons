<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Main Container --- */
        .main-container { 
            position: absolute; left: 10px; right: 10px; bottom: 80px; 
            height: 250px; display: flex; flex-direction: row; gap: 15px; 
        }

        .box { 
            flex: 1; height: 100%; position: relative; 
            border: 3px solid white; border-radius: 12px; overflow: hidden; 
            display: none; 
        }
        #box-fly { background: #000000; }
        #box-out { background: #001a66; }
        #box-time { background: #660000; }

        /* --- Double Header Style (Stacked on Right Side) --- */
        .side-panel {
            position: absolute; right: 5px; top: 5px; 
            display: flex; flex-direction: column; gap: 4px; z-index: 20;
            width: 150px;
        }

        .mini-card { 
            display: flex; border: 2px solid white; border-radius: 6px; 
            overflow: hidden; height: 40px; background: white;
        }
        .mini-label { 
            background: #000; color: white; flex: 1.5;
            font-size: 13px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 2px solid white;
        }
        .mini-val { 
            background: #fff; color: #000; flex: 1; 
            font-size: 24px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center;
        }

        /* --- Scrolling List --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: constantScroll linear infinite; padding-top: 100px; } 
        .item { padding: 5px 20px; font-size: 36px; font-weight: 950; color: #ffcc00; text-shadow: 3px 3px 5px black; }

        @keyframes constantScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Footer Ticker --- */
        .footer { position: absolute; bottom: 0; width: 100%; height: 65px; background: white; display: flex; align-items: center; border-top: 5px solid #ff0000; }
        .live-tag { background: #ff0000; color: white; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 32px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; font-size: 30px; font-weight: 900; color: black; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="main-container">
    <div id="box-fly" class="box">
        <div class="side-panel">
            <div class="mini-card"><div class="mini-label">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="mini-val">0</div></div>
            <div class="mini-card"><div class="mini-label">ਕੁੱਲ</div><div id="m-total" class="mini-val">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
    </div>

    <div id="box-out" class="box">
        <div class="side-panel">
            <div class="mini-card"><div class="mini-label">ਕੱਟੇ ਗਏ</div><div id="count-out" class="mini-val">0</div></div>
            <div class="mini-card"><div class="mini-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="mini-val">0</div></div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
    </div>

    <div id="box-time" class="box">
        <div class="side-panel">
            <div class="mini-card"><div class="mini-label">ਸਮੇਂ ਚ</div><div id="count-time" class="mini-val">0</div></div>
            <div class="mini-card" style="height: auto; min-height: 40px; flex-direction: column;">
                <div class="mini-label" style="width: 100%; border-right: 0; border-bottom: 1px solid white; background: #ff9933; color: black;">ਸਮਾਂ</div>
                <div id="admin-time-val" style="background: white; color: black; font-size: 16px; font-weight: 900; text-align: center; padding: 2px;">--:--</div>
            </div>
        </div>
        <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time-val').innerText = conf.tournamentTime || "10:00 AM - 11:35 AM";

            let htmls = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const list = document.getElementById(`list-${id}`);
                if (counts[id] > 0 || (id === 'fly' && pigeons.length > 0)) {
                    box.style.display = "block";
                    list.innerHTML = htmls[id] + htmls[id];
                    list.style.animationDuration = Math.max(counts[id] * 2, 6) + "s";
                } else {
                    box.style.display = "none";
                }
            });
        });
    }
</script>
</body>
</html>
