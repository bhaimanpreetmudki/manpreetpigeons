<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Global Box Styling with Glow Effect --- */
        .styled-card { 
            display: flex; border: 2px solid white; border-radius: 4px; 
            overflow: hidden; height: 38px; width: 100%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .card-label { 
            background: #000; color: white; padding: 0 8px; 
            font-size: 14px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 2px solid white;
            flex: 1.4;
        }
        .card-val { 
            background: #fff; color: #000; flex: 1; 
            font-size: 24px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center;
        }

        /* --- Layout --- */
        .main-wrapper {
            position: absolute; left: 10px; right: 10px; bottom: 70px;
            display: flex; flex-direction: row; gap: 12px; align-items: flex-end;
        }

        .column-container { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        /* --- Animated Glow Boxes (Diamond Shine) --- */
        .list-box { 
            width: 100%; height: 200px; position: relative; 
            border: 3px solid #fff; border-radius: 8px; overflow: hidden;
            animation: borderGlow 2s infinite alternate;
        }
        @keyframes borderGlow {
            from { box-shadow: 0 0 5px #fff, 0 0 10px #fff; border-color: #fff; }
            to { box-shadow: 0 0 15px #00d2ff, 0 0 25px #00d2ff; border-color: #00d2ff; }
        }

        #box-fly { background: #000000; }
        #box-out { background: #001a66; }
        #box-time { background: #cc0000; }

        .header-pos { position: absolute; right: 4px; top: 4px; z-index: 10; width: 120px; }

        /* --- Smooth Continuous Scrolling (No Jumps) --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { 
            position: absolute; width: 100%; 
            display: flex; flex-direction: column;
            animation: continuousScroll linear infinite; 
            padding-top: 50px; 
        } 
        .item { padding: 4px 12px; font-size: 28px; font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; white-space: nowrap; }

        @keyframes continuousScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); } /* Exactly half for seamless loop */
        }

        /* --- Footer with Flash Date/Time --- */
        .footer { 
            position: absolute; bottom: 0; width: 100%; height: 55px; 
            background: white; display: flex; align-items: center; 
            border-top: 4px solid #ff0000; 
        }
        .live-tag { 
            background: #ff0000; color: white; padding: 0 20px; height: 100%; 
            display: flex; align-items: center; font-size: 26px; font-weight: 950; font-style: italic; 
        }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { 
            display: inline-block; animation: ticker 15s linear infinite; 
            font-size: 24px; font-weight: 900; color: black; padding-left: 100%; 
        }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Flash Effect for Date/Time */
        .flash-info {
            background: #000; color: #fff; height: 100%; padding: 0 15px;
            display: flex; flex-direction: column; justify-content: center;
            font-size: 14px; font-weight: 900; min-width: 150px; text-align: center;
            border-left: 3px solid #ff0000;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="column-container">
        <div id="box-fly" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:30px;"><div class="card-label" style="font-size:11px;">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="card-val" style="font-size:18px;">0</div></div>
            </div>
            <div class="scroll-window"><div id="list-fly" class="list-area"></div></div>
        </div>
        <div class="styled-card"><div class="card-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="card-val">0</div></div>
    </div>

    <div class="column-container">
        <div id="box-out" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:30px;"><div class="card-label" style="font-size:11px;">ਕੱਟੇ ਗਏ</div><div id="count-out" class="card-val" style="font-size:18px;">0</div></div>
            </div>
            <div class="scroll-window"><div id="list-out" class="list-area"></div></div>
        </div>
        <div class="styled-card"><div class="card-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="card-val">0</div></div>
    </div>

    <div class="column-container">
        <div id="box-time" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:30px;"><div class="card-label" style="font-size:11px;">ਸਮੇਂ ਚ</div><div id="count-time" class="card-val" style="font-size:18px;">0</div></div>
            </div>
            <div class="scroll-window"><div id="list-time" class="list-area"></div></div>
        </div>
        <div class="styled-card">
            <div class="card-label" style="font-size:13px; background:#ffcc00; color:#000;">ਸਮਾਂ</div>
            <div id="admin-time" class="card-val" style="font-size:14px; flex:2;">10:00 AM - 11:35 AM</div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME TO THE TOURNAMENT 2026</div></div>
    <div class="flash-info">
        <div id="live-date" style="color:#ffcc00">---</div>
        <div id="live-clock">00:00:00 PM</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    // Smooth Clock & Date Function
    function updateClock() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        const timeStr = now.toLocaleTimeString('en-US', { hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit' });
        document.getElementById('live-date').innerText = dateStr;
        document.getElementById('live-clock').innerText = timeStr;
    }
    setInterval(updateClock, 1000);

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time').innerText = conf.tournamentTime || "10:00 AM - 11:35 AM";

            let htmls = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const list = document.getElementById(`list-${id}`);
                // Duplicate items for seamless looping
                list.innerHTML = htmls[id] + htmls[id] + htmls[id]; 
                let duration = Math.max(counts[id] * 1.5, 5); // Smooth speed
                list.style.animationDuration = duration + "s";
            });
        });
    }
</script>
</body>
</html>
