<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* --- Global Box Styling --- */
        .styled-card { 
            display: flex; border: 2px solid white; border-radius: 4px; 
            overflow: hidden; height: 38px; width: 100%;
        }
        .card-label { 
            background: #000; color: white; padding: 0 8px; 
            font-size: 14px; font-weight: 900; display: flex; 
            align-items: center; justify-content: center; border-right: 2px solid white;
            flex: 1.4;
        }
        .card-val { 
            background: #fff; color: #000; flex: 1; 
            font-size: 24px; font-weight: 1000; display: flex; 
            align-items: center; justify-content: center;
        }

        /* --- Layout --- */
        .main-wrapper {
            position: absolute; left: 10px; right: 10px; bottom: 70px;
            display: flex; flex-direction: row; gap: 10px; align-items: flex-end;
        }

        .column-container { flex: 1; display: flex; flex-direction: column; gap: 6px; }

        /* --- List Boxes --- */
        .list-box { 
            width: 100%; height: 180px; position: relative; 
            border: 2px solid white; border-radius: 8px; overflow: hidden;
        }
        #box-fly { background: #000000; }
        #box-out { background: #001a66; }
        #box-time { background: #cc0000; }

        /* --- Header Position --- */
        .header-pos { position: absolute; right: 4px; top: 4px; z-index: 10; width: 120px; }

        /* --- Scrolling Area --- */
        .scroll-window { position: absolute; top: 0; bottom: 0; width: 100%; overflow: hidden; }
        .list-area { position: absolute; width: 100%; animation: scroll linear infinite; padding-top: 50px; } 
        .item { padding: 3px 12px; font-size: 28px; font-weight: 950; color: #ffcc00; text-shadow: 2px 2px 4px black; }

        @keyframes scroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- Footer --- */
        .footer { position: absolute; bottom: 0; width: 100%; height: 50px; background: white; display: flex; align-items: center; border-top: 3px solid #ff0000; }
        .live-tag { background: #ff0000; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 24px; font-weight: 950; font-style: italic; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { display: inline-block; animation: ticker 15s linear infinite; font-size: 24px; font-weight: 900; color: black; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="column-container">
        <div id="box-fly" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:30px;"><div class="card-label" style="font-size:11px;">ਉੱਡ ਰਹੇ</div><div id="count-fly" class="card-val" style="font-size:18px;">0</div></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-fly"></div></div>
        </div>
        <div class="styled-card"><div class="card-label">ਕੁੱਲ ਕਬੂਤਰ</div><div id="m-total" class="card-val">0</div></div>
    </div>

    <div class="column-container">
        <div id="box-out" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:30px;"><div class="card-label" style="font-size:11px;">ਕੱਟੇ ਗਏ</div><div id="count-out" class="card-val" style="font-size:18px;">0</div></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-out"></div></div>
        </div>
        <div class="styled-card"><div class="card-label" style="color:#ffcc00">ਬਾਕੀ</div><div id="m-rem" class="card-val">0</div></div>
    </div>

    <div class="column-container">
        <div id="box-time" class="list-box">
            <div class="header-pos">
                <div class="styled-card" style="height:30px;"><div class="card-label" style="font-size:11px;">ਸਮੇਂ ਚ</div><div id="count-time" class="card-val" style="font-size:18px;">0</div></div>
            </div>
            <div class="scroll-window"><div class="list-area" id="list-time"></div></div>
        </div>
        <div class="styled-card">
            <div class="card-label" style="font-size:13px; background:#ffcc00; color:#000;">ਸਮਾਂ</div>
            <div id="admin-time" class="card-val" style="font-size:14px; flex:2;">10:00 AM - 11:35 AM</div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="live-tag">LIVE</div>
    <div class="ticker-wrap"><div id="ticker-text" class="ticker-move">WELCOME</div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const pigeons = data.pigeons || [];
            const conf = data.config || {};
            
            document.getElementById('ticker-text').innerText = conf.ticker || "WELCOME";
            document.getElementById('admin-time').innerText = conf.tournamentTime || "10:00 AM - 11:35 AM";

            let htmls = { fly:'', out:'', time:'' };
            let counts = { fly:0, out:0, time:0 };

            pigeons.forEach((p, idx) => {
                let row = `<div class="item">${idx + 1}-${p.name || '---'}</div>`;
                if(p.status === 'fly') { htmls.fly += row; counts.fly++; }
                else if(p.status === 'out') { htmls.out += row; counts.out++; }
                else if(p.status === 'time') { htmls.time += row; counts.time++; }
            });

            document.getElementById('m-total').innerText = pigeons.length;
            document.getElementById('m-rem').innerText = pigeons.length - counts.out;
            document.getElementById('count-fly').innerText = counts.fly;
            document.getElementById('count-out').innerText = counts.out;
            document.getElementById('count-time').innerText = counts.time;

            ['fly','out','time'].forEach(id => {
                const list = document.getElementById(`list-${id}`);
                list.innerHTML = htmls[id] + htmls[id];
                list.style.animationDuration = Math.max(counts[id] * 2, 6) + "s";
            });
        });
    }
</script>
</body>
</html>
