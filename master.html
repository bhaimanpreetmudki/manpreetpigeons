<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Master Control - Pigeon Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; padding: 20px; }
        .card { background: #1a1d21; padding: 25px; border-radius: 15px; border: 1px solid #f39c12; max-width: 800px; margin: auto; }
        h2 { color: #f39c12; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 12px; background: #0f1113; border: 1px solid #444; color: white; border-radius: 8px; flex: 1; }
        button { padding: 12px 20px; background: #f39c12; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        a { color: #f39c12; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 ਮਾਸਟਰ ਕੰਟਰੋਲ ਪੈਨਲ</h2>
        <div class="input-group">
            <input type="text" id="cID" placeholder="ਕਲਾਇੰਟ ID (e.g. rahul01)">
            <input type="password" id="cPass" placeholder="ਪਾਸਵਰਡ">
            <input type="datetime-local" id="cExpiry">
            <button onclick="createClient()">Create Client</button>
        </div>
        <table id="clientTable">
            <thead><tr><th>Client ID</th><th>Expiry</th><th>Links</th><th>Action</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

<script>
    // ਅਪਣਾ Firebase Config ਇੱਥੇ ਪਾਓ
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function createClient() {
        const id = document.getElementById('cID').value.trim().toLowerCase();
        const pass = document.getElementById('cPass').value;
        const expiry = document.getElementById('cExpiry').value;
        if(!id || !pass || !expiry) return alert("ਪੂਰੀ ਜਾਣਕਾਰੀ ਭਰੋ");

        db.ref('users/' + id).set({
            password: pass, expiry: expiry,
            config: { ticker: "WELCOME", showScoreboard: true, showTicker: true, showFly: true, showTime: true },
            pigeons: []
        }).then(() => alert("Client Created!"));
    }

    db.ref('users').on('value', snap => {
        const data = snap.val();
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = "";
        for(let id in data) {
            const baseUrl = window.location.href.split('master.html')[0];
            tbody.innerHTML += `<tr>
                <td><b>${id}</b></td>
                <td>${data[id].expiry}</td>
                <td>
                    <a href="${baseUrl}admin.html?id=${id}" target="_blank">ADMIN</a> | 
                    <a href="${baseUrl}overlay.html?id=${id}" target="_blank">OVERLAY</a>
                </td>
                <td><button onclick="deleteClient('${id}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px;">DEL</button></td>
            </tr>`;
        }
    });

    function deleteClient(id) { if(confirm("Delete?")) db.ref('users/' + id).remove(); }
</script>
</body>
</html>
