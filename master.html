<div class="card">
    <h2>🏆 ਮਾਸਟਰ ਕੰਟਰੋਲ (Version 2.0)</h2>
    <div class="input-group">
        <input type="text" id="cID" placeholder="ਕਲਾਇੰਟ ID">
        <input type="password" id="cPass" placeholder="ਪਾਸਵਰਡ">
        <input type="datetime-local" id="cExpiry"> <button onclick="createClient()">CREATE</button>
    </div>
    <div id="clientTable"></div>
</div>

<script>
    // ... Firebase Config ...
    function createClient() {
        const id = document.getElementById('cID').value.trim().toLowerCase();
        const expiry = document.getElementById('cExpiry').value; // ISO format
        if(!id || !expiry) return alert("ID ਅਤੇ ਸਮਾਂ ਭਰਨਾ ਜ਼ਰੂਰੀ ਹੈ!");

        db.ref('users/' + id).set({
            password: document.getElementById('cPass').value,
            expiry: expiry,
            config: { ticker: "WELCOME", showScoreboard: true, boxTime: "10:00 AM", paymentLink: "https://wa.me/91XXXXXXXXXX" }, // ਤੁਹਾਡਾ WhatsApp ਲਿੰਕ
            pigeons: []
        }).then(() => alert("Client Created Successfully!"));
    }
    // ... ਬਾਕੀ load/delete ਫੰਕਸ਼ਨ ...
</script>
