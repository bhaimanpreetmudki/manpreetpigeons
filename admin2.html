<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; }
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 10px; border-left: 5px solid #f39c12; align-items: center; }
        .btn-recharge-main { width: 100%; padding: 14px; background: #f39c12; color: black; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; }
        
        /* --- Show/Hide Buttons Styling --- */
        .display-controls-box { background: #1a1d21; padding: 15px; border-radius: 12px; border: 2px solid #444; margin-bottom: 15px; display: flex; gap: 10px; }
        .toggle-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 13px; cursor: pointer; text-transform: uppercase; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        .controls-container { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; flex-direction: column; }
        textarea, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        
        .btn-add, .btn-update { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-add { background: #f39c12; color: black; }
        .btn-update { background: #238636; color: white; margin-top: 5px; }
        .btn-reset { width: 100%; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 8px; font-weight: 900; margin-bottom: 15px; }

        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .sum-item { background: #1a1d21; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; font-size: 12px; }
        .sum-item b { font-size: 18px; color: #f39c12; display: block; }

        .pigeon-row { background: #21262d; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #30363d; }
        .name-part { width: 55%; display: flex; align-items: center; gap: 8px; }
        .btn-part { width: 45%; display: flex; justify-content: flex-end; gap: 5px; }
        .st-btn { border: none; padding: 10px 0; border-radius: 5px; font-weight: 900; width: 35px; color: white; opacity: 0.3; }
        .st-btn.active { opacity: 1; border: 2px solid white; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center; background:#1a1d21; padding:25px; border-radius:15px; border:1px solid #333;">
    <h2 style="color:#f39c12;">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ..." style="margin-bottom:10px;">
    <button onclick="checkLogin()" class="btn-recharge-main">ENTER CONTROL</button>
</div>

<div id="main-content" style="display:none;">
    <div class="status-bar">
        <div><small>HELPLINE:</small><br><b>8699640061</b></div>
        <div style="text-align: right;"><small>EXPIRY:</small><br><div id="expDisp" style="color:#2ecc71; font-weight:bold;">--</div></div>
    </div>

    <div class="display-controls-box">
        <button id="scoreBtn" onclick="toggleDisplay('showScoreboard')" class="toggle-btn">SCOREBOARD: LOADING</button>
        <button id="tickerBtn" onclick="toggleDisplay('showTicker')" class="toggle-btn">TICKER: LOADING</button>
    </div>

    <div class="controls-container">
        <div class="row">
            <textarea id="pName" placeholder="ਪਾਰਟੀਆਂ ਦੇ ਨਾਮ ਲਿਖੋ (ਨਾਮ, ਨਾਮ, ਨਾਮ)"></textarea>
            <button class="btn-add" onclick="addP()">ADD TEAMS</button>
        </div>
        <div class="row" style="margin-top:15px;">
            <input type="text" id="inpBoxTime" placeholder="ਟਾਈਮ (ਜਿਵੇਂ: 10:30 AM)">
            <input type="text" id="inpTicker" placeholder="ਟਿੱਕਰ ਮੈਸੇਜ...">
            <button class="btn-update" onclick="save()">UPDATE TICKER & TIME</button>
        </div>
    </div>

    <div class="admin-sum-grid">
        <div class="sum-item">TOT<b id="sum-total">0</b></div>
        <div class="sum-item">FLY<b id="sum-fly" style="color:#3498db;">0</b></div>
        <div class="sum-item">TIME<b id="sum-time" style="color:#f1c40f;">0</b></div>
        <div class="sum-item">OUT<b id="sum-out" style="color:#e74c3c;">0</b></div>
    </div>

    <button class="btn-reset" onclick="resetData()">🔄 RESET TOURNAMENT</button>
    <div id="listArea"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: { showScoreboard: false, showTicker: false } };

    function checkLogin() {
        if(!userID) { alert("ID NOT FOUND!"); return; }
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                document.getElementById('expDisp').innerText = data.expiry || "LIFE TIME";
                
                // Real-time listener
                db.ref('users/' + userID).on('value', s => { 
                    const val = s.val();
                    if(val) {
                        localData = val;
                        if(!localData.config) localData.config = { showScoreboard: false, showTicker: false };
                        render();
                    }
                });
            } else { alert("Wrong Password!"); }
        });
    }

    // ਇਹ ਫੰਕਸ਼ਨ ਬਟਨਾਂ ਨੂੰ ਸੈੱਟ ਕਰੇਗਾ
    function toggleDisplay(field) {
        const currentStatus = localData.config[field] || false;
        db.ref('users/' + userID + '/config/' + field).set(!currentStatus);
    }

    function render() {
        const conf = localData.config || {};
        
        // Scoreboard Button Update
        const sBtn = document.getElementById('scoreBtn');
        sBtn.innerText = conf.showScoreboard ? "HIDE SCOREBOARD" : "SHOW SCOREBOARD";
        sBtn.style.backgroundColor = conf.showScoreboard ? "#dc3545" : "#238636";

        // Ticker Button Update
        const tBtn = document.getElementById('tickerBtn');
        tBtn.innerText = conf.showTicker ? "HIDE TICKER" : "SHOW TICKER";
        tBtn.style.backgroundColor = conf.showTicker ? "#dc3545" : "#238636";

        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        const list = document.getElementById('listArea');
        list.innerHTML = "";
        let c = { fly:0, time:0, out:0 };
        const pList = localData.pigeons || [];

        pList.forEach((p, idx) => {
            if(p.status === 'fly') c.fly++; else if(p.status === 'time') c.time++; else c.out++;
            list.innerHTML += `
                <div class="pigeon-row">
                    <div class="name-part"><b>${idx+1}.</b> ${p.name}</div>
                    <div class="btn-part">
                        <button class="st-btn ${p.status=='fly'?'active':''}" style="background:#3498db" onclick="setStatus(${p.id},'fly')">F</button>
                        <button class="st-btn ${p.status=='time'?'active':''}" style="background:#f1c40f" onclick="setStatus(${p.id},'time')">T</button>
                        <button class="st-btn ${p.status=='out'?'active':''}" style="background:#e74c3c" onclick="setStatus(${p.id},'out')">O</button>
                        <button onclick="delP(${p.id})" style="background:none; border:none; color:red; font-size:20px; margin-left:10px;">×</button>
                    </div>
                </div>`;
        });

        document.getElementById('sum-total').innerText = pList.length;
        document.getElementById('sum-fly').innerText = c.fly;
        document.getElementById('sum-time').innerText = c.time;
        document.getElementById('sum-out').innerText = c.out;
    }

    function addP() {
        const names = document.getElementById('pName').value.split(',').map(n => n.trim()).filter(n => n !== "");
        if(!localData.pigeons) localData.pigeons = [];
        names.forEach(n => localData.pigeons.push({ id: Date.now() + Math.random(), name: n, status: 'fly' }));
        document.getElementById('pName').value = "";
        save();
    }

    function setStatus(id, s) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p);
        save();
    }

    function delP(id) {
        if(confirm("Delete?")) {
            localData.pigeons = localData.pigeons.filter(p => p.id !== id);
            save();
        }
    }

    function save() {
        db.ref('users/' + userID).update({
            pigeons: localData.pigeons || [],
            config: {
                ...localData.config,
                ticker: document.getElementById('inpTicker').value,
                boxTime: document.getElementById('inpBoxTime').value
            }
        });
    }

    function resetData() {
        if(confirm("Reset Everything?")) {
            db.ref('users/' + userID + '/pigeons').set([]);
        }
    }
</script>
</body>
</html>
