<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; }
        .top-mini-bar { display: flex; justify-content: space-between; align-items: center; background: #1a1d21; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; font-size: 11px; }
        .top-mini-bar b { color: #f39c12; }
        .controls-container { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        textarea, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #444; color: white; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Edit Box Style */
        .edit-name-input { background: #0d1117; border: 1px solid #444; color: #f39c12; padding: 5px 8px; border-radius: 5px; font-size: 14px; font-weight: bold; width: 100%; margin-left: 5px; }
        .edit-name-input:focus { border-color: #f39c12; }

        .btn-add { background: #f39c12; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-update { background: #238636; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; }
        .pigeon-row { background: #21262d; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #30363d; }
        .name-part { flex-grow: 1; display: flex; align-items: center; }
        .btn-part { display: flex; gap: 4px; }
        .st-btn { border: none; padding: 7px; border-radius: 4px; font-weight: 900; width: 45px; color: white; opacity: 0.25; font-size: 10px; cursor: pointer; }
        .st-btn.active { opacity: 1; border: 1px solid white; }
        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; background: #1a1d21; padding: 12px; border-radius: 12px; border: 1px solid #333; border-bottom: 3px solid #f39c12; }
        .sum-item { text-align: center; font-size: 10px; text-transform: uppercase; color: #aaa; }
        .sum-item b { font-size: 20px; color: #f39c12; display: block; }
        .login-box { max-width:350px; margin:80px auto; text-align:center; background:#1a1d21; padding:25px; border-radius:15px; border:1px solid #333; }
    </style>
</head>
<body>

<div id="login-box" class="login-box">
    <h2 style="color:#f39c12; font-size: 20px;">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
    <button onclick="checkLogin()" class="btn-add">ENTER CONTROL</button>
</div>

<div id="main-content" style="display:none;">
    <div class="top-mini-bar">
        <span>HELP: <b>+91 8699640061</b></span>
        <span>EXPIRY: <b id="expDisp">--</b></span>
    </div>

    <div class="controls-container">
        <textarea id="pName" placeholder="ਟੀਮਾਂ ਦੇ ਨਾਮ ਕੌਮਾ (,) ਪਾ ਕੇ ਲਿਖੋ..."></textarea>
        <button class="btn-add" onclick="addP()">ADD LIST</button>
        <input type="text" id="inpBoxTime" placeholder="ਟਾਈਮ ਬਾਕਸ">
        <input type="text" id="inpTicker" placeholder="ਟਿੱਕਰ ਮੈਸੇਜ">
        <button class="btn-update" onclick="save()">UPDATE ALL DATA</button>
    </div>

    <div class="admin-sum-grid">
        <div class="sum-item">TOTAL<b id="sum-total">0</b></div>
        <div class="sum-item">FLY<b id="sum-fly" style="color:#3498db;">0</b></div>
        <div class="sum-item">TIME<b id="sum-time" style="color:#f1c40f;">0</b></div>
        <div class="sum-item">OUT<b id="sum-out" style="color:#e74c3c;">0</b></div>
    </div>

    <div id="listArea"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        if(!userID) { alert("ID MISSING!"); return; }
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password.toString() === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                db.ref('users/' + userID).on('value', s => { if(s.val()) { localData = s.val(); render(); } });
            } else { alert("ਗਲਤ ਪਾਸਵਰਡ!"); }
        });
    }

    function render() {
        const list = document.getElementById('listArea');
        list.innerHTML = "";
        let c = { fly:0, time:0, out:0 };
        const pList = localData.pigeons || [];

        pList.forEach((p, idx) => {
            if(p.status === 'fly') c.fly++; else if(p.status === 'time') c.time++; else c.out++;
            
            list.innerHTML += `
                <div class="pigeon-row">
                    <div class="name-part"> 
                        <span style="font-size:12px; color:#888;">${idx+1}.</span>
                        <input type="text" class="edit-name-input" value="${p.name}" 
                            onblur="updateName('${p.id}', this.value)" 
                            onkeydown="if(event.key==='Enter') this.blur()">
                    </div>
                    <div class="btn-part">
                        <button class="st-btn ${p.status=='fly'?'active':''}" style="background:#3498db" onclick="setStatus('${p.id}','fly')">FLY</button>
                        <button class="st-btn ${p.status=='time'?'active':''}" style="background:#f1c40f" onclick="setStatus('${p.id}','time')">TIME</button>
                        <button class="st-btn ${p.status=='out'?'active':''}" style="background:#e74c3c" onclick="setStatus('${p.id}','out')">OUT</button>
                        <button onclick="delP('${p.id}')" style="background:none; border:none; color:red; font-size:16px; cursor:pointer; margin-left:5px;">×</button>
                    </div>
                </div>`;
        });
        document.getElementById('sum-total').innerText = pList.length;
        document.getElementById('sum-fly').innerText = c.fly;
        document.getElementById('sum-time').innerText = c.time;
        document.getElementById('sum-out').innerText = c.out;
    }

    // ਨਾਮ ਨੂੰ ਡਾਇਰੈਕਟ ਬਾਕਸ ਰਾਹੀਂ ਅਪਡੇਟ ਕਰਨ ਲਈ
    function updateName(id, newName) {
        if (newName.trim() !== "") {
            localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, name: newName.trim()} : p);
            save();
        }
    }

    function addP() {
        const names = document.getElementById('pName').value.split(',').map(n => n.trim()).filter(n => n !== "");
        if(!localData.pigeons) localData.pigeons = [];
        names.forEach(n => {
            const uniqueId = "id_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
            localData.pigeons.push({ id: uniqueId, name: n, status: 'fly' });
        });
        document.getElementById('pName').value = ""; save();
    }

    function setStatus(id, s) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); 
        save();
    }

    function save() {
        db.ref('users/' + userID).update({
            pigeons: localData.pigeons || [],
            config: { 
                ...localData.config, 
                ticker: document.getElementById('inpTicker').value, 
                boxTime: document.getElementById('inpBoxTime').value 
            }
        });
    }

    function delP(id) { 
        if(confirm("Delete?")) { 
            localData.pigeons = localData.pigeons.filter(p => p.id !== id); 
            save(); 
        } 
    }
</script>
</body>
</html>
