<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Admin - Pigeon Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 15px; }
        
        /* 1. Expiry & Helpline Bar */
        .info-bar { 
            background: #161b22; border: 1px solid #30363d; padding: 12px 20px; 
            border-radius: 12px; display: flex; justify-content: space-between; 
            margin-bottom: 15px; border-left: 6px solid #f39c12; font-size: 14px; 
        }
        .info-bar b { color: #f39c12; }

        .header { background: #f39c12; color: black; padding: 12px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* 2. Only Two Master Controls */
        .master-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .ctrl-card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }

        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        
        input[type="text"], input[type="password"] { 
            background: #0d1117; border: 1px solid #30363d; color: white; 
            padding: 12px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px;
        }

        /* 3. Numbered & Editable List */
        .pigeon-row { 
            background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 8px; 
            display: flex; align-items: center; border: 1px solid #30363d; gap: 10px;
        }
        .row-num { color: #f39c12; font-weight: bold; min-width: 25px; }
        .edit-input { background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; flex: 1; border-bottom: 1px dashed #444; }
        .edit-input:focus { border-bottom: 1px solid #f39c12; outline: none; }

        .status-grp { display: flex; gap: 5px; }
        .st-btn { border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; opacity: 0.2; font-size: 11px; }
        .st-btn.active { opacity: 1; border: 1px solid white; box-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .st-fly { background: #007bff; } .st-time { background: #ffc107; color: black; } .st-out { background: #dc3545; }
        
        .btn-add { background: #f39c12; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-save-all { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center;" class="card">
    <h2 style="color:#f39c12">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
    <button onclick="checkLogin()" class="btn-add">LOGIN</button>
</div>

<div id="admin-content" style="display:none;">
    <div class="info-bar">
        <span>📅 EXPIRY: <b id="expDisp">--</b></span>
        <span>📞 HELPLINE: <b>+91 8699640061</b></span>
    </div>

    <div class="header">
        <h3 style="margin:0">🏆 LIVE CONTROL</h3>
        <button onclick="save()" class="btn-save-all">SAVE CHANGES</button>
    </div>

    <div class="master-controls">
        <div class="ctrl-card"><span>SCOREBOARD</span><input type="checkbox" id="swScore" onchange="save()"></div>
        <div class="ctrl-card"><span>TICKER BAR</span><input type="checkbox" id="swTicker" onchange="save()"></div>
    </div>

    <div class="card">
        <input type="text" id="pName" placeholder="ਨਵਾਂ ਨਾਮ ਐਡ ਕਰੋ...">
        <button onclick="addP()" class="btn-add">ADD PIGEON</button>
    </div>

    <div id="listArea"></div>

    <div class="card">
        <label style="color:#888; font-size:12px;">⏰ TIME BOX TEXT</label>
        <input type="text" id="inpBoxTime" oninput="save()" placeholder="e.g. 10:00 AM TO 12:00 PM">
        <label style="color:#888; font-size:12px;">📢 TICKER MESSAGE</label>
        <input type="text" id="inpTicker" oninput="save()" placeholder="ਸੁਨੇਹਾ ਲਿਖੋ...">
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('admin-content').style.display = "block";
                
                // Expiry Date with Time
                const exp = new Date(data.expiry);
                document.getElementById('expDisp').innerText = exp.toLocaleString('en-GB', { 
                    day: '2-digit', month: 'short', year: 'numeric', 
                    hour: '2-digit', minute: '2-digit', hour12: true 
                }).toUpperCase();

                db.ref('users/' + userID).on('value', s => { 
                    localData = s.val() || {pigeons:[], config:{}}; 
                    render(); 
                });
            } else { alert("Wrong Password!"); }
        });
    }

    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; save();
    }

    // Status update
    function setStatus(id, s) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p);
        save();
    }

    // Edit Name directly in list
    function updateName(id, newName) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, name: newName} : p);
        // We don't call save() on every keystroke to avoid flicker, call it when blurred or enter pressed
    }

    function delP(id) {
        if(confirm("Delete this pigeon?")) {
            localData.pigeons = localData.pigeons.filter(p => p.id !== id);
            save();
        }
    }

    function save() {
        const config = {
            showScoreboard: document.getElementById('swScore').checked,
            showTicker: document.getElementById('swTicker').checked,
            showFly: true, showTime: true,
            ticker: document.getElementById('inpTicker').value,
            boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        const list = document.getElementById('listArea'); list.innerHTML = "";
        (localData.pigeons || []).forEach((p, index) => {
            list.innerHTML += `
                <div class="pigeon-row">
                    <span class="row-num">${index + 1}.</span>
                    <input type="text" class="edit-input" value="${p.name}" 
                        oninput="updateName(${p.id}, this.value)" 
                        onblur="save()">
                    <div class="status-grp">
                        <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">FLY</button>
                        <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">TIME</button>
                        <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">OUT</button>
                        <button onclick="delP(${p.id})" style="background:none; border:none; color:red; cursor:pointer; font-size:16px;">🗑️</button>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
