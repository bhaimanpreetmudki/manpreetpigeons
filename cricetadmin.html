<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cricket Scorer & Overlay</title>
    <style>
        :root { --primary: #1a237e; --secondary: #fbc02d; --accent: #d32f2f; --dark: #121212; }
        body { font-family: 'Arial', sans-serif; background: #222; color: white; margin: 0; padding: 20px; }

        /* --- TV OVERLAY STYLE --- */
        .tv-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1000px; height: 80px;
            background: rgba(0, 0, 0, 0.9); border-bottom: 5px solid var(--secondary);
            display: flex; align-items: center; border-radius: 5px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .team-box { background: var(--primary); padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: bold; font-size: 20px; }
        .score-box { padding: 0 20px; font-size: 28px; font-weight: bold; min-width: 150px; border-right: 1px solid #444; }
        .player-box { flex-grow: 1; display: flex; justify-content: space-around; font-size: 18px; }
        .active-bat { color: var(--secondary); border-bottom: 2px solid var(--secondary); }
        .freehit-tag { background: var(--accent); padding: 5px 10px; font-size: 14px; position: absolute; top: -30px; left: 0; display: none; }

        /* --- ADMIN PANEL STYLE --- */
        .admin-panel { margin-top: 20px; background: #333; padding: 20px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 120px;}
        .section { background: #444; padding: 15px; border-radius: 8px; }
        h3 { margin-top: 0; color: var(--secondary); border-bottom: 1px solid #555; padding-bottom: 5px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #555; color: white; }
        button:hover { background: #666; }
        .btn-run { background: #2e7d32; }
        .btn-boundary { background: #1b5e20; font-size: 1.2rem; }
        .btn-out { background: var(--accent); }
        .btn-extra { background: #ef6c00; }
        input { width: 80%; padding: 8px; margin-bottom: 10px; background: #222; color: white; border: 1px solid #555; }
    </style>
</head>
<body>
