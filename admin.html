<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>ਕਬੂਤਰਬਾਜ਼ੀ ਕੰਟਰੋਲ ਪੈਨਲ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1d21; color: white; margin: 0; padding: 20px; }
        .header { background: #f39c12; color: #1a1a1a; padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .config-section { background: #24292e; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; border: 1px solid #444; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: #24292e; padding: 15px; border-radius: 5px; text-align: center; border-bottom: 4px solid #444; }
        .add-section { background: #24292e; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: flex; gap: 10px; }
        input { padding: 10px; border-radius: 4px; border: 1px solid #444; background: #1a1d21; color: white; flex: 1; }
        table { width: 100%; border-collapse: collapse; background: #24292e; border-radius: 5px; overflow: hidden; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: #f39c12; }
        td { padding: 12px 15px; border-bottom: 1px solid #333; }
        .btn { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; opacity: 0.4; transition: 0.3s; }
        .btn.active { opacity: 1; border: 2px solid white; }
        .save-btn { background: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; grid-column: span 3; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">ਕਬੂਤਰਬਾਜ਼ੀ ਕੰਟਰੋਲ ਪੈਨਲ (Live)</h2>
        <button onclick="localStorage.clear(); location.reload();" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">All Reset</button>
    </div>

    <div class="config-section">
        <div>
            <label>ਟਿੱਕਰ ਨਾਮ (Ticker):</label><br>
            <input type="text" id="tickText" placeholder="ਟਿੱਕਰ ਮੈਸੇਜ ਲਿਖੋ...">
        </div>
        <div>
            <label>ਟਾਈਮ ਸੈਟਿੰਗ (Time Range):</label><br>
            <input type="text" id="timeRange" placeholder="e.g. 11:30 AM TO 12:30 PM">
        </div>
        <div style="display: flex; align-items: flex-end; gap: 10px;">
            <label><input type="checkbox" id="showScore" checked> Scoreboard</label>
            <label><input type="checkbox" id="showTick" checked> Ticker</label>
        </div>
        <button class="save-btn" onclick="saveConfig()">ਸੈਟਿੰਗ ਸੇਵ ਕਰੋ (Save Config)</button>
    </div>

    <div class="add-section">
        <input type="text" id="partyName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ ਲਿਖੋ...">
        <button onclick="addParty()" style="background:#f39c12; color:black; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer;">ਲਿਸਟ ਵਿੱਚ ਜੋੜੋ</button>
    </div>

    <table id="partyTable">
        <thead>
            <tr><th>ਨੰਬਰ</th><th>ਨਾਮ</th><th style="text-align:center">ਸਟੇਟਸ</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    let parties = JSON.parse(localStorage.getItem('pigeonData')) || [];
    let config = JSON.parse(localStorage.getItem('overlayConfig')) || { ticker: "WELCOME...", time: "12:00 PM", showScoreboard: true, showTicker: true };

    // ਲੋਡ ਕਰਨ ਸਮੇਂ ਸੈਟਿੰਗ ਭਰੋ
    document.getElementById('tickText').value = config.ticker;
    document.getElementById('timeRange').value = config.time;
    document.getElementById('showScore').checked = config.showScoreboard;
    document.getElementById('showTick').checked = config.showTicker;

    function saveConfig() {
        config.ticker = document.getElementById('tickText').value;
        config.time = document.getElementById('timeRange').value;
        config.showScoreboard = document.getElementById('showScore').checked;
        config.showTicker = document.getElementById('showTick').checked;
        localStorage.setItem('overlayConfig', JSON.stringify(config));
        alert("ਸੈਟਿੰਗ ਸੇਵ ਹੋ ਗਈ!");
    }

    function addParty() {
        const nameInput = document.getElementById('partyName');
        if (!nameInput.value) return;
        parties.push({ id: Date.now(), name: nameInput.value, status: 'fly' });
        nameInput.value = "";
        saveAndRefresh();
    }

    function setStatus(id, newStatus) {
        parties = parties.map(p => p.id === id ? {...p, status: newStatus} : p);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('pigeonData', JSON.stringify(parties));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        parties.forEach((p, index) => {
            tbody.innerHTML += `<tr>
                <td>${index + 1}</td>
                <td style="font-weight:bold">${p.name}</td>
                <td style="text-align:center">
                    <button class="btn ${p.status==='fly'?'active':''}" style="background:#007bff" onclick="setStatus(${p.id},'fly')">ਉੱਡ ਰਹੇ</button>
                    <button class="btn ${p.status==='time'?'active':''}" style="background:#28a745" onclick="setStatus(${p.id},'time')">ਟਾਈਮ</button>
                    <button class="btn ${p.status==='out'?'active':''}" style="background:#dc3545" onclick="setStatus(${p.id},'out')">ਆਊਟ</button>
                </td>
            </tr>`;
        });
    }
    renderTable();
</script>
</body>
</html>
