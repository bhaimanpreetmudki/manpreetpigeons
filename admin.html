<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Admin - Live Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; padding: 15px; margin: 0; }
        .card { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .header-title { color: #f39c12; margin-bottom: 15px; text-align: center; text-transform: uppercase; }
        
        /* Control Grid */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .sw-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #333; color: white; transition: 0.3s; }
        .sw-btn.active { background: #238636; border: 1px solid white; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #f39c12; outline: none; }

        .pigeon-row { background: #24292e; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #f39c12; }
        .status-grp { display: flex; gap: 5px; margin-top: 10px; }
        .st-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; font-size: 11px; font-weight: bold; color: white; opacity: 0.2; cursor: pointer; }
        .st-btn.active { opacity: 1; transform: scale(1.05); border: 1px solid white; }
        
        .btn-add { background: #f39c12; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-del { background: none; border: none; color: #ff4444; font-size: 18px; float: right; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-box" style="max-width: 400px; margin: 100px auto; text-align: center;">
    <h2 style="color:#f39c12">CLIENT LOGIN</h2>
    <input type="password" id="passInput" placeholder="Enter Admin Password">
    <button class="btn-add" onclick="login()">LOGIN</button>
</div>

<div id="main-admin" style="display:none;">
    <h2 class="header-title">🏆 LIVE CONTROLS</h2>
    
    <div class="card">
        <div class="control-grid">
            <button id="sw-scoreboard" class="sw-btn" onclick="toggleConfig('showScoreboard')">SCOREBOARD</button>
            <button id="sw-ticker" class="sw-btn" onclick="toggleConfig('showTicker')">TICKER BAR</button>
            <button id="sw-fly" class="sw-btn" onclick="toggleConfig('showFly')">FLY BOX</button>
            <button id="sw-time" class="sw-btn" onclick="toggleConfig('showTime')">TIME BOX</button>
        </div>
        <input type="text" id="tickInp" placeholder="📢 ਟਿਕਰ ਮੈਸੇਜ ਲਿਖੋ..." oninput="updateTexts()">
        <input type="text" id="timeBoxInp" placeholder="⏰ ਟਾਈਮ (e.g. 11:00 AM TO 12:00 PM)" oninput="updateTexts()">
    </div>

    <div class="card">
        <input type="text" id="pName" placeholder="ਕਬੂਤਰ ਜਾਂ ਪਾਰਟੀ ਦਾ ਨਾਮ...">
        <button class="btn-add" onclick="addPigeon()">ADD PIGEON</button>
    </div>

    <div id="listArea"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    let currentData = { pigeons: [], config: {} };

    function login() {
        if(!userID) return alert("Invalid URL");
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('passInput').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-admin').style.display = "block";
                
                // Realtime Sync
                db.ref('users/' + userID).on('value', s => {
                    currentData = s.val() || { pigeons: [], config: {} };
                    renderAdmin();
                });
            } else { alert("Wrong Password!"); }
        });
    }

    function toggleConfig(key) {
        if(!currentData.config) currentData.config = {};
        currentData.config[key] = !currentData.config[key];
        save();
    }

    function updateTexts() {
        if(!currentData.config) currentData.config = {};
        currentData.config.ticker = document.getElementById('tickInp').value;
        currentData.config.boxTime = document.getElementById('timeBoxInp').value;
        save();
    }

    function addPigeon() {
        const name = document.getElementById('pName').value;
        if(!name) return;
        if(!currentData.pigeons) currentData.pigeons = [];
        currentData.pigeons.push({ id: Date.now(), name: name, status: 'fly' });
        document.getElementById('pName').value = "";
        save();
    }

    function setStatus(pID, status) {
        currentData.pigeons = currentData.pigeons.map(p => p.id === pID ? {...p, status: status} : p);
        save();
    }

    function deletePigeon(pID) {
        if(confirm("ਕੀ ਤੁਸੀਂ ਇਸਨੂੰ ਹਟਾਉਣਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            currentData.pigeons = currentData.pigeons.filter(p => p.id !== pID);
            save();
        }
    }

    function save() {
        db.ref('users/' + userID).update(currentData);
    }

    function renderAdmin() {
        const conf = currentData.config || {};
        // Update Buttons
        document.getElementById('sw-scoreboard').className = "sw-btn " + (conf.showScoreboard ? "active" : "");
        document.getElementById('sw-ticker').className = "sw-btn " + (conf.showTicker ? "active" : "");
        document.getElementById('sw-fly').className = "sw-btn " + (conf.showFly ? "active" : "");
        document.getElementById('sw-time').className = "sw-btn " + (conf.showTime ? "active" : "");
        
        document.getElementById('tickInp').value = conf.ticker || "";
        document.getElementById('timeBoxInp').value = conf.boxTime || "";

        const listDiv = document.getElementById('listArea');
        listDiv.innerHTML = "";
        (currentData.pigeons || []).forEach(p => {
            listDiv.innerHTML += `
                <div class="pigeon-row">
                    <button class="btn-del" onclick="deletePigeon(${p.id})">🗑️</button>
                    <b>${p.name}</b>
                    <div class="status-grp">
                        <button class="st-btn active" style="background:#007bff; opacity:${p.status=='fly'?'1':'0.2'}" onclick="setStatus(${p.id},'fly')">FLY</button>
                        <button class="st-btn active" style="background:#ffc107; color:black; opacity:${p.status=='time'?'1':'0.2'}" onclick="setStatus(${p.id},'time')">TIME</button>
                        <button class="st-btn active" style="background:#dc3545; opacity:${p.status=='out'?'1':'0.2'}" onclick="setStatus(${p.id},'out')">OUT</button>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
