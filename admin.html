<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Pigeon Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Mobile Friendly CSS */
        body { 
            font-family: sans-serif; 
            background: #0f1113; 
            color: white; 
            margin: 0; 
            padding: 10px; 
            -webkit-text-size-adjust: 100%; /* ਫੋਨ ਤੇ ਅੱਖਰਾਂ ਦਾ ਸਾਈਜ਼ ਨਾ ਬਦਲੇ */
        }
        
        .status-bar { 
            background: #1a1d21; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; /* ਮੋਬਾਈਲ ਤੇ ਉੱਪਰ-ਹੇਠਾਂ ਦਿਖੇਗਾ */
            gap: 5px;
            margin-bottom: 15px; 
            border-left: 5px solid #f39c12; 
            font-size: 13px; 
        }

        @media (min-width: 600px) {
            .status-bar { flex-direction: row; justify-content: space-between; }
        }

        .header { 
            background: #f39c12; 
            color: black; 
            padding: 10px 15px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
        }

        .card { 
            background: #1a1d21; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            margin-bottom: 15px; 
        }

        .pigeon-row { 
            background: #21262d; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            display: flex; 
            flex-wrap: wrap; /* ਮੋਬਾਈਲ ਤੇ ਬਟਨ ਅਡਜਸਟ ਹੋ ਜਾਣਗੇ */
            align-items: center; 
            justify-content: space-between; 
            border: 1px solid #30363d; 
        }

        .pigeon-name { 
            font-size: 16px; 
            font-weight: bold; 
            flex: 1; 
            min-width: 120px; 
            margin-bottom: 5px;
        }
        
        .status-grp { display: flex; gap: 4px; }
        
        .st-btn { 
            border: none; 
            padding: 10px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            opacity: 0.2; 
            font-size: 11px;
        }

        .st-btn.active { opacity: 1; border: 1px solid white; }
        .st-fly { background: #007bff; } 
        .st-time { background: #ffc107; color: black; } 
        .st-out { background: #dc3545; }

        input { 
            width: 100%; 
            padding: 12px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: white; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            font-size: 16px; /* 16px ਤੋਂ ਘੱਟ ਹੋਣ ਤੇ iPhone ਆਪਣੇ ਆਪ ਜ਼ੂਮ ਕਰਦਾ ਹੈ, ਇਸ ਲਈ 16px ਰੱਖਿਆ ਹੈ */
        }

        .sw-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #111; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 5px; 
        }
    </style>
</head>
<body>
    </body>
</html>
