<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; -webkit-text-size-adjust: 100%; }
        
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 10px; border-left: 5px solid #f39c12; align-items: center; }
        .status-val { font-size: 14px; font-weight: 900; }

        /* Recharge & Payment Section */
        .btn-recharge-main { width: 100%; padding: 12px; background: #f39c12; color: black; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        #recharge-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { background: #1a1d21; padding: 20px; border-radius: 15px; border: 2px solid #f39c12; max-width: 400px; margin: 20px auto; }
        
        .plan-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .plan-card b { font-size: 22px; color: #2ecc71; display: block; margin-bottom: 10px; }
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pay-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; color: white; text-decoration: none; text-align: center; }
        .gp { background: #4285F4; } .pp { background: #5f259f; } .pt { background: #00baf2; } .az { background: #ff9900; color: black; }

        /* Summary Grid */
        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .sum-item { background: #1a1d21; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .sum-item div { font-size: 10px; color: #888; }
        .sum-item b { font-size: 18px; color: #f39c12; }

        /* Top Controls - New Position */
        .controls-top { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input { padding: 12px; background: #0d1117; border: 1px solid #333; color: white; border-radius: 6px; font-size: 16px; width: 100%; outline: none; }
        .btn-add { background: #f39c12; border: none; font-weight: 900; padding: 0 20px; border-radius: 6px; color: black; }
        .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .sw-row { background: #111; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid #333; align-items: center; }

        /* Team List - 50/50 Split */
        .pigeon-row { background: #21262d; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #30363d; }
        .name-part { width: 50%; display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .serial-num { color: #f39c12; font-weight: 900; font-size: 16px; min-width: 20px; }
        .pigeon-name-input { background: transparent; border: none; color: white; font-size: 17px; font-weight: bold; width: 100%; outline: none; }
        
        .btn-part { width: 50%; display: flex; justify-content: flex-end; gap: 4px; align-items: center; }
        .st-btn { border: none; padding: 10px 0; border-radius: 4px; font-weight: bold; font-size: 12px; opacity: 0.2; color: white; width: 35px; text-align: center; }
        .st-btn.active { opacity: 1; border: 1px solid white; }
        .st-fly { background: #007bff; } .st-time { background: #ffc107; color: black; } .st-out { background: #dc3545; }
        .del-btn { background: none; border: none; color: #ff4444; font-size: 22px; padding-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center; background:#1a1d21; padding:20px; border-radius:12px;">
    <h2 style="color:#f39c12;">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
    <button onclick="checkLogin()" class="btn-recharge-main">ENTER</button>
</div>

<div id="main-content" style="display:none;">
    <div class="status-bar">
        <div><span style="font-size:10px;color:#888;">HELP:</span><br><span class="status-val" onclick="window.location.href='tel:+918699640061'">📞 86996-40061</span></div>
        <div style="text-align: right;"><span style="font-size:10px;color:#888;">EXPIRY:</span><br><div id="expDisp" class="status-val">--</div></div>
    </div>

    <button class="btn-recharge-main" onclick="toggleRecharge(true)">💳 RECHARGE / RENEW PLAN</button>

    <div class="controls-top">
        <div class="input-row"><input type="text" id="pName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ ਲਿਖੋ..."><button class="btn-add" onclick="addP()">ADD</button></div>
        <div class="input-row"><input type="text" id="inpBoxTime" oninput="save()" placeholder="ਟਾਈਮ (e.g. 10:00 to 11:30)"><input type="text" id="inpTicker" oninput="save()" placeholder="ਟਿੱਕਰ ਮੈਸੇਜ ਲਿਖੋ..."></div>
        <div class="sw-grid">
            <div class="sw-row"><span>OVERLAY</span><input type="checkbox" id="swScore" onchange="save()"></div>
            <div class="sw-row"><span>TICKER</span><input type="checkbox" id="swTicker" onchange="save()"></div>
        </div>
    </div>

    <div class="admin-sum-grid">
        <div class="sum-item"><div>TOT</div><b id="sum-total">0</b></div>
        <div class="sum-item"><div>FLY</div><b id="sum-fly">0</b></div>
        <div class="sum-item"><div>TIME</div><b id="sum-time">0</b></div>
        <div class="sum-item"><div>OUT</div><b id="sum-out">0</b></div>
    </div>

    <button onclick="save()" style="width:100%; padding:14px; background:#238636; color:white; border:none; border-radius:8px; font-weight:900; margin-bottom:15px;">💾 SAVE ALL CHANGES</button>

    <div id="listArea"></div>

    <div id="recharge-modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#f39c12; margin-bottom:5px;">CHOOSE PLAN</h3>
            <p style="text-align:center; font-size:10px; color:#888; margin-bottom:15px;">ID: <span id="adminIdDisp"></span></p>
            
            <div id="plans-container"></div>
            
            <button onclick="toggleRecharge(false)" style="width:100%; margin-top:10px; padding:12px; background:#444; color:white; border:none; border-radius:8px;">CLOSE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    const plans = [
        { name: "1 DAY PLAN", price: 200, id: "1Day" },
        { name: "2 DAY PLAN", price: 300, id: "2Day" },
        { name: "10 DAY PLAN", price: 1000, id: "10Day" },
        { name: "1 MONTH PLAN", price: 2000, id: "1Month" }
    ];

    function checkLogin() {
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                document.getElementById('adminIdDisp').innerText = userID;
                
                const d = new Date(data.expiry);
                document.getElementById('expDisp').innerText = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + " " + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                setupPlans();
                db.ref('users/' + userID).on('value', s => { localData = s.val() || {pigeons:[], config:{}}; render(); });
            } else { alert("Incorrect Password!"); }
        });
    }

    function setupPlans() {
        const container = document.getElementById('plans-container');
        container.innerHTML = "";
        plans.forEach(p => {
            const upi = `upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=${p.price}&cu=INR&tn=Plan_${p.id}_ID_${userID}`;
            container.innerHTML += `
                <div class="plan-card">
                    <span>${p.name}</span>
                    <b>₹${p.price}</b>
                    <div class="pay-grid">
                        <a href="${upi}" class="pay-btn gp">GPAY</a>
                        <a href="phonepe://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=${p.price}&cu=INR" class="pay-btn pp">PHONEPE</a>
                        <a href="paytmmp://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=${p.price}&cu=INR" class="pay-btn pt">PAYTM</a>
                        <a href="${upi}" class="pay-btn az">AMAZON</a>
                    </div>
                </div>`;
        });
    }

    function toggleRecharge(show) { document.getElementById('recharge-modal').style.display = show ? 'block' : 'none'; }
    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; save();
    }
    function editName(id, newName) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, name: newName} : p);
        save();
    }
    function setStatus(id, s) { localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); save(); }
    function delP(id) { if(confirm("Delete?")) { localData.pigeons = localData.pigeons.filter(p => p.id !== id); save(); } }

    function save() {
        const config = { 
            showScoreboard: document.getElementById('swScore').checked, 
            showTicker: document.getElementById('swTicker').checked, 
            showTime: true, showFly: true, ticker: document.getElementById('inpTicker').value, boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        let counts = { fly: 0, time: 0, out: 0 };
        const list = document.getElementById('listArea'); list.innerHTML = "";
        
        (localData.pigeons || []).forEach((p, idx) => {
            if(p.status === 'fly') counts.fly++; else if(p.status === 'time') counts.time++; else if(p.status === 'out') counts.out++;
            list.innerHTML += `<div class="pigeon-row">
                <div class="name-part">
                    <span class="serial-num">${idx + 1}</span>
                    <input type="text" class="pigeon-name-input" value="${p.name}" onchange="editName(${p.id}, this.value)">
                </div>
                <div class="btn-part">
                    <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">F</button>
                    <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">T</button>
                    <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">O</button>
                    <button onclick="delP(${p.id})" class="del-btn">×</button>
                </div>
            </div>`;
        });
        document.getElementById('sum-total').innerText = (localData.pigeons || []).length;
        document.getElementById('sum-fly').innerText = counts.fly;
        document.getElementById('sum-time').innerText = counts.time;
        document.getElementById('sum-out').innerText = counts.out;
    }
</script>
</body>
</html>
