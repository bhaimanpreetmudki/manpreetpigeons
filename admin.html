<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Controls</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; padding: 10px; }
        .control-header { background: #1a1d21; padding: 15px; border-radius: 10px; border: 1px solid #f39c12; margin-bottom: 15px; }
        .switch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .sw-btn { padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: #444; color: white; }
        .sw-btn.active { background: #28a745; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #0f1113; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .pigeon-card { background: #24292e; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #f39c12; }
        .btn-grp { display: flex; gap: 5px; margin-top: 10px; }
        .st-btn { flex: 1; padding: 8px; border: none; border-radius: 4px; font-size: 11px; opacity: 0.3; font-weight: bold; }
        .st-btn.active { opacity: 1; border: 1px solid white; }
    </style>
</head>
<body>

<div id="login-box" style="text-align:center; padding-top:50px;">
    <input type="password" id="passInput" placeholder="Password" style="width:200px;"><br><br>
    <button onclick="login()" style="padding:10px 40px; background:#f39c12; border:none; font-weight:bold;">LOGIN</button>
</div>

<div id="main-admin" style="display:none;">
    <div class="control-header">
        <h4 style="margin:0 0 10px 0; color:#f39c12;">Show/Hide & Text Settings</h4>
        <div class="switch-grid">
            <button id="sw-score" class="sw-btn" onclick="toggleConfig('showScoreboard')">SCOREBOARD</button>
            <button id="sw-ticker" class="sw-btn" onclick="toggleConfig('showTicker')">TICKER</button>
            <button id="sw-fly" class="sw-btn" onclick="toggleConfig('showFly')">FLY BOX</button>
            <button id="sw-time" class="sw-btn" onclick="toggleConfig('showTime')">TIME BOX</button>
        </div>
        <input type="text" id="tickInp" placeholder="ਟਿਕਰ ਸੁਨੇਹਾ ਲਿਖੋ..." oninput="updateConfigText()">
        <input type="text" id="timeBoxInp" placeholder="ਟਾਈਮ (e.g. 11:30 AM TO 12:00 PM)" oninput="updateConfigText()">
    </div>

    <div class="control-header">
        <input type="text" id="pName" placeholder="ਕਬੂਤਰ ਦਾ ਨਾਮ..." style="width:70%;">
        <button onclick="addP()" style="width:25%; padding:10px; background:#f39c12; border:none; border-radius:5px;">ADD</button>
    </div>

    <div id="list"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    let localData = { pigeons: [], config: {} };

    function login() {
        db.ref('users/' + userID).once('value', snap => {
            if(snap.val() && snap.val().password === document.getElementById('passInput').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-admin').style.display = "block";
                
                db.ref('users/' + userID).on('value', s => {
                    localData = s.val();
                    renderUI();
                });
            } else { alert("Wrong Password!"); }
        });
    }

    function toggleConfig(key) {
        localData.config[key] = !localData.config[key];
        save();
    }

    function updateConfigText() {
        localData.config.ticker = document.getElementById('tickInp').value;
        localData.config.boxTime = document.getElementById('timeBoxInp').value;
        save();
    }

    function addP() {
        const name = document.getElementById('pName').value;
        if(!name) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: name, status: 'fly' });
        document.getElementById('pName').value = "";
        save();
    }

    function setStatus(id, s) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p);
        save();
    }

    function save() { db.ref('users/' + userID).update(localData); }

    function renderUI() {
        const conf = localData.config;
        document.getElementById('sw-score').className = "sw-btn " + (conf.showScoreboard ? "active" : "");
        document.getElementById('sw-ticker').className = "sw-btn " + (conf.showTicker ? "active" : "");
        document.getElementById('sw-fly').className = "sw-btn " + (conf.showFly ? "active" : "");
        document.getElementById('sw-time').className = "sw-btn " + (conf.showTime ? "active" : "");
        
        document.getElementById('tickInp').value = conf.ticker || "";
        document.getElementById('timeBoxInp').value = conf.boxTime || "";

        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        (localData.pigeons || []).forEach(p => {
            listDiv.innerHTML += `
                <div class="pigeon-card">
                    <b>${p.name}</b>
                    <div class="btn-grp">
                        <button class="st-btn active" style="background:#007bff; opacity:${p.status=='fly'?'1':'0.2'}" onclick="setStatus(${p.id},'fly')">FLY</button>
                        <button class="st-btn active" style="background:#ffc107; color:black; opacity:${p.status=='time'?'1':'0.2'}" onclick="setStatus(${p.id},'time')">TIME</button>
                        <button class="st-btn active" style="background:#dc3545; opacity:${p.status=='out'?'1':'0.2'}" onclick="setStatus(${p.id},'out')">OUT</button>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
