<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; }
        
        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .sum-item { text-align: center; font-size: 11px; text-transform: uppercase; color: #aaa; }
        .sum-item b { font-size: 22px; color: #f39c12; display: block; }

        .info-container { display: block; margin-bottom: 15px; }
        .info-box { background: #1a1d21; padding: 12px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .info-box small { color: #888; font-size: 10px; display: block; margin-bottom: 4px; }
        .info-box b { font-size: 16px; color: #2ecc71; }

        .btn-recharge-main { width: 100%; padding: 14px; background: #f39c12; color: black; border: none; border-radius: 8px; font-weight: 900; font-size: 15px; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-helpline { background: #2980b9; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; border: 1px solid #3498db; }

        .display-controls-box { background: #1a1d21; padding: 12px; border-radius: 12px; border: 1px solid #444; margin-bottom: 15px; display: flex; gap: 10px; }
        .toggle-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; text-transform: uppercase; color: white; }

        .controls-container { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        textarea, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #444; color: white; border-radius: 8px; font-size: 15px; outline: none; box-sizing: border-box; }
        .btn-add { background: #f39c12; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-reset { width: 100%; padding: 10px; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 8px; font-size: 12px; margin-bottom: 20px; }

        .pigeon-row { background: #21262d; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #30363d; }
        .name-part { flex-grow: 1; font-weight: bold; }
        .btn-part { display: flex; gap: 5px; align-items: center; }
        .st-btn { border: none; padding: 8px; border-radius: 5px; font-weight: 900; width: 35px; color: white; opacity: 0.3; }
        .st-btn.active { opacity: 1; border: 2px solid white; }

        #recharge-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 15px; overflow-y: auto; }
        .modal-content { background: #1a1d21; padding: 20px; border-radius: 15px; border: 2px solid #f39c12; max-width: 400px; margin: 10px auto; }
        .plan-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .plan-card b { font-size: 30px; color: #2ecc71; display: block; margin-bottom: 15px; }
        .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pay-btn { padding: 12px 5px; border-radius: 8px; border: none; color: white; text-decoration: none; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-weight: bold; }
        .gp { background: #4285F4; } .pp { background: #5f259f; } .pt { background: #00baf2; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center; background:#1a1d21; padding:25px; border-radius:15px; border:1px solid #333;">
    <h2 style="color:#f39c12;">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
    <button onclick="checkLogin()" style="width:100%; padding:14px; background:#f39c12; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">ENTER CONTROL</button>
</div>

<div id="main-content" style="display:none;">
    
    <div class="admin-sum-grid">
        <div class="sum-item">TOTAL<b id="sum-total">0</b></div>
        <div class="sum-item">FLY<b id="sum-fly" style="color:#3498db;">0</b></div>
        <div class="sum-item">TIME<b id="sum-time" style="color:#f1c40f;">0</b></div>
        <div class="sum-item">OUT<b id="sum-out" style="color:#e74c3c;">0</b></div>
    </div>

    <div class="info-container">
        <div class="info-box">
            <small>EXPIRY DATE</small>
            <b id="expDisp">--</b>
        </div>
    </div>

    <button class="btn-recharge-main" onclick="toggleRecharge(true)">💳 RECHARGE / EXTEND PLAN</button>

    <a href="tel:8699640061" class="btn-helpline">
        <i class="fas fa-phone-alt"></i> CALL HELPLINE: 8699640061
    </a>

    <div id="admin-controls-wrapper">
        <div class="display-controls-box">
            <button id="scoreBtn" onclick="toggleDisplay('showScoreboard')" class="toggle-btn">SCOREBOARD</button>
            <button id="tickerBtn" onclick="toggleDisplay('showTicker')" class="toggle-btn">TICKER</button>
        </div>

        <div class="controls-container">
            <div class="row">
                <textarea id="pName" placeholder="ਟੀਮਾਂ ਦੇ ਨਾਮ (ਨਾਮ, ਨਾਮ, ਨਾਮ)"></textarea>
                <button class="btn-add" onclick="addP()">ADD NEW TEAMS</button>
            </div>

            <div class="row">
                <input type="text" id="inpBoxTime" placeholder="ਟਾਈਮ (e.g. 10:30 AM)" oninput="save()">
                <input type="text" id="inpTicker" placeholder="ਟਿੱਕਰ ਮੈਸੇਜ ਲਿਖੋ..." oninput="save()">
            </div>
        </div>

        <div id="listArea"></div>
        
        <button class="btn-reset" onclick="resetData()">🔄 RESET EVERYTHING</button>
    </div>

    <div id="expire-msg" style="display:none; text-align:center; padding:40px 20px; background:#1a1d21; border-radius:12px; border:1px solid #e74c3c; margin-bottom:20px;">
        <i class="fas fa-clock" style="font-size:40px; color:#e74c3c; margin-bottom:15px;"></i>
        <h2 style="color:#e74c3c; margin:0;">PLAN EXPIRED</h2>
        <p style="color:#888;">ਕਿਰਪਾ ਕਰਕੇ ਪਲਾਨ ਰੀਚਾਰਜ ਕਰੋ।</p>
    </div>
</div>

<div id="recharge-modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:#f39c12; margin-bottom:20px;">CHOOSE RECHARGE PLAN</h3>
        <div id="plans-container"></div>
        <button onclick="toggleRecharge(false)" style="width:100%; margin-top:10px; padding:15px; background:#444; color:white; border:none; border-radius:10px; font-weight:bold;">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: { showScoreboard: false, showTicker: false } };
    let isExpired = false;

    const plans = [
        { name: "1 DAY PLAN", price: 200, id: "1Day" },
        { name: "2 DAY PLAN", price: 300, id: "2Day" },
        { name: "10 DAY PLAN", price: 1000, id: "10Day" },
        { name: "1 MONTH PLAN", price: 2000, id: "1Month" }
    ];

    function checkLogin() {
        if(!userID) { alert("ID NOT FOUND!"); return; }
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                const expiryDate = new Date(data.expiry || "2026-12-31T12:00:00");
                const now = new Date();
                
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";

                if (now > expiryDate) {
                    isExpired = true;
                    document.getElementById('admin-controls-wrapper').style.display = "none";
                    document.getElementById('expire-msg').style.display = "block";
                    document.getElementById('expDisp').innerText = "EXPIRED";
                    document.getElementById('expDisp').style.color = "#e74c3c";
                    toggleRecharge(true);
                } else {
                    document.getElementById('expDisp').innerText = data.expiry ? new Date(data.expiry).toLocaleDateString('en-GB') : "31/12/2026";
                }

                db.ref('users/' + userID).on('value', s => { 
                    const val = s.val();
                    if(val) {
                        localData = val;
                        render();
                    }
                });
                setupPlans();
            } else { alert("Wrong Password!"); }
        });
    }

    function setupPlans() {
        const container = document.getElementById('plans-container');
        container.innerHTML = "";
        plans.forEach(p => {
            const upiURL = `pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=${p.price}&cu=INR&tn=Plan_${p.id}_ID_${userID}`;
            container.innerHTML += `
                <div class="plan-card">
                    <h2>${p.name}</h2>
                    <b>₹${p.price}</b>
                    <div class="pay-grid">
                        <a href="upi://pay?${upiURL}" class="pay-btn gp">GPAY</a>
                        <a href="upi://pay?${upiURL}" class="pay-btn pp">PHONEPE</a>
                        <a href="upi://pay?${upiURL}" class="pay-btn pt">PAYTM</a>
                    </div>
                </div>`;
        });
    }

    function toggleRecharge(s) { document.getElementById('recharge-modal').style.display = s ? 'block' : 'none'; }

    function toggleDisplay(field) {
        if(isExpired) return;
        const currentStatus = localData.config[field] || false;
        db.ref('users/' + userID + '/config/' + field).set(!currentStatus);
    }

    function render() {
        if(isExpired) return;
        const conf = localData.config || {};
        
        document.getElementById('scoreBtn').innerText = conf.showScoreboard ? "HIDE SCORE" : "SHOW SCORE";
        document.getElementById('scoreBtn').style.backgroundColor = conf.showScoreboard ? "#dc3545" : "#238636";

        document.getElementById('tickerBtn').innerText = conf.showTicker ? "HIDE TICKER" : "SHOW TICKER";
        document.getElementById('tickerBtn').style.backgroundColor = conf.showTicker ? "#dc3545" : "#238636";

        if(document.activeElement !== document.getElementById('inpTicker')) {
            document.getElementById('inpTicker').value = conf.ticker || "";
        }
        if(document.activeElement !== document.getElementById('inpBoxTime')) {
            document.getElementById('inpBoxTime').value = conf.boxTime || "";
        }

        const list = document.getElementById('listArea');
        list.innerHTML = "";
        let c = { fly:0, time:0, out:0 };
        const pList = localData.pigeons || [];

        pList.forEach((p, idx) => {
            if(p.status === 'fly') c.fly++; else if(p.status === 'time') c.time++; else c.out++;
            list.innerHTML += `
                <div class="pigeon-row">
                    <div class="name-part"> ${idx+1}. ${p.name}</div>
                    <div class="btn-part">
                        <button class="st-btn ${p.status=='fly'?'active':''}" style="background:#3498db" onclick="setStatus(${p.id},'fly')">F</button>
                        <button class="st-btn ${p.status=='time'?'active':''}" style="background:#f1c40f" onclick="setStatus(${p.id},'time')">T</button>
                        <button class="st-btn ${p.status=='out'?'active':''}" style="background:#e74c3c" onclick="setStatus(${p.id},'out')">O</button>
                        <button onclick="delP(${p.id})" style="background:none; border:none; color:red; font-size:18px;">×</button>
                    </div>
                </div>`;
        });

        document.getElementById('sum-total').innerText = pList.length;
        document.getElementById('sum-fly').innerText = c.fly;
        document.getElementById('sum-time').innerText = c.time;
        document.getElementById('sum-out').innerText = c.out;
    }

    function addP() {
        if(isExpired) return;
        const names = document.getElementById('pName').value.split(',').map(n => n.trim()).filter(n => n !== "");
        if(!localData.pigeons) localData.pigeons = [];
        names.forEach(n => localData.pigeons.push({ id: Date.now() + Math.random(), name: n, status: 'fly' }));
        document.getElementById('pName').value = "";
        save();
    }

    function setStatus(id, s) {
        if(isExpired) return;
        localData.pigeons = localData.pigeons.map(p => p.id == id ? {...p, status: s} : p);
        save();
    }

    function delP(id) {
        if(isExpired) return;
        if(confirm("Delete Team?")) {
            localData.pigeons = localData.pigeons.filter(p => p.id != id);
            save();
        }
    }

    function save() {
        if(isExpired) return;
        db.ref('users/' + userID).update({
            pigeons: localData.pigeons || [],
            config: {
                ...localData.config,
                ticker: document.getElementById('inpTicker').value,
                boxTime: document.getElementById('inpBoxTime').value
            }
        });
    }

    function resetData() {
        if(isExpired) return;
        if(confirm("Reset Everything?")) {
            db.ref('users/' + userID + '/pigeons').set([]);
        }
    }
</script>
</body>
</html>
