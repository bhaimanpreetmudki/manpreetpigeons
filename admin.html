<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Enabled</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; padding: 15px; margin: 0; }
        .info-bar { background: #1a1d21; border: 1px solid #333; padding: 10px 20px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; border-left: 5px solid #f39c12; }
        .card { background: #1a1d21; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input[type="text"] { background: #0f1113; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .pigeon-item { background: #24292e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #f39c12; }
        .edit-name { background: transparent; border: 1px dashed #555; color: white; font-size: 18px; font-weight: bold; width: 80%; padding: 5px; }
        .edit-name:focus { background: #111; border-style: solid; outline: none; border-color: #f39c12; }

        .status-grp { display: flex; gap: 5px; margin-top: 10px; }
        .st-btn { flex: 1; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; opacity: 0.2; color: white; text-transform: uppercase; }
        .st-btn.active { opacity: 1; border: 2px solid white; }
        .st-fly { background: #007bff; }
        .st-time { background: #ffc107; color: black; }
        .st-out { background: #dc3545; }
        .btn-add { background: #f39c12; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="info-section" style="display:none;">
    <div class="info-bar">
        <span>📅 ਵੈਲਡਿਟੀ: <b id="expiryDisplay"></b></span>
        <span>📞 Helpline: <b>+91 8699640061</b></span>
    </div>
</div>

<div id="login-box" style="max-width:400px; margin: 100px auto; text-align:center;" class="card">
    <h2 style="color:#f39c12">Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Password"><br><br>
    <button class="btn-add" onclick="checkLogin()">LOGIN</button>
</div>

<div id="main-content" style="display:none;">
    <div class="card">
        <input type="text" id="pName" placeholder="ਕਬੂਤਰ ਦਾ ਨਾਮ ਐਡ ਕਰੋ...">
        <button class="btn-add" onclick="addP()">ADD PIGEON</button>
    </div>
    <div id="listArea"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                document.getElementById('info-section').style.display = "block";
                document.getElementById('expiryDisplay').innerText = new Date(data.expiry).toLocaleString();
                db.ref('users/' + userID).on('value', s => {
                    localData = s.val() || { pigeons: [], config: {} };
                    renderUI();
                });
            } else { alert("Wrong Password!"); }
        });
    }

    function addP() {
        const name = document.getElementById('pName').value;
        if(!name) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: name, status: 'fly' });
        document.getElementById('pName').value = "";
        save();
    }

    // ਨਾਮ ਐਡਿਟ ਕਰਨ ਲਈ ਫੰਕਸ਼ਨ
    function updateName(id, newName) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, name: newName} : p);
        save();
    }

    function setStatus(id, s) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p);
        save();
    }

    function delP(id) {
        if(confirm("Delete?")) {
            localData.pigeons = localData.pigeons.filter(p => p.id !== id);
            save();
        }
    }

    function save() { db.ref('users/' + userID).update(localData); }

    function renderUI() {
        const list = document.getElementById('listArea');
        list.innerHTML = "";
        (localData.pigeons || []).forEach(p => {
            list.innerHTML += `
                <div class="pigeon-item">
                    <input type="text" class="edit-name" value="${p.name}" onchange="updateName(${p.id}, this.value)">
                    <button onclick="delP(${p.id})" style="float:right; background:none; border:none; color:red; cursor:pointer;">🗑️</button>
                    <div class="status-grp">
                        <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">FLY</button>
                        <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">TIME</button>
                        <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">OUT</button>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
