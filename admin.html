<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - MANPREET MUDKI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0b0d0f; color: white; padding: 10px; }

        /* --- LOGIN SECTION --- */
        #login-section { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 90vh; text-align: center; 
        }
        .login-box { 
            width: 100%; max-width: 350px; background: #161b22; padding: 30px; 
            border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .login-box h2 { color: #f39c12; margin-bottom: 20px; font-size: 22px; }
        input[type="password"], input[type="text"] { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; 
            border: 1px solid #30363d; background: #0d1117; color: #fff; text-align: center; font-size: 16px; 
        }
        .primary-btn { 
            width: 100%; padding: 15px; background: #f39c12; border: none; 
            color: #000; font-weight: 900; border-radius: 10px; cursor: pointer; font-size: 14px;
        }

        /* --- MAIN CONTENT (Initially Hidden) --- */
        #main-content { display: none; max-width: 500px; margin: 0 auto; }

        /* --- TOP BAR (3 Buttons) --- */
        .top-bar { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 8px; margin-bottom: 20px; }
        .top-btn { 
            height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-size: 11px; font-weight: bold; color: white; border: none;
        }

        /* --- CONTROL CARDS --- */
        .card { 
            background: #161b22; border: 1px solid #30363d; padding: 20px; 
            border-radius: 15px; margin-bottom: 15px; 
        }
        .card-title { color: #f39c12; font-size: 12px; margin-bottom: 12px; font-weight: bold; }
        
        .flex-buttons { display: flex; gap: 10px; }
        .toggle-btn { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; 
            font-weight: 1000; cursor: pointer; transition: 0.3s;
        }
        .btn-on { background: #2ecc71; color: white; }
        .btn-off { background: #30363d; color: #888; }

        .reset-btn { 
            width: 100%; padding: 12px; background: transparent; color: #e74c3c; 
            border: 2px solid #e74c3c; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px;
        }

        /* --- EXPIRY SCREEN --- */
        #expiry-section { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            height: 90vh; text-align: center; 
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h2>ADMIN LOGIN</h2>
            <input type="password" id="passInput" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
            <button class="primary-btn" onclick="checkLogin()">ENTER CONTROL</button>
            <a href="tel:8699640061" style="display:block; margin-top:15px; color:#58a6ff; text-decoration:none; font-size:12px;">
                <i class="fas fa-phone-alt"></i> CONTACT HELPLINE
            </a>
        </div>
    </div>

    <div id="expiry-section">
        <h1 style="color: #e74c3c; font-size: 40px;">PLAN EXPIRED</h1>
        <p style="margin: 20px 0; color: #8b949e;">ਤੁਹਾਡਾ ਪਲਾਨ ਖਤਮ ਹੋ ਗਿਆ ਹੈ। ਸੇਵਾਵਾਂ ਚਾਲੂ ਰੱਖਣ ਲਈ ਰੀਚਾਰਜ ਕਰੋ।</p>
        <a href="tel:8699640061" class="primary-btn" style="text-decoration:none; padding: 15px 40px;">RECHARGE NOW</a>
    </div>

    <div id="main-content">
        
        <div class="top-bar">
            <a href="tel:8699640061" class="top-btn" style="background: #238636;">
                <i class="fas fa-phone-alt" style="margin-right:5px;"></i> HELP
            </a>
            <div class="top-btn" style="background: #0d1117; border: 1px solid #30363d; flex-direction: column;">
                <span style="font-size: 7px; color: #8b949e;">EXPIRY</span>
                <b id="expDisp" style="font-size: 10px; color: #2ecc71;">--</b>
            </div>
            <button onclick="alert('CONTACT HELPLINE TO RECHARGE')" class="top-btn" style="background: #f39c12; color: #000;">
                💳 RECHARGE
            </button>
        </div>

        <div class="card">
            <p class="card-title">TICKER MESSAGE:</p>
            <input type="text" id="tickerInput" placeholder="ਟਿੱਕਰ ਮੈਸੇਜ ਲਿਖੋ...">
            <button class="primary-btn" onclick="updateTicker()">SET MESSAGE</button>
        </div>

        <div class="card">
            <p class="card-title">DISPLAY ON/OFF:</p>
            <div class="flex-buttons">
                <button id="scoreBtn" onclick="toggleOption('showScoreboard')" class="toggle-btn">SCOREBOARD</button>
                <button id="tickerBtn" onclick="toggleOption('showTicker')" class="toggle-btn">TICKER</button>
            </div>
        </div>

        <div class="card">
            <p class="card-title">ਪਾਰਟੀਆਂ / ਟੀਮਾਂ ਦੇ ਨਾਮ (ਕੌਮਾ ਲਗਾਓ):</p>
            <input type="text" id="teamInput" placeholder="ਫਿਰੋਜ਼ਪੁਰ, ਫਰੀਦਕੋਟ, ਮੋਗਾ...">
            <p class="card-title">ਸਮੇਂ ਵਾਲੀਆਂ ਟੀਮਾਂ ਲਈ ਸਮਾਂ:</p>
            <input type="text" id="timeInput" placeholder="ਟਾਈਮ (e.g. 10:30 AM)">
            <button class="primary-btn" onclick="addTeams()">ADD NEW TEAMS</button>
        </div>

        <button class="reset-btn" onclick="resetEverything()">
            <i class="fas fa-sync"></i> RESET EVERYTHING
        </button>

        <div id="status-summary" style="margin-top: 20px; display: flex; justify-content: space-around; font-weight: bold; font-size: 12px; color: #8b949e;">
            <div>TOTAL: <span id="total-count" style="color:#f39c12">0</span></div>
            <div>FLY: <span id="fly-count" style="color:#2ecc71">0</span></div>
            <div>TIME: <span id="time-count" style="color:#58a6ff">0</span></div>
            <div>OUT: <span id="out-count" style="color:#e74c3c">0</span></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    // 1. LOGIN LOGIC
    function checkLogin() {
        const p = document.getElementById('passInput').value;
        if(p === "1234") { // Apna Password ithhe badlo
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startApp();
        } else { 
            alert("WRONG PASSWORD!"); 
        }
    }

    // 2. MAIN APP LOGIC
    function startApp() {
        if(!userID) { alert("ID NOT FOUND!"); return; }
        
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const conf = data.config || {};
            const pigeons = data.pigeons || [];

            // Expiry Check
            const today = new Date();
            const expDate = new Date(data.expiry_date || "2026-12-31");
            document.getElementById('expDisp').innerText = data.expiry_date || "N/A";

            if(today > expDate) {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('expiry-section').style.display = 'flex';
            }

            // Update UI
            document.getElementById('tickerInput').value = conf.ticker || "";
            updateBtnUI('scoreBtn', conf.showScoreboard);
            updateBtnUI('tickerBtn', conf.showTicker);

            // Counts Update
            let f = pigeons.filter(p => p.status === 'fly').length;
            let t = pigeons.filter(p => p.status === 'time').length;
            let o = pigeons.filter(p => p.status === 'out').length;
            document.getElementById('total-count').innerText = pigeons.length;
            document.getElementById('fly-count').innerText = f;
            document.getElementById('time-count').innerText = t;
            document.getElementById('out-count').innerText = o;
        });
    }

    function updateBtnUI(id, val) {
        const btn = document.getElementById(id);
        if(val !== false) { btn.className = "toggle-btn btn-on"; }
        else { btn.className = "toggle-btn btn-off"; }
    }

    function toggleOption(key) {
        db.ref('users/' + userID + '/config').once('value', snap => {
            let current = snap.val() ? snap.val()[key] : true;
            db.ref('users/' + userID + '/config/' + key).set(current === false);
        });
    }

    function updateTicker() {
        const val = document.getElementById('tickerInput').value;
        db.ref('users/' + userID + '/config/ticker').set(val);
        alert("Ticker Updated!");
    }

    function resetEverything() {
        if(confirm("SARA DATA RESET KRDIYE?")) {
            db.ref('users/' + userID + '/pigeons').set([]);
            alert("Reset Done!");
        }
    }

    // Teams add krn da basic logic (isnu apne hisab naal hor vdia kr skde o)
    function addTeams() {
        const names = document.getElementById('teamInput').value.split(',');
        const timeVal = document.getElementById('timeInput').value;
        if(names[0] === "") return;
        
        db.ref('users/' + userID + '/config/boxTime').set(timeVal);
        // Pigeons logic ithhe add kro...
        alert("Teams Added!");
    }
</script>
</body>
</html>
