<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; padding-bottom: 280px; -webkit-text-size-adjust: 100%; }
        
        /* Expiry & Helpline Header */
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; margin-bottom: 15px; border-left: 6px solid #f39c12; align-items: center; }
        .status-bar b { color: #f39c12; }
        .status-label { font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; }
        .status-val { font-size: 18px; font-weight: 900; }

        /* Recharge Box - Universal UPI */
        .recharge-box { background: #1a1d21; padding: 20px; border-radius: 12px; border: 2px solid #333; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .recharge-title { font-size: 18px; font-weight: 900; color: #f39c12; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .plan-btn { background: #111; border: 2px solid #238636; color: white; padding: 15px 5px; border-radius: 10px; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .plan-btn span { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #ccc; }
        .plan-btn b { font-size: 24px; color: #2ecc71; }
        .plan-btn:active { background: #238636; transform: scale(0.95); }

        /* Summary Section */
        .admin-top-section { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; border-top: 4px solid #f39c12; }
        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .sum-item { background: #111; padding: 10px 5px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .sum-item div { font-size: 11px; color: #888; font-weight: bold; }
        .sum-item b { font-size: 22px; color: #f39c12; }

        .btn-update-top { width: 100%; padding: 16px; background: #238636; color: white; border: none; border-radius: 10px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #1a6328; }
        .btn-update-top:active { transform: translateY(2px); box-shadow: none; }

        /* Pigeon List - Bigger Text */
        .pigeon-row { background: #21262d; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #30363d; }
        .pigeon-name { font-size: 20px; font-weight: 900; flex: 1; color: #fff; }
        .serial-num { color: #f39c12; font-weight: 900; min-width: 35px; font-size: 20px; }
        
        .status-grp { display: flex; gap: 8px; align-items: center; }
        .st-btn { border: none; padding: 12px 10px; border-radius: 6px; font-weight: 900; font-size: 14px; opacity: 0.25; color: white; min-width: 60px; }
        .st-btn.active { opacity: 1; border: 2px solid white; transform: scale(1.1); }
        .st-fly { background: #007bff; } 
        .st-time { background: #ffc107; color: black; } 
        .st-out { background: #dc3545; }
        .del-btn { background: none; border: none; color: #ff4444; font-size: 24px; cursor: pointer; padding-left: 5px; }

        /* Sticky Footer Controls */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d21; padding: 15px; border-top: 6px solid #f39c12; z-index: 1000; }
        input { width: 100%; padding: 14px; background: #0d1117; border: 2px solid #30363d; color: white; border-radius: 8px; margin-bottom: 12px; font-size: 18px; font-weight: bold; }
        input::placeholder { color: #555; }
        .btn-add { background: #f39c12; border: none; font-weight: 900; padding: 0 25px; border-radius: 8px; color: black; font-size: 18px; }
        .sw-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 8px; border: 1px solid #333; font-size: 14px; font-weight: bold; }
        .sw-row input { width: 22px; height: 22px; margin: 0; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center;" class="admin-top-section">
    <h2 style="color:#f39c12; font-weight: 900;">MANPREET MUDKI ADMIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
    <button class="btn-update-top" onclick="checkLogin()">LOGIN CONTROL</button>
</div>

<div id="main-content" style="display:none;">
    
    <div class="status-bar">
        <div style="display: flex; flex-direction: column;">
            <span class="status-label">HELP / RECHARGE</span>
            <span onclick="window.location.href='tel:+918699640061'" style="cursor: pointer; color: #f39c12;" class="status-val">📞 86996-40061</span>
        </div>
        <div style="text-align: right;">
            <span class="status-label">ACCOUNT EXPIRES</span>
            <div id="expDisp" style="color: #2ecc71;" class="status-val">--</div>
            <div id="timeDisp" style="font-size: 12px; font-weight: bold; color: #888;">--:-- --</div>
        </div>
    </div>

    <div class="recharge-box">
        <div class="recharge-title">💳 SELECT RECHARGE PLAN</div>
        <div class="plan-grid">
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=200&cu=INR&tn=PigeonOverlay1Day" class="plan-btn"><span>1 DAY PLAN</span><b>₹200</b></a>
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=300&cu=INR&tn=PigeonOverlay2Day" class="plan-btn"><span>2 DAY PLAN</span><b>₹300</b></a>
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=1000&cu=INR&tn=PigeonOverlay10Day" class="plan-btn"><span>10 DAY PLAN</span><b>₹1000</b></a>
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=2000&cu=INR&tn=PigeonOverlay1Month" class="plan-btn"><span>1 MONTH PLAN</span><b>₹2000</b></a>
        </div>
        <div style="font-size: 11px; color: #888; margin-top: 15px; text-align: center; font-weight: bold;">* ਪੇਮੈਂਟ ਤੋਂ ਬਾਅਦ ਸਕ੍ਰੀਨਸ਼ਾਟ ਹੈਲਪਲਾਈਨ ਨੰਬਰ ਤੇ ਭੇਜੋ।</div>
    </div>

    <div class="admin-top-section">
        <div class="admin-sum-grid">
            <div class="sum-item"><div>TOTAL</div><b id="sum-total">0</b></div>
            <div class="sum-item"><div>FLYING</div><b id="sum-fly">0</b></div>
            <div class="sum-item"><div>TIME</div><b id="sum-time">0</b></div>
            <div class="sum-item"><div>OUT</div><b id="sum-out">0</b></div>
        </div>
        <button class="btn-update-top" onclick="save()">💾 SAVE & UPDATE OVERLAY</button>
    </div>

    <div id="listArea"></div>

    <div class="sticky-footer">
        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <input type="text" id="pName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ ਲਿਖੋ..." style="margin-bottom:0;">
            <button class="btn-add" onclick="addP()">ADD</button>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <input type="text" id="inpBoxTime" oninput="save()" placeholder="Time (10:00 to 11:00)" style="margin-bottom:0;">
            <input type="text" id="inpTicker" oninput="save()" placeholder="Ticker Message..." style="margin-bottom:0;">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="sw-row"><span>OVERLAY ON</span><input type="checkbox" id="swScore" onchange="save()"></div>
            <div class="sw-row"><span>TICKER ON</span><input type="checkbox" id="swTicker" onchange="save()"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                
                // Expiry Date & Time Display
                const d = new Date(data.expiry);
                document.getElementById('expDisp').innerText = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
                document.getElementById('timeDisp').innerText = d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true});
                
                db.ref('users/' + userID).on('value', s => { localData = s.val() || {pigeons:[], config:{}}; render(); });
            } else { alert("Incorrect Password!"); }
        });
    }

    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; save();
        setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
    }

    function setStatus(id, s) { 
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); 
        save(); 
    }
    
    function delP(id) { if(confirm("Delete this?")) { localData.pigeons = localData.pigeons.filter(p => p.id !== id); save(); } }

    function save() {
        const config = { 
            showScoreboard: document.getElementById('swScore').checked, 
            showTicker: document.getElementById('swTicker').checked, 
            showTime: true, showFly: true,
            ticker: document.getElementById('inpTicker').value,
            boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        let counts = { fly: 0, time: 0, out: 0 };
        const list = document.getElementById('listArea'); list.innerHTML = "";
        
        (localData.pigeons || []).forEach((p, idx) => {
            if(p.status === 'fly') counts.fly++;
            else if(p.status === 'time') counts.time++;
            else if(p.status === 'out') counts.out++;

            list.innerHTML += `<div class="pigeon-row">
                <span class="serial-num">${idx + 1}.</span>
                <span class="pigeon-name">${p.name}</span>
                <div class="status-grp">
                    <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">FLY</button>
                    <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">TIME</button>
                    <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">OUT</button>
                    <button onclick="delP(${p.id})" class="del-btn">🗑️</button>
                </div>
            </div>`;
        });

        document.getElementById('sum-total').innerText = (localData.pigeons || []).length;
        document.getElementById('sum-fly').innerText = counts.fly;
        document.getElementById('sum-time').innerText = counts.time;
        document.getElementById('sum-out').innerText = counts.out;
    }
</script>
</body>
</html>
