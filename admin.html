<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Pigeon Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; padding-bottom: 250px; /* Space for sticky bottom */ -webkit-text-size-adjust: 100%; }
        
        /* Summary Box on Admin */
        .admin-sum-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .sum-item { background: #1a1d21; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .sum-item div { font-size: 12px; color: #888; margin-bottom: 5px; }
        .sum-item b { font-size: 20px; color: #f39c12; }

        .header { background: #f39c12; color: black; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; }
        .header h3 { margin: 0; font-size: 18px; font-weight: 900; }

        /* Pigeon List */
        .pigeon-row { background: #21262d; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #30363d; }
        .pigeon-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .serial-num { color: #f39c12; font-weight: bold; min-width: 25px; }
        .pigeon-name { font-size: 16px; font-weight: bold; }
        
        .status-grp { display: flex; gap: 4px; }
        .st-btn { border: none; padding: 8px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; opacity: 0.2; font-size: 11px; }
        .st-btn.active { opacity: 1; border: 1px solid white; }
        .st-fly { background: #007bff; } .st-time { background: #ffc107; color: black; } .st-out { background: #dc3545; }

        /* Sticky Bottom Controls */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d21; padding: 15px; border-top: 4px solid #f39c12; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .input-grp { display: flex; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; font-size: 16px; outline: none; }
        .btn-add { background: #f39c12; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; padding: 0 20px; color: black; }
        
        .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .sw-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 8px; border-radius: 6px; font-size: 12px; border: 1px solid #333; }
        .del-btn { background: none; border: none; color: #ff4444; font-size: 18px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center;">
    <h2 style="color:#f39c12;">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="Password...">
    <button class="btn-add" style="height:45px; width:100%;" onclick="checkLogin()">LOGIN</button>
</div>

<div id="main-content" style="display:none;">
    <div class="admin-sum-grid">
        <div class="sum-item"><div>TOTAL</div><b id="sum-total">0</b></div>
        <div class="sum-item"><div>FLYING</div><b id="sum-fly">0</b></div>
        <div class="sum-item"><div>ON TIME</div><b id="sum-time">0</b></div>
        <div class="sum-item"><div>OUT</div><b id="sum-out">0</b></div>
    </div>

    <div class="header">
        <h3>🏆 LIST CONTROL</h3>
        <button onclick="save()" style="background:white; color:black; border:none; padding:5px 15px; border-radius:4px; font-weight:bold;">REFRESH</button>
    </div>

    <div id="listArea"></div>

    <div class="sticky-footer">
        <div class="input-grp">
            <input type="text" id="pName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ ਲਿਖੋ...">
            <button class="btn-add" onclick="addP()">ADD</button>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="inpBoxTime" oninput="save()" placeholder="Time (e.g. 10:00 to 11:00)">
            <input type="text" id="inpTicker" oninput="save()" placeholder="Ticker Message...">
        </div>

        <div class="sw-grid">
            <div class="sw-row"><span>SCOREBOARD</span><input type="checkbox" id="swScore" onchange="save()"></div>
            <div class="sw-row"><span>TICKER BAR</span><input type="checkbox" id="swTicker" onchange="save()"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                db.ref('users/' + userID).on('value', s => { localData = s.val() || {pigeons:[], config:{}}; render(); });
            } else { alert("Wrong Password"); }
        });
    }

    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; save();
        window.scrollTo(0, document.body.scrollHeight);
    }

    function setStatus(id, s) { localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); save(); }
    
    function delP(id) { if(confirm("Delete?")) { localData.pigeons = localData.pigeons.filter(p => p.id !== id); save(); } }

    function save() {
        const config = { 
            showScoreboard: document.getElementById('swScore').checked, 
            showTicker: document.getElementById('swTicker').checked, 
            showTime: true, showFly: true,
            ticker: document.getElementById('inpTicker').value,
            boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        let counts = { fly: 0, time: 0, out: 0 };
        const list = document.getElementById('listArea'); list.innerHTML = "";
        
        (localData.pigeons || []).forEach((p, idx) => {
            if(p.status === 'fly') counts.fly++;
            else if(p.status === 'time') counts.time++;
            else if(p.status === 'out') counts.out++;

            list.innerHTML += `<div class="pigeon-row">
                <div class="pigeon-info">
                    <span class="serial-num">${idx + 1}.</span>
                    <span class="pigeon-name">${p.name}</span>
                </div>
                <div class="status-grp">
                    <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">FLY</button>
                    <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">TIME</button>
                    <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">OUT</button>
                    <button onclick="delP(${p.id})" class="del-btn">🗑️</button>
                </div>
            </div>`;
        });

        // Update Admin Summary
        document.getElementById('sum-total').innerText = (localData.pigeons || []).length;
        document.getElementById('sum-fly').innerText = counts.fly;
        document.getElementById('sum-time').innerText = counts.time;
        document.getElementById('sum-out').innerText = counts.out;
    }
</script>
</body>
</html>
