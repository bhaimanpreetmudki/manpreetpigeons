<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; -webkit-text-size-adjust: 100%; }
        
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 10px; border-left: 5px solid #f39c12; align-items: center; }
        .status-val { font-size: 14px; font-weight: 900; }

        /* Recharge Button & Modal */
        .btn-recharge-main { width: 100%; padding: 12px; background: #f39c12; color: black; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; }
        #recharge-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 15px; overflow-y: auto; }
        .modal-content { background: #1a1d21; padding: 20px; border-radius: 15px; border: 2px solid #f39c12; max-width: 400px; margin: 10px auto; }
        
        /* QR Area */
        .qr-area { background: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .qr-area img { width: 100%; max-width: 200px; border-radius: 5px; }

        /* Payment Plan Card */
        .plan-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .plan-card b { font-size: 24px; color: #2ecc71; display: block; margin-bottom: 12px; }
        
        /* App Buttons with Icons */
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pay-btn { padding: 12px 5px; border-radius: 8px; border: none; font-weight: 900; font-size: 11px; cursor: pointer; color: white; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
        
        .gp { background: #4285F4; } /* GPay */
        .pp { background: #5f259f; } /* PhonePe */
        .pt { background: #00baf2; } /* Paytm */
        .az { background: #232f3e; border: 1px solid #ff9900; } /* Amazon */

        /* Team Row (50/50 Split) */
        .pigeon-row { background: #21262d; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #30363d; }
        .name-part { width: 50%; display: flex; align-items: center; gap: 8px; }
        .serial-num { color: #f39c12; font-weight: 900; font-size: 16px; min-width: 25px; }
        .pigeon-name-input { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: 100%; outline: none; }
        
        .btn-part { width: 50%; display: flex; justify-content: flex-end; gap: 4px; }
        .st-btn { border: none; padding: 10px 0; border-radius: 5px; font-weight: 900; font-size: 13px; opacity: 0.2; color: white; width: 36px; text-align: center; }
        .st-btn.active { opacity: 1; border: 1px solid white; }
        .st-fly { background: #007bff; } .st-time { background: #ffc107; color: black; } .st-out { background: #dc3545; }

        /* Sticky Bottom Controls */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d21; padding: 12px; border-top: 5px solid #f39c12; z-index: 1000; }
        .footer-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input { padding: 12px; background: #0d1117; border: 1px solid #444; color: white; border-radius: 6px; font-size: 16px; width: 100%; }
        .btn-add { background: #f39c12; border: none; font-weight: 900; padding: 0 18px; border-radius: 6px; color: black; }
    </style>
</head>
<body>

<div id="main-content">
    <div class="status-bar">
        <div><span style="font-size:10px;color:#888;">HELPLINE:</span><br><span class="status-val" onclick="window.location.href='tel:+918699640061'">📞 86996-40061</span></div>
        <div style="text-align: right;"><span style="font-size:10px;color:#888;">EXPIRY:</span><br><div id="expDisp" class="status-val">--</div></div>
    </div>

    <button class="btn-recharge-main" onclick="toggleRecharge(true)">💳 RECHARGE PLANS</button>

    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px;">
        <div style="background:#1a1d21; padding:8px; border-radius:8px; text-align:center; border:1px solid #333;">
            <div style="font-size:10px; color:#888;">TOT</div><b id="sum-total" style="color:#f39c12;">0</b>
        </div>
        <div style="background:#1a1d21; padding:8px; border-radius:8px; text-align:center; border:1px solid #333;">
            <div style="font-size:10px; color:#888;">FLY</div><b id="sum-fly" style="color:#007bff;">0</b>
        </div>
        <div style="background:#1a1d21; padding:8px; border-radius:8px; text-align:center; border:1px solid #333;">
            <div style="font-size:10px; color:#888;">TIME</div><b id="sum-time" style="color:#ffc107;">0</b>
        </div>
        <div style="background:#1a1d21; padding:8px; border-radius:8px; text-align:center; border:1px solid #333;">
            <div style="font-size:10px; color:#888;">OUT</div><b id="sum-out" style="color:#dc3545;">0</b>
        </div>
    </div>

    <button onclick="save()" style="width:100%; padding:14px; background:#238636; color:white; border:none; border-radius:8px; font-weight:900; margin-bottom:15px; font-size:16px;">💾 SAVE ALL UPDATES</button>

    <div id="listArea"></div>

    <div id="recharge-modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#f39c12; margin-bottom:10px;">CHOOSE PLAN</h3>
            
            <div class="qr-area">
                <img src="https://raw.githubusercontent.com/bhaimanpreetmudki/bhaimanpreetmudki.github.io/main/qr.png" alt="QR Code">
                <p style="color:#000; font-size:10px; font-weight:bold; margin:5px 0 0 0;">Scan to Pay</p>
            </div>

            <div id="plans-container"></div>
            
            <button onclick="toggleRecharge(false)" style="width:100%; margin-top:10px; padding:15px; background:#444; color:white; border:none; border-radius:10px; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <div class="sticky-footer">
        <div class="footer-row"><input type="text" id="pName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ..."><button class="btn-add" onclick="addP()">ADD</button></div>
        <div class="footer-row"><input type="text" id="inpBoxTime" oninput="save()" placeholder="Time Text"><input type="text" id="inpTicker" oninput="save()" placeholder="Ticker Text"></div>
        <div style="display:flex; gap:8px;">
            <div style="flex:1; background:#111; padding:10px; border-radius:6px; display:flex; justify-content:space-between; font-size:12px; border:1px solid #333;">OVERLAY <input type="checkbox" id="swScore" onchange="save()"></div>
            <div style="flex:1; background:#111; padding:10px; border-radius:6px; display:flex; justify-content:space-between; font-size:12px; border:1px solid #333;">TICKER <input type="checkbox" id="swTicker" onchange="save()"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    const plans = [
        { name: "1 DAY PLAN", price: 200, id: "1Day" },
        { name: "2 DAY PLAN", price: 300, id: "2Day" },
        { name: "10 DAY PLAN", price: 1000, id: "10Day" },
        { name: "1 MONTH PLAN", price: 2000, id: "1Month" }
    ];

    function toggleRecharge(show) { document.getElementById('recharge-modal').style.display = show ? 'block' : 'none'; }

    function setupPlans() {
        const container = document.getElementById('plans-container');
        container.innerHTML = "";
        plans.forEach(p => {
            const pa = "4kjunctionofficial@okhdfcbank";
            const pn = "Manpreet Singh";
            const am = p.price;
            const tn = `Plan_${p.id}_ID_${userID}`;

            // Fixed Deeplinks
            const gpay = `intent://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR&tn=${tn}#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end`;
            const phonepe = `phonepe://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR&tn=${tn}`;
            const paytm = `paytmmp://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR&tn=${tn}`;
            const amazon = `intent://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR&tn=${tn}#Intent;scheme=upi;package=in.amazon.mShop.android.shopping;end`;

            container.innerHTML += `
                <div class="plan-card">
                    <span style="font-size:12px; color:#888;">${p.name}</span>
                    <b>₹${p.price}</b>
                    <div class="pay-grid">
                        <a href="${gpay}" class="pay-btn gp"><i class="fab fa-google-pay"></i> GPAY</a>
                        <a href="${phonepe}" class="pay-btn pp"><i class="fas fa-mobile-alt"></i> PHONEPE</a>
                        <a href="${paytm}" class="pay-btn pt"><i class="fas fa-wallet"></i> PAYTM</a>
                        <a href="${amazon}" class="pay-btn az"><i class="fab fa-amazon-pay"></i> AMAZON</a>
                    </div>
                </div>`;
        });
    }

    if(userID) {
        db.ref('users/' + userID).on('value', snap => {
            const data = snap.val(); if(!data) return;
            localData = data;
            const d = new Date(data.expiry);
            document.getElementById('expDisp').innerText = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + " " + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            setupPlans();
            render();
        });
    }

    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; save();
    }

    function editName(id, newName) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, name: newName} : p);
        save();
    }

    function setStatus(id, s) { 
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); 
        save(); 
    }
    
    function delP(id) { if(confirm("Delete Party?")) { localData.pigeons = localData.pigeons.filter(p => p.id !== id); save(); } }

    function save() {
        const config = { 
            showScoreboard: document.getElementById('swScore').checked, 
            showTicker: document.getElementById('swTicker').checked, 
            showTime: true, showFly: true,
            ticker: document.getElementById('inpTicker').value,
            boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";
        let counts = { fly: 0, time: 0, out: 0 };
        const list = document.getElementById('listArea'); list.innerHTML = "";
        (localData.pigeons || []).forEach((p, idx) => {
            if(p.status === 'fly') counts.fly++; else if(p.status === 'time') counts.time++; else if(p.status === 'out') counts.out++;
            list.innerHTML += `<div class="pigeon-row">
                <div class="name-part"><span class="serial-num">${idx + 1}</span><input type="text" class="pigeon-name-input" value="${p.name}" onchange="editName(${p.id}, this.value)"></div>
                <div class="btn-part">
                    <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">F</button>
                    <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">T</button>
                    <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">O</button>
                    <button onclick="delP(${p.id})" style="background:none; border:none; color:#ff4444; font-size:22px; padding-left:5px;">×</button>
                </div>
            </div>`;
        });
        document.getElementById('sum-total').innerText = (localData.pigeons || []).length;
        document.getElementById('sum-fly').innerText = counts.fly;
        document.getElementById('sum-time').innerText = counts.time;
        document.getElementById('sum-out').innerText = counts.out;
    }
</script>
</body>
</html>
