<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Pigeon Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; padding-bottom: 250px; -webkit-text-size-adjust: 100%; }
        
        /* Expiry & Help Header */
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 15px; border-left: 5px solid #f39c12; font-size: 13px; align-items: center; }
        .status-bar b { color: #f39c12; }

        /* Recharge Section */
        .recharge-box { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .recharge-title { font-size: 14px; font-weight: bold; color: #f39c12; margin-bottom: 10px; text-align: center; }
        .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .plan-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 12px 5px; border-radius: 8px; text-align: center; text-decoration: none; display: block; font-size: 12px; transition: 0.3s; }
        .plan-btn b { display: block; font-size: 16px; color: #238636; margin-top: 3px; }
        .plan-btn:active { background: #30363d; transform: scale(0.95); }

        /* Top Summary Section */
        .admin-top-section { background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; border-top: 4px solid #f39c12; }
        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .sum-item { background: #111; padding: 8px; border-radius: 6px; border: 1px solid #333; text-align: center; }
        .sum-item div { font-size: 10px; color: #888; margin-bottom: 3px; }
        .sum-item b { font-size: 18px; color: #f39c12; }

        .btn-update-top { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        /* Pigeon List */
        .pigeon-row { background: #21262d; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #30363d; }
        .serial-num { color: #f39c12; font-weight: bold; min-width: 25px; }
        .pigeon-name { font-size: 16px; font-weight: bold; flex: 1; }
        .status-grp { display: flex; gap: 4px; }
        .st-btn { border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; opacity: 0.2; font-size: 11px; }
        .st-btn.active { opacity: 1; border: 1px solid white; }
        .st-fly { background: #007bff; } .st-time { background: #ffc107; color: black; } .st-out { background: #dc3545; }

        /* Sticky Footer */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d21; padding: 15px; border-top: 4px solid #f39c12; z-index: 1000; }
        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn-add { background: #f39c12; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; padding: 0 20px; color: black; font-size: 16px; }
        .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .sw-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 6px; font-size: 12px; border: 1px solid #333; }
        .del-btn { background: none; border: none; color: #ff4444; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center;" class="admin-top-section">
    <h2 style="color:#f39c12;">ADMIN LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ...">
    <button class="btn-update-top" onclick="checkLogin()">LOGIN</button>
</div>

<div id="main-content" style="display:none;">
    
    <div class="status-bar">
        <span>📅 EXPIRY: <b id="expDisp">--</b></span>
        <span onclick="window.location.href='tel:+918699640061'">📞 HELP: <b>8699640061</b></span>
    </div>

    <div class="recharge-box">
        <div class="recharge-title">🚀 PAY & RECHARGE (G-PAY)</div>
        <div class="plan-grid">
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=ManpreetSingh&am=200&cu=INR" class="plan-btn">1 DAY PLAN<b>₹200</b></a>
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=ManpreetSingh&am=300&cu=INR" class="plan-btn">2 DAY PLAN<b>₹300</b></a>
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=ManpreetSingh&am=1000&cu=INR" class="plan-btn">10 DAY PLAN<b>₹1000</b></a>
            <a href="upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=ManpreetSingh&am=2000&cu=INR" class="plan-btn">1 MONTH PLAN<b>₹2000</b></a>
        </div>
        <div style="font-size: 10px; color: #888; margin-top: 10px; text-align: center;">* ਪੇਮੈਂਟ ਕਰਨ ਤੋਂ ਬਾਅਦ ਸਕ੍ਰੀਨਸ਼ਾਟ ਹੈਲਪਲਾਈਨ ਨੰਬਰ ਤੇ ਭੇਜੋ।</div>
    </div>

    <div class="admin-top-section">
        <div class="admin-sum-grid">
            <div class="sum-item"><div>TOTAL</div><b id="sum-total">0</b></div>
            <div class="sum-item"><div>FLYING</div><b id="sum-fly">0</b></div>
            <div class="sum-item"><div>TIME</div><b id="sum-time">0</b></div>
            <div class="sum-item"><div>OUT</div><b id="sum-out">0</b></div>
        </div>
        <button class="btn-update-top" onclick="save()">💾 UPDATE DATA LIVE</button>
    </div>

    <div id="listArea"></div>

    <div class="sticky-footer">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="pName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ ਲਿਖੋ..." style="margin-bottom:0;">
            <button class="btn-add" onclick="addP()">ADD</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="inpBoxTime" oninput="save()" placeholder="Time Text" style="margin-bottom:0;">
            <input type="text" id="inpTicker" oninput="save()" placeholder="Ticker Message..." style="margin-bottom:0;">
        </div>
        <div class="sw-grid">
            <div class="sw-row"><span>SCOREBOARD</span><input type="checkbox" id="swScore" onchange="save()"></div>
            <div class="sw-row"><span>TICKER BAR</span><input type="checkbox" id="swTicker" onchange="save()"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                document.getElementById('expDisp').innerText = new Date(data.expiry).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
                db.ref('users/' + userID).on('value', s => { localData = s.val() || {pigeons:[], config:{}}; render(); });
            } else { alert("Wrong Password"); }
        });
    }

    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; 
        save();
        setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
    }

    function setStatus(id, s) { 
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); 
        save(); 
    }
    
    function delP(id) { if(confirm("Delete?")) { localData.pigeons = localData.pigeons.filter(p => p.id !== id); save(); } }

    function save() {
        const config = { 
            showScoreboard: document.getElementById('swScore').checked, 
            showTicker: document.getElementById('swTicker').checked, 
            showTime: true, showFly: true,
            ticker: document.getElementById('inpTicker').value,
            boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        let counts = { fly: 0, time: 0, out: 0 };
        const list = document.getElementById('listArea'); list.innerHTML = "";
        
        (localData.pigeons || []).forEach((p, idx) => {
            if(p.status === 'fly') counts.fly++;
            else if(p.status === 'time') counts.time++;
            else if(p.status === 'out') counts.out++;

            list.innerHTML += `<div class="pigeon-row">
                <span class="serial-num">${idx + 1}.</span>
                <span class="pigeon-name">${p.name}</span>
                <div class="status-grp">
                    <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">FLY</button>
                    <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">TIME</button>
                    <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">OUT</button>
                    <button onclick="delP(${p.id})" class="del-btn">🗑️</button>
                </div>
            </div>`;
        });

        document.getElementById('sum-total').innerText = (localData.pigeons || []).length;
        document.getElementById('sum-fly').innerText = counts.fly;
        document.getElementById('sum-time').innerText = counts.time;
        document.getElementById('sum-out').innerText = counts.out;
    }
</script>
</body>
</html>
