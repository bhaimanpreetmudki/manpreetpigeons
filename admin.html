<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; padding-bottom: 280px; -webkit-text-size-adjust: 100%; }
        
        /* Expiry & Helpline Header */
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 10px; border-left: 5px solid #f39c12; align-items: center; }
        .status-label { font-size: 11px; color: #888; font-weight: bold; }
        .status-val { font-size: 16px; font-weight: 900; }

        /* Full Width Buttons (Kinare ton Kinare) */
        .btn-full { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; display: block; margin-bottom: 10px; box-sizing: border-box; }
        .btn-recharge-main { background: #f39c12; color: black; }
        .btn-save-main { background: #238636; color: white; margin-bottom: 15px; }

        /* Summary Section */
        .admin-sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .sum-item { background: #1a1d21; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .sum-item div { font-size: 10px; color: #888; }
        .sum-item b { font-size: 18px; color: #f39c12; }

        /* Pigeon List - Slimmer Design */
        .pigeon-row { background: #21262d; padding: 6px 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; border: 1px solid #30363d; }
        .serial-num { color: #f39c12; font-weight: 900; font-size: 15px; min-width: 20px; }
        .pigeon-name-input { background: transparent; border: none; color: white; font-size: 17px; font-weight: bold; flex: 1; padding: 4px; outline: none; }
        
        /* Slimmed Buttons (Ghat Dhote) */
        .status-grp { display: flex; gap: 4px; align-items: center; }
        .st-btn { border: none; padding: 6px 0; border-radius: 4px; font-weight: bold; font-size: 11px; opacity: 0.2; color: white; width: 38px; text-align: center; }
        .st-btn.active { opacity: 1; border: 1.5px solid white; box-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .st-fly { background: #007bff; } 
        .st-time { background: #ffc107; color: black; } 
        .st-out { background: #dc3545; }
        .del-btn { background: none; border: none; color: #ff4444; font-size: 22px; padding: 0 4px; margin-left: 2px; }

        /* Recharge Modal */
        #recharge-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #1a1d21; padding: 20px; border-radius: 15px; border: 2px solid #f39c12; margin-top: 30px; }
        .plan-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .plan-btn { background: #111; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 10px; text-decoration: none; display: flex; justify-content: space-between; align-items: center; }
        .plan-btn b { font-size: 20px; color: #2ecc71; }

        /* Sticky Footer */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d21; padding: 12px; border-top: 4px solid #f39c12; z-index: 1000; }
        .footer-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .sticky-footer input { padding: 12px; background: #0d1117; border: 1px solid #333; color: white; border-radius: 6px; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn-add { background: #f39c12; border: none; font-weight: 900; padding: 0 20px; border-radius: 6px; color: black; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center; background:#1a1d21; padding:25px; border-radius:12px; border:1px solid #333;">
    <h2 style="color:#f39c12; margin-top:0;">MANPREET MUDKI</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ..." style="width:100%; padding:14px; margin-bottom:15px; background:#000; border:1px solid #333; color:white; border-radius:8px; box-sizing: border-box;">
    <button onclick="checkLogin()" class="btn-full" style="background:#238636; color:white; margin-bottom:0;">ENTER ADMIN</button>
</div>

<div id="main-content" style="display:none;">
    
    <div class="status-bar">
        <div><span class="status-label">HELP:</span><br><span class="status-val" onclick="window.location.href='tel:+918699640061'">📞 86996-40061</span></div>
        <div style="text-align: right;"><span class="status-label">EXPIRY:</span><br><div id="expDisp" class="status-val">--</div></div>
    </div>

    <button class="btn-full btn-recharge-main" onclick="toggleRecharge(true)">💳 RECHARGE / RENEW PLAN</button>

    <div class="admin-sum-grid">
        <div class="sum-item"><div>TOT</div><b id="sum-total">0</b></div>
        <div class="sum-item"><div>FLY</div><b id="sum-fly">0</b></div>
        <div class="sum-item"><div>TIME</div><b id="sum-time">0</b></div>
        <div class="sum-item"><div>OUT</div><b id="sum-out">0</b></div>
    </div>

    <button onclick="save()" class="btn-full btn-save-main">💾 SAVE ALL UPDATES</button>

    <div id="listArea"></div>

    <div id="recharge-modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#f39c12; margin-top:0;">SELECT PLAN</h3>
            <p style="font-size:12px; text-align:center; color:#888; margin-bottom:20px;">ADMIN ID: <b id="adminIdDisp" style="color:#fff;">--</b></p>
            <div class="plan-grid" id="planList">
                </div>
            <button onclick="toggleRecharge(false)" class="btn-full" style="background:#444; color:white; margin-top:20px;">CLOSE</button>
        </div>
    </div>

    <div class="sticky-footer">
        <div class="footer-row">
            <input type="text" id="pName" placeholder="ਪਾਰਟੀ ਦਾ ਨਾਮ...">
            <button class="btn-add" onclick="addP()">ADD</button>
        </div>
        <div class="footer-row">
            <input type="text" id="inpBoxTime" oninput="save()" placeholder="Time (e.g. 10:00 to 11:30)">
            <input type="text" id="inpTicker" oninput="save()" placeholder="Ticker Text Message">
        </div>
        <div style="display:flex; gap:10px;">
            <div style="flex:1; background:#111; padding:12px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:bold;">
                OVERLAY <input type="checkbox" id="swScore" onchange="save()" style="width:18px; height:18px;">
            </div>
            <div style="flex:1; background:#111; padding:12px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:bold;">
                TICKER <input type="checkbox" id="swTicker" onchange="save()" style="width:18px; height:18px;">
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');
    let localData = { pigeons: [], config: {} };

    function checkLogin() {
        if(!userID) { alert("Invalid URL! ID missing."); return; }
        db.ref('users/' + userID).once('value', snap => {
            const data = snap.val();
            if(data && data.password === document.getElementById('adminPass').value) {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                document.getElementById('adminIdDisp').innerText = userID;
                
                const d = new Date(data.expiry);
                document.getElementById('expDisp').innerText = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + " " + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                setupUPILinks();
                db.ref('users/' + userID).on('value', s => { localData = s.val() || {pigeons:[], config:{}}; render(); });
            } else { alert("Incorrect Password!"); }
        });
    }

    // Universal UPI Link Setup
    function setupUPILinks() {
        const plans = [
            { id: "1D", name: "1 DAY PLAN", price: "200" },
            { id: "2D", name: "2 DAY PLAN", price: "300" },
            { id: "10D", name: "10 DAY PLAN", price: "1000" },
            { id: "1M", name: "1 MONTH PLAN", price: "2000" }
        ];
        const container = document.getElementById('planList');
        container.innerHTML = "";
        
        plans.forEach(p => {
            // Using standard UPI intent for better app compatibility
            const upiUrl = `upi://pay?pa=4kjunctionofficial@okhdfcbank&pn=ManpreetMudki&am=${p.price}&cu=INR&tn=ID_${userID}_Plan_${p.id}`;
            container.innerHTML += `
                <a href="${upiUrl}" class="plan-btn">
                    <span>${p.name}</span>
                    <b>₹${p.price}</b>
                </a>`;
        });
    }

    function toggleRecharge(show) { document.getElementById('recharge-modal').style.display = show ? 'block' : 'none'; }

    function addP() {
        const n = document.getElementById('pName').value; if(!n) return;
        if(!localData.pigeons) localData.pigeons = [];
        localData.pigeons.push({ id: Date.now(), name: n, status: 'fly' });
        document.getElementById('pName').value = ""; save();
    }

    function editName(id, newName) {
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, name: newName} : p);
        save();
    }

    function setStatus(id, s) { 
        localData.pigeons = localData.pigeons.map(p => p.id === id ? {...p, status: s} : p); 
        save(); 
    }
    
    function delP(id) { if(confirm("Delete?")) { localData.pigeons = localData.pigeons.filter(p => p.id !== id); save(); } }

    function save() {
        const config = { 
            showScoreboard: document.getElementById('swScore').checked, 
            showTicker: document.getElementById('swTicker').checked, 
            showTime: true, showFly: true, 
            ticker: document.getElementById('inpTicker').value, 
            boxTime: document.getElementById('inpBoxTime').value
        };
        db.ref('users/' + userID).update({ pigeons: localData.pigeons || [], config: config });
    }

    function render() {
        const conf = localData.config || {};
        document.getElementById('swScore').checked = conf.showScoreboard;
        document.getElementById('swTicker').checked = conf.showTicker;
        document.getElementById('inpTicker').value = conf.ticker || "";
        document.getElementById('inpBoxTime').value = conf.boxTime || "";

        let counts = { fly: 0, time: 0, out: 0 };
        const list = document.getElementById('listArea'); list.innerHTML = "";
        
        (localData.pigeons || []).forEach((p, idx) => {
            if(p.status === 'fly') counts.fly++; else if(p.status === 'time') counts.time++; else if(p.status === 'out') counts.out++;
            list.innerHTML += `<div class="pigeon-row">
                <span class="serial-num">${idx + 1}</span>
                <input type="text" class="pigeon-name-input" value="${p.name}" onchange="editName(${p.id}, this.value)">
                <div class="status-grp">
                    <button class="st-btn st-fly ${p.status=='fly'?'active':''}" onclick="setStatus(${p.id},'fly')">F</button>
                    <button class="st-btn st-time ${p.status=='time'?'active':''}" onclick="setStatus(${p.id},'time')">T</button>
                    <button class="st-btn st-out ${p.status=='out'?'active':''}" onclick="setStatus(${p.id},'out')">O</button>
                    <button onclick="delP(${p.id})" class="del-btn">×</button>
                </div>
            </div>`;
        });
        document.getElementById('sum-total').innerText = (localData.pigeons || []).length;
        document.getElementById('sum-fly').innerText = counts.fly;
        document.getElementById('sum-time').innerText = counts.time;
        document.getElementById('sum-out').innerText = counts.out;
    }
</script>
</body>
</html>
