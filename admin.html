<div id="admin-ui" style="display:none;">
    <div class="card">
        <input type="text" id="pName" placeholder="ਕਬੂਤਰ/ਪਾਰਟੀ ਦਾ ਨਾਮ">
        <button onclick="addP()">ADD</button>
    </div>
    <div id="list"></div> </div>

<script>
    function render() {
        let html = "";
        pigeons.forEach((p, i) => {
            html += `<div class="card">
                <b>${p.name}</b><br>
                <button class="${p.status=='fly'?'active':''}" onclick="update(${i},'fly')">FLY</button>
                <button class="${p.status=='time'?'active':''}" onclick="update(${i},'time')">TIME</button>
                <button class="${p.status=='out'?'active':''}" onclick="update(${i},'out')">OUT</button>
                <button onclick="del(${i})">🗑️</button>
            </div>`;
        });
        document.getElementById('list').innerHTML = html;
    }
</script>
